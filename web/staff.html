<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>員工排班與打卡</title>
<style>
:root{--ink:#18212f;--muted:#667085;--brand:#176b56;--soft:#edf7f3;--warn:#b54708;--bad:#b42318;--line:#e4e7ec}
*{box-sizing:border-box}body{margin:0;background:#f7f8fa;color:var(--ink);font-family:system-ui,"Noto Sans TC",sans-serif;padding-bottom:84px}

main{max-width:720px;margin:auto;padding:14px}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px #1018280a}
h2{font-size:18px;margin:0 0 12px}.muted{color:var(--muted);font-size:13px}.notice{padding:12px;border-radius:10px;background:#fff4e5;color:var(--warn);margin-bottom:12px}.error{background:#fef3f2;color:var(--bad)}
button,.button,select,input,textarea{font:inherit;border-radius:10px;border:1px solid #d0d5dd;padding:11px}button,.button{background:var(--brand);color:#fff;border:0;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}button.secondary{background:#eef2f6;color:var(--ink)}button.danger{background:#d92d20}button:disabled{opacity:.45}
.row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.grow{flex:1}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.shift{border-left:5px solid #98a2b3;padding:11px 12px;background:#f9fafb;border-radius:8px;margin:8px 0}.shift.today{background:#fef7c3;border-color:#f79009}.shift.tomorrow{background:#fef7c3;border-color:#f79009}.shift.future{background:#eaf2ff;border-color:#2e90fa}.shift.past{background:#f2f4f7;border-color:#98a2b3}.shift.unfilled{background:#eaecf0!important;border-color:#667085!important;color:#475467}.shift.deposit-paid{background:#dcfae6!important;border-color:#079455!important;color:#065f46}.shift.attendance-need-in{background:#fef7c3!important;border-color:#f79009!important}.shift.attendance-working{background:#eaf2ff!important;border-color:#2e90fa!important}.shift.attendance-done{background:#dcfae6!important;border-color:#079455!important}.shift.cancelled{opacity:.55;text-decoration:line-through}.tag{font-size:12px;background:#eef2f6;padding:3px 7px;border-radius:99px}.status{display:inline-block;font-size:12px;font-weight:800;margin-top:7px;padding:4px 8px;border-radius:99px}.status.need-in{background:#fef0c7;color:#b54708}.status.working{background:#d1e9ff;color:#175cd3}.status.done{background:#dcfae6;color:#067647}.verified{color:#067647}.anomaly{color:var(--bad)}.policy{border-left:4px solid #2e90fa;background:#eff8ff;padding:11px;border-radius:8px;font-size:13px}.customer-info{margin-top:8px;padding:9px 10px;border-radius:9px;background:#fff;border:1px solid #d0d5dd;font-size:12px;line-height:1.65;overflow-wrap:anywhere}.customer-info a{color:#175cd3}.record{padding:9px 0;border-bottom:1px solid #eee}.record.voided{opacity:.55;text-decoration:line-through}.work-choice{display:flex;align-items:flex-start;gap:10px;border:1px solid #d0d5dd;border-radius:10px;padding:10px;margin:8px 0;background:#fff}.work-choice input{width:auto;margin-top:4px}.legend{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 12px}.legend span{font-size:12px;font-weight:700;padding:5px 9px;border-radius:99px}.legend .today{background:#dcfae6}.legend .tomorrow{background:#fef7c3}.legend .future{background:#eaf2ff}.legend .empty{background:#eaecf0}.legend .deposit{background:#dcfae6;color:#067647}.reminder{border:2px solid #f04438;background:#fff1f0;color:#912018;padding:12px;border-radius:12px;font-weight:800}.punch-panel{background:linear-gradient(135deg,#eff8ff,#edf7f3);border:2px solid #84caff}.punch-main{width:100%;font-size:19px;padding:16px;margin-top:12px}.punch-main.out{background:#b42318}.segments{margin-top:10px;padding-top:10px;border-top:1px solid #d0d5dd}.task-action{width:100%;margin-top:10px}.task-complete{background:#dcfae6;color:#067647;padding:9px;border-radius:9px;margin-top:9px;font-weight:800}.month-summary{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}.month-stat{border:1px solid #d0d5dd;border-radius:12px;padding:12px;background:#fff}.month-stat b{display:block;font-size:22px;margin:5px 0}.month-stat small{color:#667085;line-height:1.45}.month-stat.hours{grid-column:1/-1;background:#eff8ff;border-color:#84caff}
.schedule-day{margin:16px 0}.schedule-day>h3{margin:0 0 8px}.schedule-board{display:grid;gap:10px;overflow-x:auto}.store-column{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:9px}.store-column>h3{font-size:14px;margin:0 0 6px}.store-column .shift{font-size:13px;margin:6px 0;padding:9px}@media(max-width:540px){.filters .field{min-width:100%}}
nav{position:fixed;z-index:4;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom)}nav button{flex:1;background:#fff;color:var(--muted);border-radius:0;padding:12px 3px;font-size:12px}nav button.on{color:var(--brand);background:var(--soft)}
label{display:block;font-size:13px;font-weight:700;margin:10px 0 5px}input,select,textarea{width:100%;background:#fff}.hidden{display:none!important}.big{font-size:28px;font-weight:800}.ok{color:var(--brand)}
</style></head><body>
<header><h1>員工排班與打卡</h1><p id="hello">正在連接 LINE…</p></header>
<main id="app"><div class="card">載入中…</div></main>
<nav id="nav" class="hidden"><button data-tab="home" onclick="show('home')">今日班表／打卡</button><button data-tab="schedule" onclick="show('schedule')">班表</button><button id="swapNav" class="hidden" data-tab="requests" onclick="show('requests')">換班</button></nav>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script><script src="config.js"></script>
<script>
let D=null,requestedTab=new URLSearchParams(location.search).get('tab'),tab=['home','schedule','requests','practice'].includes(requestedTab)?requestedTab:'home',idToken='',punchBusy=false,scheduleFilters={date:new Date().toLocaleDateString('sv-SE',{timeZone:'Asia/Taipei'}),store:'',theme:''},requestRows=[],virtualScheduleSlots=[];const app=document.getElementById('app');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const api=async(body)=>{const r=await fetch(CFG.SUPABASE_URL+'/functions/v1/staff-api',{method:'POST',headers:{'content-type':'application/json','apikey':CFG.SUPABASE_ANON_KEY,'authorization':'Bearer '+idToken},body:JSON.stringify(body)});const x=await r.json();if(!r.ok)throw Object.assign(new Error(x.error||'連線失敗'),{status:r.status,data:x});return x};
async function start(){
  if(!CFG.LINE_LIFF_ID){app.innerHTML='<div class="card"><h2>尚未連接 LINE 測試帳號</h2><p>程式已準備完成。建立 LIFF 後，只需把公開的 LIFF ID 填入 <b>web/config.js</b>。</p></div>';return}
  try{await liff.init({liffId:CFG.LINE_LIFF_ID});if(!liff.isLoggedIn()){liff.login();return}idToken=liff.getIDToken();await load()}
  catch(e){app.innerHTML=`<div class="notice error">${esc(e.message)}</div>`}
}
async function load(){
  try{D=await api({action:'bootstrap'});document.getElementById('hello').textContent=D.me.name+'，今天也辛苦了';document.getElementById('nav').classList.remove('hidden');const canSwap=D.me.type==='full'||D.me.role==='manager';document.getElementById('swapNav').classList.toggle('hidden',!canSwap);if(tab==='requests'&&!canSwap)tab='home';if(tab==='practice'&&!D.me.canSchedulePractice)tab='home';show(tab)}
  catch(e){if(e.data?.error==='NOT_BOUND')bindView(e.data.displayName);else app.innerHTML=`<div class="notice error">${esc(e.message)}</div>`}
}
function bindView(name){document.getElementById('hello').textContent=name||'首次使用';app.innerHTML=`<div class="card"><h2>綁定員工身分</h2><p class="muted">請向管理員取得一次性驗證碼。請勿使用其他同事的驗證碼。</p><label>驗證碼</label><input id="bindCode" maxlength="12" autocomplete="one-time-code" style="text-transform:uppercase"><button style="width:100%;margin-top:12px" onclick="bind()">完成綁定</button></div>`}
async function bind(){try{await api({action:'bind',code:document.getElementById('bindCode').value});await load()}catch(e){alert(e.message)}}
function show(k){tab=k==='punch'?'home':k;document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));render()}
const empName=id=>D.employees.find(e=>e.id===id)?.name||'未排人',storeName=id=>D.stores.find(s=>s.id===id)?.name||id,themeName=id=>D.themes.find(t=>t.id===id)?.name||'其他班';
const shiftName=s=>s.kind==='theme'?themeName(s.themeId):s.kind==='floor'?'駐店場控':s.kind==='cleaning'?'每周大清潔':s.kind==='practice'?'訓練場':s.kind==='counter'?(s.storeId==='ms'?'謎先生櫃台':s.storeId==='dz'?'桌遊大忠店櫃台':'櫃台班'):'其他班別';
const isCancelled=s=>String(s?.status||'').startsWith('cancelled');
const myShifts=()=>D.shifts.filter(s=>!isCancelled(s)&&(s.assignments||[]).some(a=>a.empId===D.me.id));
function render(){if(!D)return;if(tab==='schedule')schedule();else if(tab==='punch')punchView();else if(tab==='requests')requestView();else if(tab==='practice'&&D.me.canSchedulePractice)practiceView();else home()}
function requestView(){
  if(D.me.type!=='full'&&D.me.role!=='manager'){app.innerHTML='<div class="notice error">換班申請只開放正職員工與管理員使用。</div>';return}
  const today=taipeiDate(),todayShifts=D.shifts.filter(s=>s.date===today&&!isCancelled(s)&&new Date(`${s.date}T${s.end}:00+08:00`).getTime()>Date.now()),ownFuture=myShifts().filter(s=>s.date>today),seen=new Set(),rows=[];
  for(const s of [...todayShifts,...ownFuture].sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start)))for(const a of s.assignments||[])if(a.empId){const key=s.id+'|'+a.empId;if(!seen.has(key)){seen.add(key);rows.push({s,a})}}
  requestRows=rows;
  app.innerHTML=`<div class="card"><h2>正職換班申請</h2><p class="muted">先選擇原本要調整的人力，再選希望由誰接替；系統優先列出時間、技能及店別符合的人員。也可選「其他」自行填寫姓名，最終仍由管理員確認。</p><label>原本要調整的人力／班別</label><select id="reqShift" onchange="renderReplacementOptions()">${rows.map(({s,a})=>`<option value="${esc(s.id+'|'+a.empId)}">${s.date} ${s.start}–${s.end} ${esc(storeName(s.storeId))}・${esc(shiftName(s))}・${esc(a.role)}：${esc(empName(a.empId))}</option>`).join('')}</select><label>希望由誰接替</label><select id="reqPreferred" onchange="replacementChoiceChanged()"><option value="">請選擇接替人員</option></select><div id="reqPreferredOtherBox" class="hidden"><label>其他接替者姓名</label><input id="reqPreferredOther" maxlength="30" placeholder="由正職本人填寫姓名" oninput="replacementChoiceChanged()"></div><p id="reqCandidateHint" class="muted"></p><label>主要原因</label><select id="reqReason"><option value="extra">臨時加場，人力調換</option><option value="emergency">緊急事故發生，人力調換</option><option value="health">員工個人身體有狀況，人力調換</option><option value="other">其他</option></select><label>原因補充（選填）</label><textarea id="reqNote" placeholder="可補充希望如何調整；沒有可留空"></textarea><button id="reqSubmit" style="width:100%;margin-top:12px" onclick="createRequest()" disabled>送交管理員確認</button>${rows.length?'':'<p class="notice">目前沒有可申請調整的班別。</p>'}</div>`;
  renderReplacementOptions();
}
function renderReplacementOptions(){const raw=document.getElementById('reqShift')?.value||'',row=requestRows.find(x=>x.s.id+'|'+x.a.empId===raw),sel=document.getElementById('reqPreferred'),hint=document.getElementById('reqCandidateHint');if(!sel)return;const list=row?.s?.replacementCandidates?.[row.a.empId]||[];sel.innerHTML='<option value="">請選擇接替人員</option>'+list.map(e=>`<option value="${esc(e.id)}">${esc(e.name)}</option>`).join('')+'<option value="__other__">其他（自行填寫姓名）</option>';if(hint)hint.textContent=list.length?`目前有 ${list.length} 位符合時間與資格；名單外人員可選其他並填寫姓名。`:'目前沒有自動符合的人員，可選其他並填寫姓名交由管理員判斷。';replacementChoiceChanged()}
function replacementChoiceChanged(){const sel=document.getElementById('reqPreferred'),box=document.getElementById('reqPreferredOtherBox'),other=document.getElementById('reqPreferredOther'),btn=document.getElementById('reqSubmit'),isOther=sel?.value==='__other__';if(box)box.classList.toggle('hidden',!isOther);if(btn)btn.disabled=!requestRows.length||!sel?.value||(isOther&&!(other?.value||'').trim())}
async function createRequest(){try{const [shiftId,replacedEmpId]=document.getElementById('reqShift').value.split('|'),choice=document.getElementById('reqPreferred')?.value||'',preferredEmpId=choice==='__other__'?'':choice,preferredName=choice==='__other__'?(document.getElementById('reqPreferredOther')?.value||'').trim():'';if(!preferredEmpId&&!preferredName)return alert('請選擇接替人員，或填寫其他接替者姓名。');const x=await api({action:'create-request',shiftId,replacedEmpId,preferredEmpId,preferredName,reasonCode:document.getElementById('reqReason').value,note:document.getElementById('reqNote').value});alert(x.message||'已送交管理員確認');await load();show('home')}catch(e){alert(e.message)}}
function practiceView(){
  if(!D.me.canSchedulePractice){app.innerHTML='<div class="notice error">你沒有安排新人訓練場的權限。</div>';return}
  const people=D.employees.map(e=>`<option value="${e.id}">${esc(e.name)}</option>`).join('');
  app.innerHTML=`<div class="card"><h2>安排新人訓練場</h2><p class="muted">建立後會同時進入班表、打卡及薪資工時；受訓員工、陪練人員與管理員都會收到資訊。</p><label>日期</label><input id="practiceDate" type="date" min="${taipeiDate()}" value="${taipeiDate(1)}"><label>場地</label><select id="practiceStore">${D.stores.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select><div class="grid"><div><label>開始</label><input id="practiceStart" type="time" value="14:00"></div><div><label>結束</label><input id="practiceEnd" type="time" value="16:00"></div></div><label>受訓員工／新人</label><select id="practiceTrainee">${people}</select><label>陪練人員</label><select id="practiceCompanion">${D.employees.map(e=>`<option value="${e.id}" ${e.id===D.me.id?'selected':''}>${esc(e.name)}</option>`).join('')}</select><label>訓練內容（選填）</label><textarea id="practiceNote" placeholder="例如：外婆開場、控場與結尾流程"></textarea><button style="width:100%;margin-top:12px" onclick="submitPractice()">建立訓練場並通知</button></div>`;
}
async function submitPractice(){
  try{const x=await api({action:'schedule-practice',date:document.getElementById('practiceDate').value,storeId:document.getElementById('practiceStore').value,start:document.getElementById('practiceStart').value,end:document.getElementById('practiceEnd').value,traineeId:document.getElementById('practiceTrainee').value,companionId:document.getElementById('practiceCompanion').value,note:document.getElementById('practiceNote').value});alert(x.message);await load();show('schedule')}catch(e){alert(e.message)}
}
const taipeiDate=(offset=0)=>{const d=new Date(Date.now()+offset*86400000);return d.toLocaleDateString('sv-SE',{timeZone:'Asia/Taipei'})};
function dateClass(date){return date<taipeiDate()?'past':date===taipeiDate()?'today':date===taipeiDate(1)?'tomorrow':'future'}
function attendanceState(s){
  const role=(s.assignments||[]).find(a=>a.empId===D.me.id)?.role||'',npc=role.toUpperCase()==='NPC';
  if(npc){const checkin=(D.sessionCheckins||[]).find(x=>x.shift_id===s.id);return checkin?{key:'done',text:`NPC 已報到 ${checkin.checked_in_at.slice(11,16)}`}:{key:'need-in',text:'NPC 尚未報到打卡'}}
  const ps=(D.punches||[]).filter(p=>!p.voided_at&&(p.shift_ids||[]).includes(s.id)).sort((a,b)=>a.ts.localeCompare(b.ts));
  if(!ps.some(p=>p.type==='in'))return {key:'need-in',text:'尚未上班打卡'};
  if(ps[ps.length-1]?.type==='in')return {key:'working',text:'已上班・工作結束記得下班打卡'};
  return {key:'done',text:'上下班打卡已完成'};
}
function customerInfo(s){
  const c=s.customer,p=s.payment||{};if(!c)return '';
  const paid=['paid','completed'].includes(String(p.depositStatus||'').toLowerCase()),amount=p.depositAmount!=null?`${esc(p.currency||'TWD')} ${esc(p.depositAmount)}`:'';
  return `<div class="customer-info"><b>👤 客人資訊</b>　${esc(c.name||'未提供')}${c.phone?`<br>📞 <a href="tel:${esc(c.phone)}">${esc(c.phone)}</a>`:''}${c.email?`<br>✉ <a href="mailto:${esc(c.email)}">${esc(c.email)}</a>`:''}${amount?`<br>💰 訂金 ${amount}（${paid?'已付':esc(p.depositStatus||'待確認')}${p.system?'・'+esc(p.system):''}）`:''}${c.comment?`<br>💬 ${esc(c.comment)}`:''}</div>`;
}
function shiftCard(s,all=true){
  const assigned=(s.assignments||[]).filter(a=>a.empId),unfilled=(s.assignments||[]).some(a=>!a.empId)||(s.kind==='theme'&&!assigned.length),depositPending=unfilled&&s.depositPaid,mine=assigned.some(a=>a.empId===D.me.id),role=assigned.find(a=>a.empId===D.me.id)?.role||'',npc=role.toUpperCase()==='NPC',state=mine&&s.date<=taipeiDate()?attendanceState(s):null,confirmed=(D.shiftConfirmations||[]).some(x=>x.shift_id===s.id&&x.status==='confirmed');
  const linkedThemes=mine?(s.linkedThemeAssignments||[]).filter(x=>x.empId===D.me.id).map(x=>D.shifts.find(t=>t.id===x.shiftId)).filter(Boolean).sort((a,b)=>a.start.localeCompare(b.start)):[];
  const reported=(D.sessionCheckins||[]).some(x=>x.shift_id===s.id);
  const receipt=mine&&s.date>=taipeiDate()?(confirmed?'<span class="status done">已確認收到</span>':`<button class="secondary" style="margin-top:9px" onclick="confirmShift('${esc(s.id)}')">確認收到這個班</button>`):'';
  const pastFix=mine&&s.date<taipeiDate()&&state?.key!=='done'?`<button class="secondary" style="margin-top:9px" onclick="openPastCorrection('${esc(s.id)}')">申請這一場補卡</button>`:'';
  const groups=s.candidateGroups||{},candidates=!unfilled||depositPending?'':s.virtualEmpty?`<div class="muted" style="margin-top:7px">依主題設定產生的標準時段；正式預約或排班建立後會自動取代此空場。</div><button class="secondary" style="margin-top:9px" onclick="openGuestReport('${esc(s.id)}')">回報現場／預約客人</button>`:`<div class="muted" style="margin-top:7px"><b>建議順序</b><br>① 已在本店且不衝堂：${(groups.onSite||[]).map(esc).join('、')||'無'}<br>② 時間可配合：${(groups.available||[]).map(esc).join('、')||'無'}</div><button class="secondary" style="margin-top:9px" onclick="openGuestReport('${esc(s.id)}')">回報現場／預約客人</button>`;
  const linkedInfo=linkedThemes.length?`<div class="notice" style="margin-top:8px"><b>本班同時負責場控</b><br>${linkedThemes.map(t=>`${esc(t.start)}–${esc(t.end)} ${esc(storeName(t.storeId))}・${esc(shiftName(t))}`).join('<br>')}</div>`:'';
  // 櫃台/駐店班可為每人設定個別時段:自己看到的主時間=自己的時段
  const myA=(s.assignments||[]).find(a=>a.empId===D.me.id),myW=myA&&(myA.start||myA.end)?{start:myA.start||s.start,end:myA.end||s.end}:null;
  const headTime=myW?`${esc(myW.start)}–${esc(myW.end)} <span class="tag">你的時段</span>`:`${esc(s.start)}–${esc(s.end)}`;
  const asgLabel=a=>esc(empName(a.empId))+' ('+esc(a.role)+((a.start||a.end)?` ${esc(a.start||s.start)}–${esc(a.end||s.end)}`:'')+')';
  return `<div class="shift ${dateClass(s.date)} ${depositPending?'deposit-paid':unfilled?'unfilled':''} ${state?'attendance-'+state.key:''} ${isCancelled(s)?'cancelled':''}"><b>${esc(s.date)}　${headTime}</b><br>${esc(storeName(s.storeId))}・${esc(shiftName(s))}<br>${unfilled?`<span class="tag">${depositPending?'已付訂金／待安排人':'空場／目前沒有預約'}</span>${assigned.length?`<br><span class="muted">已排：${assigned.map(asgLabel).join('、')}</span>`:''}`:all?`<span class="muted">${assigned.map(asgLabel).join('、')}</span>`:''}${customerInfo(s)}${linkedInfo}${candidates}${mine?`<br>${receipt}`:''}${state?`<br><span class="status ${state.key}">${state.text}</span><br>${s.date<taipeiDate()?pastFix:''}`:''}</div>`
}
function reportSession(id){
  if(punchBusy)return;if(!navigator.geolocation)return alert('此手機不支援定位回報');

  const type=document.getElementById('corType').value,workItemCode=document.getElementById('corWork')?.value||'',shiftId=document.querySelector('#homeCorrection .card')?.dataset.shiftId||'',requested=type==='correction'?{inTime:document.getElementById('corIn').value,outTime:document.getElementById('corOut').value,workItemCode}:{time:document.getElementById('corTime').value,workItemCode,shiftId};
  if(!workItemCode)return alert('請選擇補卡的主題或工作項目。');
  try{await api({action:'attendance-request',requestType:type,punchDate:document.getElementById('corDate').value,reason:document.getElementById('corReason').value,requested});alert('已送交管理員審核；申請包含工作項目與時間。');await load();show('home')}catch(e){alert(e.message)}
}
function workCodeForShift(s){
  if(s.kind==='counter')return s.storeId==='ms'?'mr_mystery_counter':'burgundy_counter';
  if(s.kind==='cleaning')return 'weekly_cleaning';if(s.kind==='practice')return 'practice';if(s.kind==='floor')return 'floor_support';
  const n=themeName(s.themeId),map={'外婆':'grandma','詭店':'haunted_shop','詭獄':'haunted_prison','屎力全開':'shit_power','詭廁':'haunted_toilet','越獄者':'escapee','孤兒怨':'orphan'};return map[n]||'';
}
function openPastCorrection(id){
  const s=D.shifts.find(x=>x.id===id);if(!s)return alert('找不到這個過去班次。');
  const role=(s.assignments||[]).find(a=>a.empId===D.me.id)?.role||'',npc=role.toUpperCase()==='NPC';
  show('home');const wrap=document.getElementById('homeCorrection');wrap.classList.remove('hidden');wrap.innerHTML=correctionCardHtml(s.date);const box=wrap.querySelector('.card');box.dataset.shiftId=s.id;
  document.getElementById('corDate').value=s.date;document.getElementById('corType').value=npc?'npc_checkin':'correction';correctionFields();
  document.getElementById('corWork').value=workCodeForShift(s);if(npc)document.getElementById('corTime').value=s.start;else{document.getElementById('corIn').value=s.start;document.getElementById('corOut').value=s.end}
  document.getElementById('corReason').placeholder=`請說明 ${s.date} ${shiftName(s)} 未打卡原因`;box.scrollIntoView({behavior:'smooth'});
}
let scheduleRefreshing=false;
async function refreshScheduleSilently(){
  if(!D||tab!=='schedule'||document.hidden||scheduleRefreshing)return;scheduleRefreshing=true;
  try{await load()}catch(e){console.warn('schedule refresh failed',e)}finally{scheduleRefreshing=false}
}
setInterval(refreshScheduleSilently,60000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)refreshScheduleSilently()});
start();
</script></body></html>
