<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>員工排班與打卡</title>
<style>
:root{--ink:#18212f;--muted:#667085;--brand:#176b56;--soft:#edf7f3;--warn:#b54708;--bad:#b42318;--line:#e4e7ec}
*{box-sizing:border-box}body{margin:0;background:#f7f8fa;color:var(--ink);font-family:system-ui,"Noto Sans TC",sans-serif;padding-bottom:84px}
header{padding:20px 18px 16px;background:linear-gradient(135deg,#123e35,#1f7a62);color:#fff}header h1{margin:0;font-size:22px}header p{margin:5px 0 0;opacity:.82;font-size:13px}
main{max-width:720px;margin:auto;padding:14px}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px #1018280a}
h2{font-size:18px;margin:0 0 12px}.muted{color:var(--muted);font-size:13px}.notice{padding:12px;border-radius:10px;background:#fff4e5;color:var(--warn);margin-bottom:12px}.error{background:#fef3f2;color:var(--bad)}
button,.button,select,input,textarea{font:inherit;border-radius:10px;border:1px solid #d0d5dd;padding:11px}button,.button{background:var(--brand);color:#fff;border:0;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}button.secondary{background:#eef2f6;color:var(--ink)}button.danger{background:#d92d20}button:disabled{opacity:.45}
.row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.grow{flex:1}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.shift{border-left:5px solid #98a2b3;padding:11px 12px;background:#f9fafb;border-radius:8px;margin:8px 0}.shift.today{background:#fef7c3;border-color:#f79009}.shift.tomorrow{background:#fef7c3;border-color:#f79009}.shift.future{background:#eaf2ff;border-color:#2e90fa}.shift.past{background:#f2f4f7;border-color:#98a2b3}.shift.unfilled{background:#eaecf0!important;border-color:#667085!important;color:#475467}.shift.attendance-need-in{background:#fef7c3!important;border-color:#f79009!important}.shift.attendance-working{background:#eaf2ff!important;border-color:#2e90fa!important}.shift.attendance-done{background:#dcfae6!important;border-color:#079455!important}.shift.cancelled{opacity:.55;text-decoration:line-through}.tag{font-size:12px;background:#eef2f6;padding:3px 7px;border-radius:99px}.status{display:inline-block;font-size:12px;font-weight:800;margin-top:7px;padding:4px 8px;border-radius:99px}.status.need-in{background:#fef0c7;color:#b54708}.status.working{background:#d1e9ff;color:#175cd3}.status.done{background:#dcfae6;color:#067647}.verified{color:#067647}.anomaly{color:var(--bad)}.policy{border-left:4px solid #2e90fa;background:#eff8ff;padding:11px;border-radius:8px;font-size:13px}.record{padding:9px 0;border-bottom:1px solid #eee}.record.voided{opacity:.55;text-decoration:line-through}.work-choice{display:flex;align-items:flex-start;gap:10px;border:1px solid #d0d5dd;border-radius:10px;padding:10px;margin:8px 0;background:#fff}.work-choice input{width:auto;margin-top:4px}.legend{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 12px}.legend span{font-size:12px;font-weight:700;padding:5px 9px;border-radius:99px}.legend .today{background:#dcfae6}.legend .tomorrow{background:#fef7c3}.legend .future{background:#eaf2ff}.legend .empty{background:#eaecf0}.reminder{border:2px solid #f04438;background:#fff1f0;color:#912018;padding:12px;border-radius:12px;font-weight:800}
nav{position:fixed;z-index:4;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom)}nav button{flex:1;background:#fff;color:var(--muted);border-radius:0;padding:12px 3px;font-size:12px}nav button.on{color:var(--brand);background:var(--soft)}
label{display:block;font-size:13px;font-weight:700;margin:10px 0 5px}input,select,textarea{width:100%;background:#fff}.hidden{display:none!important}.big{font-size:28px;font-weight:800}.ok{color:var(--brand)}
</style></head><body>
<header><h1>員工排班與打卡</h1><p id="hello">正在連接 LINE…</p></header>
<main id="app"><div class="card">載入中…</div></main>
<nav id="nav" class="hidden"><button data-tab="home" onclick="show('home')">今日班表</button><button data-tab="schedule" onclick="show('schedule')">班表</button><button data-tab="punch" onclick="show('punch')">打卡</button><button id="swapNav" data-tab="requests" onclick="show('requests')">換班申請</button></nav>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script><script src="config.js"></script>
<script>
let D=null,requestedTab=new URLSearchParams(location.search).get('tab'),tab=['home','schedule','punch','requests'].includes(requestedTab)?requestedTab:requestedTab==='mine'?'requests':'home',idToken='',punchBusy=false;const app=document.getElementById('app');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const api=async(body)=>{const r=await fetch(CFG.SUPABASE_URL+'/functions/v1/staff-api',{method:'POST',headers:{'content-type':'application/json','apikey':CFG.SUPABASE_ANON_KEY,'authorization':'Bearer '+idToken},body:JSON.stringify(body)});const x=await r.json();if(!r.ok)throw Object.assign(new Error(x.error||'連線失敗'),{status:r.status,data:x});return x};
async function start(){
  if(!CFG.LINE_LIFF_ID){app.innerHTML='<div class="card"><h2>尚未連接 LINE 測試帳號</h2><p>程式已準備完成。建立 LIFF 後，只需把公開的 LIFF ID 填入 <b>web/config.js</b>。</p></div>';return}
  try{await liff.init({liffId:CFG.LINE_LIFF_ID});if(!liff.isLoggedIn()){liff.login();return}idToken=liff.getIDToken();await load()}
  catch(e){app.innerHTML=`<div class="notice error">${esc(e.message)}</div>`}
}
async function load(){
  try{D=await api({action:'bootstrap'});document.getElementById('hello').textContent=D.me.name+'，今天也辛苦了';document.getElementById('nav').classList.remove('hidden');document.getElementById('swapNav').classList.toggle('hidden',D.me.type!=='full'&&D.me.role!=='manager');if(tab==='requests'&&D.me.type!=='full'&&D.me.role!=='manager')tab='home';show(tab)}
  catch(e){if(e.data?.error==='NOT_BOUND')bindView(e.data.displayName);else app.innerHTML=`<div class="notice error">${esc(e.message)}</div>`}
}
function bindView(name){document.getElementById('hello').textContent=name||'首次使用';app.innerHTML=`<div class="card"><h2>綁定員工身分</h2><p class="muted">請向管理員取得一次性驗證碼。請勿使用其他同事的驗證碼。</p><label>驗證碼</label><input id="bindCode" maxlength="12" autocomplete="one-time-code" style="text-transform:uppercase"><button style="width:100%;margin-top:12px" onclick="bind()">完成綁定</button></div>`}
async function bind(){try{await api({action:'bind',code:document.getElementById('bindCode').value});await load()}catch(e){alert(e.message)}}
function show(k){tab=k;document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===k));render()}
const empName=id=>D.employees.find(e=>e.id===id)?.name||'未排人',storeName=id=>D.stores.find(s=>s.id===id)?.name||id,themeName=id=>D.themes.find(t=>t.id===id)?.name||'其他班';
const shiftName=s=>s.kind==='theme'?themeName(s.themeId):s.kind==='floor'?'駐店場控':s.kind==='cleaning'?'每周大清潔':s.kind==='practice'?'練習場':s.kind==='counter'?(s.storeId==='ms'?'謎先生櫃台':s.storeId==='dz'?'桌遊大忠店櫃台':'櫃台班'):'其他班別';
const myShifts=()=>D.shifts.filter(s=>s.status!=='cancelled'&&(s.assignments||[]).some(a=>a.empId===D.me.id));
function shiftCard(s,all=true){const mine=(s.assignments||[]).some(a=>a.empId===D.me.id);return `<div class="shift ${mine?'mine':''} ${s.status==='cancelled'?'cancelled':''}"><b>${esc(s.date)}　${esc(s.start)}–${esc(s.end)}</b><br>${esc(storeName(s.storeId))}・${esc(shiftName(s))}<br>${all?`<span class="muted">${(s.assignments||[]).map(a=>esc(empName(a.empId))+' ('+esc(a.role)+')').join('、')}</span>`:''}</div>`}
function render(){if(!D)return;if(tab==='home')home();else if(tab==='schedule')schedule();else if(tab==='punch')punchView();else requestView()}
function home(){const today=new Date().toLocaleDateString('sv-SE',{timeZone:'Asia/Taipei'}),list=myShifts().filter(s=>s.date===today),next=myShifts().filter(s=>s.date>today).sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start))[0];app.innerHTML=`<div class="card"><h2>今日班表</h2>${list.map(s=>shiftCard(s)).join('')||'<p class="muted">今天沒有排班</p>'}</div>${next?`<div class="card"><h2>下一個班次</h2>${shiftCard(next,false)}<button class="secondary" onclick="show('requests')">需要讓班或換班</button></div>`:''}<div class="grid"><button onclick="show('punch')">定位打卡</button><button class="secondary" onclick="show('schedule')">查看完整班表</button></div>`}
function schedule(){const list=[...D.shifts].filter(s=>s.status!=='cancelled').sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start));app.innerHTML=`<div class="card"><h2>未來班表</h2><p class="muted">綠底是你的班次；薪資及個人打卡不會顯示給其他員工。</p>${list.map(s=>shiftCard(s)).join('')||'<p>目前沒有班次</p>'}</div>`}
function punchView(){const active=(D.punches||[]).filter(p=>!p.voided_at),last=active[0],on=last?.type==='in',today=new Date().toLocaleDateString('sv-SE',{timeZone:'Asia/Taipei'}),todayShifts=myShifts().filter(s=>s.date===today),day=(D.attendanceDays||[]).find(x=>x.work_date===today);app.innerHTML=`<div class="card"><h2>定位打卡</h2><div class="big ${on?'ok':''}">${on?'上班中':'未上班'}</div>${todayShifts.length?`<p class="muted">今日安排：${todayShifts.map(s=>`${esc(s.start)}–${esc(s.end)} ${esc(storeName(s.storeId))}・${esc(shiftName(s))}`).join('<br>')}</p>`:'<p class="notice">今天沒有找到你的已排班班次；若為臨時支援仍可打卡，但會交由管理員確認。</p>'}<p class="muted">系統以伺服器時間、LINE本人身分及店家定位為準。請允許手機提供精確位置。</p><div class="grid"><button ${on||punchBusy?'disabled':''} onclick="doPunch('in')">上班打卡</button><button class="danger" ${!on||punchBusy?'disabled':''} onclick="doPunch('out')">下班打卡</button></div>${day?`<p class="muted" style="margin-top:10px">今日原始工時：${Math.floor(day.actual_minutes/60)}小時${day.actual_minutes%60}分・<b class="${day.status==='anomaly'?'anomaly':'verified'}">${day.status==='approved'?'已核准計薪':day.status==='anomaly'?'有異常待處理':'待管理員確認'}</b></p>`:''}</div><div class="card"><div class="policy"><b>打卡與薪資制度</b><br>原始打卡無法刪除或改時間；錯卡只能提出申請，由管理員作廢或補登並留下紀錄。時薪計算使用管理員核准的計薪分鐘。</div></div><div class="card"><h2>最近紀錄</h2>${(D.punches||[]).slice(0,16).map(p=>`<div class="record ${p.voided_at?'voided':''}"><div class="row"><span class="grow">${esc(p.ts.replace('T',' '))}</span><b>${p.type==='in'?'上班':'下班'}</b></div><span class="muted">${esc(D.worksites.find(w=>w.id===p.worksite_id)?.name||'管理員補登')}・${p.voided_at?'已作廢':p.review_state==='anomaly'?'異常待確認':'已記錄'}</span></div>`).join('')||'<p class="muted">尚無紀錄</p>'}<button class="secondary" style="margin-top:12px" onclick="toggleCorrection()">申請補卡／更正</button></div><div id="correctionBox" class="card hidden"><h2>補卡申請</h2><label>日期</label><input id="corDate" type="date" value="${today}"><label>申請類型</label><select id="corType" onchange="correctionFields()"><option value="missing_in">補上班卡</option><option value="missing_out">補下班卡</option><option value="correction">更正整日上下班時間</option></select><div id="corTimes"></div><label>原因</label><textarea id="corReason" placeholder="例如：到店後忘記按上班，實際已向店長報到"></textarea><button style="width:100%;margin-top:12px" onclick="submitCorrection()">送交管理員審核</button></div>`;correctionFields()}
function doPunch(type){if(punchBusy)return;if(!navigator.geolocation)return alert('此裝置不支援定位');punchBusy=true;render();navigator.geolocation.getCurrentPosition(async p=>{try{const x=await api({action:'punch',type,latitude:p.coords.latitude,longitude:p.coords.longitude,accuracy:p.coords.accuracy});alert(`${x.site} ${type==='in'?'上班':'下班'}打卡成功\n伺服器時間：${x.ts.replace('T',' ')}${x.warning?'\n\n注意：'+x.warning:''}`);await load()}catch(e){alert(e.message)}finally{punchBusy=false;render()}},e=>{punchBusy=false;render();alert('無法取得定位：'+e.message)},{enableHighAccuracy:true,timeout:20000,maximumAge:0})}
function toggleCorrection(){document.getElementById('correctionBox').classList.toggle('hidden');correctionFields()}
function correctionFields(){const box=document.getElementById('corTimes'),type=document.getElementById('corType')?.value;if(!box)return;box.innerHTML=type==='correction'?'<div class="grid"><div><label>正確上班時間</label><input id="corIn" type="time"></div><div><label>正確下班時間</label><input id="corOut" type="time"></div></div>':'<label>正確時間</label><input id="corTime" type="time">'}
async function submitCorrection(){const type=document.getElementById('corType').value,requested=type==='correction'?{inTime:document.getElementById('corIn').value,outTime:document.getElementById('corOut').value}:{time:document.getElementById('corTime').value};try{await api({action:'attendance-request',requestType:type,punchDate:document.getElementById('corDate').value,reason:document.getElementById('corReason').value,requested});alert('已送交管理員審核，原始紀錄不會被更改');await load();show('punch')}catch(e){alert(e.message)}}
function requestView(){
  if(D.me.type!=='full'&&D.me.role!=='manager'){app.innerHTML='<div class="notice error">換班申請只開放正職員工與管理員使用。</div>';return}
  const own=myShifts().filter(s=>new Date(`${s.date}T${s.start}:00+08:00`).getTime()>Date.now()).sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start));
  app.innerHTML=`<div class="card"><h2>正職換班申請</h2><p class="muted">請回報需要調整的班次與原因。送出後只交給管理員確認，不會自動邀請或通知其他員工。</p><label>需要調整的班次</label><select id="reqShift">${own.map(s=>`<option value="${esc(s.id)}">${s.date} ${s.start}–${s.end} ${esc(storeName(s.storeId))}・${esc(shiftName(s))}</option>`).join('')}</select><label>換班原因與希望如何調整</label><textarea id="reqNote" placeholder="例如：7/20 家庭行程無法上班，希望管理員協助換人"></textarea><button style="width:100%;margin-top:12px" onclick="createRequest()" ${own.length?'':'disabled'}>送交管理員確認</button>${own.length?'':'<p class="notice">目前沒有可申請調整的未來班次。</p>'}</div>`
}
async function createRequest(){try{const x=await api({action:'create-request',shiftId:document.getElementById('reqShift').value,note:document.getElementById('reqNote').value});alert(x.message||'已送交管理員確認');await load();show('home')}catch(e){alert(e.message)}}
const taipeiDate=(offset=0)=>{const d=new Date(Date.now()+offset*86400000);return d.toLocaleDateString('sv-SE',{timeZone:'Asia/Taipei'})};
function dateClass(date){return date<taipeiDate()?'past':date===taipeiDate()?'today':date===taipeiDate(1)?'tomorrow':'future'}
function attendanceState(s){
  const role=(s.assignments||[]).find(a=>a.empId===D.me.id)?.role||'',npc=role.toUpperCase()==='NPC';
  if(npc){const checkin=(D.sessionCheckins||[]).find(x=>x.shift_id===s.id);return checkin?{key:'done',text:`NPC 已報到 ${checkin.checked_in_at.slice(11,16)}`}:{key:'need-in',text:'NPC 尚未報到打卡'}}
  const ps=(D.punches||[]).filter(p=>!p.voided_at&&(p.shift_ids||[]).includes(s.id)).sort((a,b)=>a.ts.localeCompare(b.ts));
  if(!ps.some(p=>p.type==='in'))return {key:'need-in',text:'尚未上班打卡'};
  if(ps[ps.length-1]?.type==='in')return {key:'working',text:'已上班・工作結束記得下班打卡'};
  return {key:'done',text:'上下班打卡已完成'};
}
function shiftCard(s,all=true){
  const assigned=(s.assignments||[]).filter(a=>a.empId),unfilled=(s.assignments||[]).some(a=>!a.empId),mine=assigned.some(a=>a.empId===D.me.id),role=assigned.find(a=>a.empId===D.me.id)?.role||'',npc=role.toUpperCase()==='NPC',state=mine&&s.date<=taipeiDate()?attendanceState(s):null,confirmed=(D.shiftConfirmations||[]).some(x=>x.shift_id===s.id&&x.status==='confirmed');
  const direct=state?.key==='need-in'?`<button style="margin-top:9px" onclick="directShiftPunch('in','${esc(s.id)}')">${npc?'NPC 場次報到':'這一場上班打卡'}</button>`:state?.key==='working'?`<button class="danger" style="margin-top:9px" onclick="directShiftPunch('out','${esc(s.id)}')">這一場下班打卡</button>`:'';
  const receipt=mine&&s.date>=taipeiDate()?(confirmed?'<span class="status done">已確認收到</span>':`<button class="secondary" style="margin-top:9px" onclick="confirmShift('${esc(s.id)}')">確認收到這個班</button>`):'';
  const pastFix=mine&&s.date<taipeiDate()&&state?.key!=='done'?`<button class="secondary" style="margin-top:9px" onclick="openPastCorrection('${esc(s.id)}')">申請這一場補卡</button>`:'';
  const groups=s.candidateGroups||{},candidates=unfilled?`<div class="muted" style="margin-top:7px"><b>建議順序</b><br>① 已在本店且不衝堂：${(groups.onSite||[]).map(esc).join('、')||'無'}<br>② 時間可配合：${(groups.available||[]).map(esc).join('、')||'無'}</div><button class="secondary" style="margin-top:9px" onclick="openGuestReport('${esc(s.id)}')">回報現場／預約客人</button>`:'';
  return `<div class="shift ${dateClass(s.date)} ${unfilled?'unfilled':''} ${state?'attendance-'+state.key:''} ${s.status==='cancelled'?'cancelled':''}"><b>${esc(s.date)}　${esc(s.start)}–${esc(s.end)}</b><br>${esc(storeName(s.storeId))}・${esc(shiftName(s))}<br>${unfilled?`<span class="tag">空場／尚未排人</span>${assigned.length?`<br><span class="muted">已排：${assigned.map(a=>esc(empName(a.empId))+' ('+esc(a.role)+')').join('、')}</span>`:''}`:all?`<span class="muted">${assigned.map(a=>esc(empName(a.empId))+' ('+esc(a.role)+')').join('、')}</span>`:''}${candidates}${mine?`<br>${receipt}`:''}${state?`<br><span class="status ${state.key}">${state.text}</span><br>${s.date===taipeiDate()?direct:pastFix}`:''}</div>`
}
function openGuestReport(id){
  const s=D.shifts.find(x=>x.id===id);if(!s)return alert('找不到這個場次，請重新整理後再試。');
  app.innerHTML=`<div class="card"><h2>回報現場／預約客人</h2><p><b>${esc(s.date)} ${esc(s.start)}–${esc(s.end)}</b><br>${esc(storeName(s.storeId))}・${esc(shiftName(s))}</p><div class="notice">這只是通知管理員，尚未完成正式預約。管理員仍需回到 SimplyBook 處理訂金、確認場次與帶場人員。</div><label>客人類型</label><select id="guestType"><option value="walk_in">現場客人</option><option value="reservation">預約客人</option></select><label>客人姓氏</label><input id="guestSurname" maxlength="30" placeholder="例如：陳"><label>聯絡電話</label><input id="guestPhone" inputmode="tel" maxlength="20" placeholder="例如：0912345678"><label>人數</label><input id="guestParty" type="number" min="1" max="99" value="2"><label>補充說明（可留空）</label><textarea id="guestNote" placeholder="例如：想玩詭店、預計19:00抵達"></textarea><div class="grid" style="margin-top:12px"><button class="secondary" onclick="show('schedule')">返回班表</button><button onclick="submitGuestReport('${esc(id)}')">送交管理員</button></div></div>`;
}
async function submitGuestReport(shiftId){
  try{const x=await api({action:'guest-booking-report',shiftId,customerType:document.getElementById('guestType').value,surname:document.getElementById('guestSurname').value,phone:document.getElementById('guestPhone').value,partySize:Number(document.getElementById('guestParty').value),note:document.getElementById('guestNote').value});alert(x.message);await load();show('schedule')}catch(e){alert(e.message)}
}
async function confirmShift(id){
  const s=D.shifts.find(x=>x.id===id);if(!s)return alert('找不到這個班次，請重新整理後再試。');
  if(!confirm(`確認已收到這個工作安排？\n\n${s.date} ${s.start}–${s.end}\n${storeName(s.storeId)}・${shiftName(s)}`))return;
  try{const x=await api({action:'confirm-shift',shiftId:id});alert(x.message||'已確認');await load()}catch(e){alert(e.message)}
}
function directShiftPunch(type,id){
  if(punchBusy)return;
  const s=D.shifts.find(x=>x.id===id),role=(s?.assignments||[]).find(a=>a.empId===D.me.id)?.role||'';
  if(!s)return alert('找不到這筆場次，請重新整理後再試。');
  const action=type==='in'?'上班':'下班';
  if(!confirm(`確認${action}打卡？\n\n${s.start}–${s.end}　${shiftName(s)}${role?'（'+role+'）':''}\n${storeName(s.storeId)}\n\n系統將立即取得手機精確定位。`))return;
  if(!navigator.geolocation)return alert('此手機不支援定位打卡');
  punchBusy=true;render();
  navigator.geolocation.getCurrentPosition(async p=>{try{
    const x=await api({action:'punch',type,latitude:p.coords.latitude,longitude:p.coords.longitude,accuracy:p.coords.accuracy,shiftIds:type==='in'?[id]:[],workItemCode:''});
    alert(`${x.site} ${x.mode==='session_checkin'?'NPC 場次報到':action+'打卡'}成功\n伺服器時間：${x.ts.replace('T',' ')}\n工作項目：${shiftName(s)}${role?'（'+role+'）':''}${x.mode==='session_checkin'?'\n此場以場次計算，不需要下班打卡。':''}${x.warning?'\n\n提醒：'+x.warning:''}`);
    await load();show('home');
  }catch(e){alert(e.message)}finally{punchBusy=false;render()}},e=>{punchBusy=false;render();alert('無法取得定位：'+e.message)},{enableHighAccuracy:true,timeout:20000,maximumAge:0});
}
function home(){
  const today=taipeiDate(),allToday=D.shifts.filter(s=>s.date===today&&s.status!=='cancelled').sort((a,b)=>a.start.localeCompare(b.start)),mine=allToday.filter(s=>(s.assignments||[]).some(a=>a.empId===D.me.id));

function schedule(){
  const list=[...D.shifts].filter(s=>s.status!=='cancelled').sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start));
  const past=list.filter(s=>s.date<taipeiDate()&&(s.assignments||[]).some(a=>a.empId===D.me.id)),current=list.filter(s=>s.date>=taipeiDate());
  app.innerHTML=`<div class="card"><h2>今日與未來班表</h2><div class="legend"><span class="tomorrow">黃色：明天</span><span class="future">藍色：其他未來日期</span><span class="empty">灰色：空場／尚未排人</span></div><p class="muted">顯示謎先生與勃根地大忠店的主題、櫃台及其他工作；灰色場次表示尚未安排人員。</p>${current.map(s=>shiftCard(s)).join('')||'<p>目前沒有班次</p>'}</div><div class="card"><h2>我的過去班表</h2><p class="muted">過去時間不能補做即時定位打卡；若忘記打卡，請由此送出補卡申請。</p>${past.reverse().map(s=>shiftCard(s,false)).join('')||'<p class="muted">最近沒有過去班表</p>'}</div>`
}
function workLabels(p){return Array.isArray(p?.work_item?.labels)?p.work_item.labels:[]}
function recentSessionsHtml(){
  const punches=[...(D.punches||[])].filter(p=>!p.voided_at).sort((a,b)=>a.ts.localeCompare(b.ts)),rows=[];let open=null;
  for(const p of punches){
    if(p.type==='in'){if(open)rows.push({in:open,out:null});open=p}
    else if(open){rows.push({in:open,out:p});open=null}
    else rows.push({in:null,out:p});
  }
  if(open)rows.push({in:open,out:null});
  return rows.reverse().slice(0,10).map(r=>{const base=r.in||r.out,labels=[...new Set([...workLabels(r.in),...workLabels(r.out)])],date=base?.ts?.slice(0,10)||'',inTime=r.in?.ts?.slice(11,16)||'缺卡',outTime=r.out?.ts?.slice(11,16)||'尚未下班',state=!r.in||!r.out?'異常／未完成':'已完成';return `<div class="record"><div class="row"><span class="grow"><b>${esc(date)}　${esc(inTime)}–${esc(outTime)}</b></span><span class="tag">${state}</span></div><span class="muted">${labels.length?labels.map(esc).join('、'):'工作項目待確認'}<br>${esc(D.worksites.find(w=>w.id===base?.worksite_id)?.name||'管理員補登')}</span></div>`}).join('')||'<p class="muted">尚無紀錄</p>';
}
function punchView(){
  const active=(D.punches||[]).filter(p=>!p.voided_at),last=active[0],on=last?.type==='in',today=taipeiDate(),todayShifts=myShifts().filter(s=>s.date===today).sort((a,b)=>a.start.localeCompare(b.start)),day=(D.attendanceDays||[]).find(x=>x.work_date===today);

  app.innerHTML=`<div class="card"><h2>定位打卡</h2><div class="big ${on?'ok':''}">${on?'上班中':'尚未上班'}</div>${on?`<div class="policy" style="margin-top:10px"><b>本次工作</b><br>${current.map(esc).join('<br>')||'工作項目待管理員確認'}</div>`:`<p><b>請先確認這次要執行的工作（可複選連續場次）</b></p>${choices||'<p class="notice">今天沒有你的排定班次，請以下方「臨時支援」選擇實際工作。</p>'}<label>臨時支援／未列入班表的工作</label><select id="manualWork"><option value="">非臨時支援，或請先選上方場次</option><option value="grandma">外婆</option><option value="haunted_shop">詭店</option><option value="haunted_prison">詭獄</option><option value="shit_power">屎力全開</option><option value="haunted_toilet">詭廁</option><option value="escapee">越獄者</option><option value="orphan">孤兒怨</option><option value="mr_mystery_counter">謎先生櫃台</option><option value="burgundy_counter">桌遊大忠店櫃台</option><option value="weekly_cleaning">每週大清潔</option><option value="practice">練習場</option><option value="floor_support">場控／現場支援</option></select>`}<div class="reminder" style="margin-top:12px">上班與下班都必須人在「謎先生」或「勃根地大忠店」允許範圍內並開啟手機精確定位。下班不必重選項目，會沿用上班紀錄。</div><div class="grid" style="margin-top:12px"><button ${on||punchBusy?'disabled':''} onclick="doPunch('in')">確認項目並上班打卡</button><button class="danger" ${!on||punchBusy?'disabled':''} onclick="doPunch('out')">工作結束・下班打卡</button></div>${day?`<p class="muted" style="margin-top:10px">今日原始工時：${Math.floor(day.actual_minutes/60)}小時${day.actual_minutes%60}分・<b class="${day.status==='anomaly'?'anomaly':'verified'}">${day.status==='approved'?'已核准計薪':day.status==='anomaly'?'有異常待處理':'待管理員確認'}</b></p>`:''}</div><div class="card"><h2>最近打卡紀錄</h2>${(D.punches||[]).slice(0,16).map(p=>`<div class="record ${p.voided_at?'voided':''}"><div class="row"><span class="grow">${esc(p.ts.replace('T',' '))}</span><b>${p.type==='in'?'上班':'下班'}</b></div><span class="muted">${esc(D.worksites.find(w=>w.id===p.worksite_id)?.name||'管理員補登')}・${p.voided_at?'已作廢':p.review_state==='anomaly'?'異常待確認':'已記錄'}${workLabels(p).length?'<br>'+workLabels(p).map(esc).join('、'):''}</span></div>`).join('')||'<p class="muted">尚無紀錄</p>'}<button class="secondary" style="margin-top:12px" onclick="toggleCorrection()">申請補卡／更正</button></div><div id="correctionBox" class="card hidden"><h2>補卡申請</h2><label>日期</label><input id="corDate" type="date" value="${today}"><label>申請類型</label><select id="corType" onchange="correctionFields()"><option value="missing_in">補上班卡</option><option value="missing_out">補下班卡</option><option value="npc_checkin">NPC 補場次報到</option><option value="correction">補／更正完整上下班</option></select><div id="corTimes"></div><label>原因</label><textarea id="corReason" placeholder="例如：到店後忘記按上班，實際已向店長報到"></textarea><button style="width:100%;margin-top:12px" onclick="submitCorrection()">送交管理員審核</button></div>`;
  correctionFields();
  const recent=[...app.querySelectorAll('.card')].find(x=>x.querySelector('h2')?.textContent==='最近打卡紀錄');
  if(recent)recent.innerHTML=`<h2>最近場次紀錄</h2><p class="muted">每個工作時段只顯示一筆，包含上下班時間與工作項目。</p>${recentSessionsHtml()}<button class="secondary" style="margin-top:12px" onclick="toggleCorrection()">申請補卡／更正</button>`;
}
function doPunch(type){
  if(punchBusy)return;
  const shiftIds=type==='in'?[...document.querySelectorAll('.shift-pick:checked')].map(x=>x.value):[],workItemCode=type==='in'?(document.getElementById('manualWork')?.value||''):'';
  if(type==='in'&&!shiftIds.length&&!workItemCode)return alert('請先勾選今天的場次，或選擇一個臨時支援工作項目。');
  if(type==='in'&&shiftIds.length&&workItemCode)return alert('排定場次與臨時支援請擇一，不要同時選取。');
  if(!navigator.geolocation)return alert('此手機不支援定位打卡');

}
const correctionWorkOptions='<option value="">請選擇工作項目</option><option value="grandma">外婆</option><option value="haunted_shop">詭店</option><option value="haunted_prison">詭獄</option><option value="shit_power">屎力全開</option><option value="haunted_toilet">詭廁</option><option value="escapee">越獄者</option><option value="orphan">孤兒怨</option><option value="mr_mystery_counter">謎先生櫃台</option><option value="burgundy_counter">桌遊大忠店櫃台</option><option value="weekly_cleaning">每週大清潔</option><option value="practice">練習場</option><option value="floor_support">場控／現場支援</option>';
function correctionFields(){
  const box=document.getElementById('corTimes'),type=document.getElementById('corType')?.value;if(!box)return;
  const times=type==='correction'?'<div class="grid"><div><label>上班時間</label><input id="corIn" type="time"></div><div><label>下班時間</label><input id="corOut" type="time"></div></div>':`<label>${type==='npc_checkin'?'NPC 報到':type==='missing_in'?'上班':'下班'}時間</label><input id="corTime" type="time">`;
  box.innerHTML=times+`<label>主題／工作項目</label><select id="corWork">${correctionWorkOptions}</select>`;

async function submitCorrection(){
  const type=document.getElementById('corType').value,workItemCode=document.getElementById('corWork')?.value||'',shiftId=document.getElementById('correctionBox')?.dataset.shiftId||'',requested=type==='correction'?{inTime:document.getElementById('corIn').value,outTime:document.getElementById('corOut').value,workItemCode}:{time:document.getElementById('corTime').value,workItemCode,shiftId};
  if(!workItemCode)return alert('請選擇補卡的主題或工作項目。');
  try{await api({action:'attendance-request',requestType:type,punchDate:document.getElementById('corDate').value,reason:document.getElementById('corReason').value,requested});alert('已送交管理員審核；申請包含工作項目與時間。');await load();show('punch')}catch(e){alert(e.message)}

function workCodeForShift(s){
  if(s.kind==='counter')return s.storeId==='ms'?'mr_mystery_counter':'burgundy_counter';
  if(s.kind==='cleaning')return 'weekly_cleaning';if(s.kind==='practice')return 'practice';if(s.kind==='floor')return 'floor_support';
  const n=themeName(s.themeId),map={'外婆':'grandma','詭店':'haunted_shop','詭獄':'haunted_prison','屎力全開':'shit_power','詭廁':'haunted_toilet','越獄者':'escapee','孤兒怨':'orphan'};return map[n]||'';
