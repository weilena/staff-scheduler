<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>LINE@ 員工系統手機預覽</title>
<style>
:root{--ink:#18212f;--muted:#667085;--brand:#176b56;--soft:#edf7f3;--line:#e4e7ec;--warn:#b54708;--blue:#2e90fa}
*{box-sizing:border-box}body{margin:0;background:#edf1f5;color:var(--ink);font-family:system-ui,"Noto Sans TC",sans-serif}.toolbar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);padding:12px;display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap}.toolbar b{margin-right:8px}.role,.view-btn{border:1px solid #d0d5dd;background:#fff;color:#344054;border-radius:999px;padding:8px 13px;font-weight:700;cursor:pointer}.role.on,.view-btn.on{background:#176b56;color:#fff;border-color:#176b56}.hint{width:100%;text-align:center;color:var(--muted);font-size:12px}.stage{padding:18px;display:flex;justify-content:center}.phone{width:390px;height:780px;max-height:calc(100vh - 120px);background:#fff;border:8px solid #1f2937;border-radius:34px;box-shadow:0 18px 50px #10182840;overflow:hidden;position:relative}.screen{height:100%;display:flex;flex-direction:column;background:#f7f8fa}.line-head{height:64px;background:#fff;border-bottom:1px solid #eaecf0;padding:12px 16px;display:flex;gap:12px;align-items:center}.avatar{width:38px;height:38px;border-radius:50%;background:#d1fadf;color:#067647;display:grid;place-items:center;font-weight:900}.grow{flex:1}.small{font-size:12px;color:var(--muted)}.chat{flex:1;padding:18px 14px;background:#92b4df;overflow:auto}.bubble{width:82%;background:#fff;border-radius:16px;padding:13px;margin-bottom:10px;box-shadow:0 1px 2px #10182812}.bubble h2{font-size:17px;margin:0 0 5px}.rich-title{background:#fff;padding:8px 14px;font-size:12px;font-weight:800;border-top:1px solid #d0d5dd}.rich{height:155px;display:grid;grid-template-columns:repeat(3,1fr);background:#fff}.rich button{border:0;border-right:1px solid #ffffff55;color:#fff;font-weight:900;font-size:18px;cursor:pointer}.rich button small{display:block;font-size:11px;margin-top:8px;font-weight:500}.rich button:nth-child(1){background:linear-gradient(135deg,#075c49,#20886c)}.rich button:nth-child(2){background:linear-gradient(135deg,#08788d,#25a5ba)}.rich button:nth-child(3){background:linear-gradient(135deg,#c56c0c,#eea637)}
.app-head{padding:18px 17px 14px;background:linear-gradient(135deg,#123e35,#1f7a62);color:#fff;display:flex;align-items:center;gap:10px}.app-head h1{font-size:20px;margin:0}.close{border:0;background:#ffffff22;color:#fff;border-radius:50%;width:34px;height:34px;font-size:18px;cursor:pointer}.content{flex:1;overflow:auto;padding:13px 13px 76px}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:11px;box-shadow:0 2px 8px #1018280a}.card h2{font-size:18px;margin:0 0 10px}.shift{border-left:5px solid #f79009;padding:11px;background:#fef7c3;border-radius:9px;margin:8px 0}.shift.working{background:#eaf2ff;border-color:var(--blue)}.shift.done{background:#dcfae6;border-color:#079455}.status{display:inline-block;margin-top:7px;padding:4px 8px;border-radius:99px;background:#fff4e5;color:var(--warn);font-size:12px;font-weight:800}.button{display:block;width:100%;border:0;border-radius:10px;background:var(--brand);color:#fff;padding:11px;font-weight:800;margin-top:9px;cursor:pointer}.secondary{background:#eef2f6;color:#18212f}.danger{background:#d92d20}.notice{background:#fff4e5;color:#b54708;padding:11px;border-radius:10px;font-size:13px;margin:8px 0}.admin-box{background:#eff8ff;border:1px solid #b2ddff;color:#175cd3}.tabs{position:absolute;bottom:0;left:0;right:0;display:flex;background:#fff;border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}.tabs button{flex:1;border:0;background:#fff;color:var(--muted);font-size:11px;font-weight:700;padding:12px 2px;cursor:pointer}.tabs button.on{background:var(--soft);color:var(--brand)}label{font-size:12px;font-weight:800;display:block;margin:8px 0 4px}select,textarea{width:100%;border:1px solid #d0d5dd;border-radius:9px;padding:9px;background:#fff;font:inherit}.hidden{display:none!important}@media(max-width:520px){.toolbar{padding:8px}.toolbar b{width:100%;text-align:center}.stage{padding:0}.phone{width:100%;height:calc(100vh - 126px);max-height:none;border:0;border-radius:0;box-shadow:none}}
</style></head><body>
<div class="toolbar"><b>LINE@ 手機預覽</b><button class="role on" data-role="part">A 兼職</button><button class="role" data-role="full">B 正職</button><button class="role" data-role="manager">C 管理員</button><button class="view-btn on" data-view="chat">LINE 聊天室</button><button class="view-btn" data-view="app">員工系統</button><div class="hint">這是安全預覽，不會寫入真實班表、打卡或薪資資料。</div></div>
<div class="stage"><div class="phone"><div id="screen" class="screen"></div></div></div>
<script>
let role='part',view='chat',tab='home';
const roleName=()=>role==='part'?'A・兼職人員':role==='full'?'B・正職人員':'C・管理員';
document.querySelectorAll('.role').forEach(b=>b.onclick=()=>{role=b.dataset.role;tab='home';document.querySelectorAll('.role').forEach(x=>x.classList.toggle('on',x===b));render()});
document.querySelectorAll('.view-btn').forEach(b=>b.onclick=()=>openView(b.dataset.view));
function openView(v,t){view=v;if(t)tab=t;document.querySelectorAll('.view-btn').forEach(x=>x.classList.toggle('on',x.dataset.view===v));render()}
function render(){document.getElementById('screen').innerHTML=view==='chat'?chat():employeeApp()}
function chat(){return `<div class="line-head"><div class="avatar">M</div><div class="grow"><b>mythworker</b><div class="small">員工排班與打卡</div></div><b>☰</b></div><div class="chat"><div class="bubble"><h2>${roleName()}</h2><div class="small">歡迎使用員工專區。請從下方固定選單進入班表、定位打卡或備品系統。</div></div><div class="bubble"><b>明日工作提醒</b><div class="small" style="margin-top:5px">07/16 13:30–22:00・桌遊大忠店櫃台<br>請確認班表；如需調整，正職與管理員可在員工系統提出換班。</div></div></div><div class="rich-title">mythworker 員工專區</div><div class="rich"><button onclick="openView('app','home')">查看班表<small>我的班次與全員班表</small></button><button onclick="openView('app','punch')">定位打卡<small>手機定位上下班</small></button><button onclick="inventoryPreview()">謎先生備品<small>備品查詢與管理</small></button></div>`}
function employeeApp(){const canSwap=role!=='part',canAdmin=role==='manager';return `<div class="app-head"><button class="close" onclick="openView('chat')">‹</button><div class="grow"><h1>員工排班與打卡</h1><div class="small" style="color:#ffffffcc">${roleName()}・庭瑋（預覽）</div></div></div><div class="content">${tabContent(canSwap,canAdmin)}</div><div class="tabs"><button class="${tab==='home'?'on':''}" onclick="go('home')">今日班表</button><button class="${tab==='schedule'?'on':''}" onclick="go('schedule')">班表</button><button class="${tab==='punch'?'on':''}" onclick="go('punch')">打卡</button>${canSwap?`<button class="${tab==='swap'?'on':''}" onclick="go('swap')">換班</button>`:''}</div>`}
function go(t){tab=t;render()}
function tabContent(canSwap,canAdmin){
 if(tab==='punch')return `<div class="card"><h2>定位打卡</h2><b style="font-size:26px">未上班</b><p class="small">今日安排：13:30–22:00 桌遊大忠店櫃台</p><div class="notice">請抵達店內並開啟手機精確定位後再打卡。</div><button class="button" onclick="demoAlert('預覽模式不會建立真實上班卡')">上班打卡</button><button class="button danger" disabled>下班打卡</button></div><div class="card"><h2>最近紀錄</h2><div class="small">07/14 13:28 上班・大忠店・已記錄<br><br>07/14 22:03 下班・大忠店・待管理員確認</div><button class="button secondary" onclick="demoAlert('正式版可提出補卡申請')">申請補卡／更正</button></div>`;
 if(tab==='schedule')return `<div class="card"><h2>${role==='part'?'我的班表':'全員班表與我的班次'}</h2><div class="shift done"><b>07/15　13:30–22:00</b><br>桌遊大忠店櫃台・庭瑋（櫃台）</div><div class="shift"><b>07/16　14:00–15:30</b><br>謎先生・詭店・庭瑋（場控）</div><div class="shift working"><b>07/18　19:00–20:30</b><br>謎先生・外婆・千喜（NPC）</div><p class="small">兼職預設以個人班次為主；正職與管理員可查看今日完整班別，以便提出人力調整。</p></div>`;
 if(tab==='swap'&&canSwap)return `<div class="card"><h2>正職換班申請</h2><p class="small">選擇今日所有場次或自己的未來班次，送出後由管理員確認，不會直接更動正式班表。</p><label>需要調整的班別</label><select><option>07/16 14:00–15:30 詭店・場控：庭瑋</option><option>07/18 19:00–20:30 外婆・NPC：千喜</option></select><label>主要原因</label><select><option>臨時加場，人力調換</option><option>緊急事故發生，人力調換</option><option>員工個人身體有狀況，人力調換</option><option>其他</option></select><label>原因補充（選填）</label><textarea rows="3" placeholder="可補充希望如何調整"></textarea><button class="button" onclick="demoAlert('預覽模式不會送出換班申請')">送交管理員確認</button>${canAdmin?'<div class="notice admin-box">管理員送出申請後，也需留下審核紀錄。</div>':''}</div>`;
 return `<div class="card"><h2>我的今日班表</h2><div class="shift"><b>13:30–22:00</b><br>桌遊大忠店櫃台・庭瑋（櫃台）<span class="status">尚未上班打卡</span><button class="button">這一班上班打卡</button></div><div class="shift working"><b>15:20–17:00</b><br>謎先生・詭獄・庭瑋（場控）<div class="notice" style="margin-top:8px">櫃台班同時負責本主題場控，會納入場次統計。</div></div></div>${canAdmin?'<div class="card admin-box"><h2>管理員專區</h2><p class="small">排班、指派場控、審核換班／補卡、查看全體工時與薪資。</p><button class="button" onclick="demoAlert(\'正式版會開啟管理後台\')">開啟管理後台</button></div>':''}${role==='full'?'<div class="card"><h2>正職權限</h2><p class="small">可提出換班；若另有新人訓練授權，也能安排訓練場與陪練人員。</p></div>':''}`
}
function inventoryPreview(){demoAlert('正式版會開啟「謎先生備品」Google Apps Script 系統')}
function demoAlert(s){alert(s+'。\n\n這是安全預覽，不會修改真實資料。')}
render();
</script></body></html>
