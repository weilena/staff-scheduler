<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排班打卡系統(雲端版)|大忠店・謎先生</title>
<meta name="build-version" content="2026-07-14-mobile-scheduling">
<style>
:root{
  --accent:#2563eb; --accent2:#7c3aed; --bg:#f4f6fa; --card:#fff;
  --line:#e2e8f0; --txt:#1e293b; --muted:#64748b; --warn:#d97706; --danger:#dc2626; --ok:#059669;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--txt);font-size:15px}
header{background:#0f172a;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:50}
header h1{font-size:17px;font-weight:700}
nav{display:flex;flex-direction:column;gap:5px;flex:1;min-width:0}
.navmain{display:flex;gap:4px;flex-wrap:wrap}
nav button{background:transparent;border:none;color:#cbd5e1;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:14px}
nav button:hover{background:#1e293b;color:#fff}
.navmain button.on{background:var(--accent);color:#fff;font-weight:600}
.subnav{display:flex;gap:4px;flex-wrap:wrap;background:#1e293b;border-radius:9px;padding:3px;align-self:flex-start}
.subnav button{padding:5px 12px;font-size:13px;color:#94a3b8}
.subnav button.on{background:#475569;color:#fff;font-weight:600}
.attendance-scroll{overflow:auto;max-width:100%;max-height:68vh;overscroll-behavior:contain;border:1px solid #e2e8f0;border-radius:10px}
.attendance-matrix{border-collapse:collapse;min-width:1200px;margin:0}
.attendance-matrix th,.attendance-matrix td{min-width:112px;vertical-align:top;font-size:12px;line-height:1.35}
.attendance-matrix .row-label{position:sticky;left:0;z-index:2;min-width:145px;max-width:145px;font-weight:700}
.attendance-matrix thead th{position:sticky;top:0;z-index:3;text-align:center}
.attendance-matrix thead .row-label{z-index:4}
.att-source{font-size:10px;color:#64748b;overflow-wrap:anywhere}
.att-segment{padding:3px 0;border-bottom:1px dotted #94a3b8}.att-segment:last-child{border:0}
.att-ok{color:#15803d;font-weight:700}.att-pending{color:#b45309;font-weight:700}.att-error{color:#b91c1c;font-weight:700}
main{max-width:1280px;margin:18px auto;padding:0 14px 60px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
.card h2{font-size:16px;margin-bottom:12px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.grow{flex:1}
button.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:14px}
button.btn.gray{background:#e2e8f0;color:var(--txt)}
button.btn.red{background:var(--danger)}
button.btn.green{background:var(--ok)}
button.btn.sm{padding:4px 9px;font-size:13px}
input,select{border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:14px;background:#fff;color:var(--txt);font-family:inherit}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{border:1px solid var(--line);padding:7px 9px;text-align:left;vertical-align:middle}
th{background:#f1f5f9;font-weight:600;white-space:nowrap}
.muted{color:var(--muted);font-size:13px}
.badge{display:inline-block;padding:1px 8px;border-radius:20px;font-size:12px;color:#fff}
.tag{display:inline-block;padding:1px 7px;border-radius:6px;font-size:12px;background:#eef2ff;color:#3730a3;margin:1px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{background:#fff;border:none;padding:7px 14px;cursor:pointer;font-size:14px;border-right:1px solid var(--line)}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--accent);color:#fff;font-weight:600}
/* 月曆 */
.mhead{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.mhead div{text-align:center;font-size:13px;color:var(--muted);padding:4px}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.mday{background:#fff;border:1px solid var(--line);border-radius:8px;min-height:96px;padding:4px;cursor:pointer;display:flex;flex-direction:column;gap:2px;overflow:hidden}
.mday:hover{border-color:var(--accent)}
.mday.dim{background:#f8fafc;opacity:.55}
.mday.today{border-color:var(--accent);box-shadow:0 0 0 2px #bfdbfe}
.mday.hasunstaffed{background:#fef3c7;border-color:#f59e0b}
.mday.avon{background:#ecfdf5;border-color:#6ee7b7}
.mday.avoff{background:#f1f5f9}
.schedwrap{display:flex;gap:14px;align-items:flex-start}
.schedmain{flex:1;min-width:0}
.loadpanel{width:210px;flex-shrink:0;position:sticky;top:64px;max-height:calc(100vh - 80px);overflow-y:auto;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px}
.loadpanel>summary{cursor:pointer;font-weight:700;list-style:none}
.loadpanel>summary::-webkit-details-marker{display:none}
.loadpanel>summary::after{content:'收合';float:right;color:var(--muted);font-size:11px;font-weight:400}
.loadpanel:not([open])>summary::after{content:'展開'}
.loadpanel-body{margin-top:7px}
.loadrow{padding:5px 6px;border-radius:7px;cursor:pointer;margin-bottom:3px}
.loadrow:hover{background:#f1f5f9}
.loadrow.heavy{background:#fff7ed}
.loadname{font-size:13px;font-weight:600}
.loadbar{height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin:3px 0}
.loadbar>div{height:100%;background:var(--accent)}
.loadrow.heavy .loadbar>div{background:#f59e0b}
.leavered{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}
@media(max-width:1024px){.schedwrap{flex-direction:column}.loadpanel{width:100%;position:static;max-height:none;order:-1}}
.mnum{font-size:12.5px;color:var(--muted);font-weight:600}
.chip{border-radius:5px;padding:1px 5px;font-size:11px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.chip.unstaffed{outline:2px dashed #fca5a5;outline-offset:-2px}
.chip:hover{filter:brightness(1.12)}
/* 週曆 */
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.day{background:#fff;border:1px solid var(--line);border-radius:10px;min-height:130px;padding:8px;display:flex;flex-direction:column;gap:6px}
.day.today{border-color:var(--accent);box-shadow:0 0 0 2px #bfdbfe}
.day h4{font-size:13px;color:var(--muted);display:flex;justify-content:space-between}
.shift{border-radius:8px;padding:6px 8px;font-size:12.5px;cursor:pointer;color:#fff;line-height:1.45}
.shift:hover{filter:brightness(1.08)}
.shift .who{opacity:.92}
/* 日場次 */
.slotrow{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.slotbox{border-radius:8px;padding:5px 9px;font-size:12.5px;cursor:pointer;border:1.5px solid var(--line);background:#f8fafc;color:var(--muted);line-height:1.4}
.slotbox:hover{border-color:var(--accent);color:var(--accent)}
.slotbox.staffed{background:#d1fae5;border-color:#6ee7b7;color:#065f46}
.slotbox.unstaffed{background:#fef3c7;border-color:#fcd34d;color:#92400e}
.slotbox b{font-size:12.5px}
.day-toolbar{position:sticky;top:54px;z-index:20;background:#fff;padding:8px 0;border-bottom:1px solid var(--line)}
.day-manpower{position:sticky;top:105px;z-index:19;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:10px;box-shadow:0 3px 10px rgba(15,23,42,.06)}
.day-manpower-list{display:flex;gap:5px;flex-wrap:nowrap;margin-top:7px;overflow-x:auto;padding:1px 2px 5px;scrollbar-width:thin}
.person-day{padding:5px 8px;border-radius:8px;font-size:12px;border:1px solid #cbd5e1;line-height:1.35}
.emp-tag{display:inline-block;padding:1px 6px;border-radius:6px;font-size:11.5px;margin:1px;border:1px solid rgba(15,23,42,.12);white-space:nowrap}
.bulkbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:#eff6ff;border:1px solid #93c5fd;border-radius:10px;padding:9px 10px;margin-bottom:10px}
.bulk-picked{outline:3px solid #2563eb!important;outline-offset:1px;box-shadow:0 0 0 2px #fff inset}
.bulk-check{font-weight:800;margin-right:4px}
.day-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:10px}
.day-canvas{min-width:900px}
.day-canvas .slotrow{flex-wrap:nowrap}
.day-canvas table th:first-child{position:sticky;left:0;z-index:4;box-shadow:2px 0 3px rgba(15,23,42,.08)}
.counter-lane{display:grid;grid-template-columns:150px 1fr;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:8px;background:#fff}
.counter-lane>strong{padding:10px;background:#f1f5f9}
.counter-lane .slotrow{padding:7px}
@media(max-width:640px){
  header{padding:8px 10px;gap:7px}header h1{font-size:15px}nav{width:100%}.navmain,.subnav{flex-wrap:nowrap;overflow-x:auto;width:100%}nav button{white-space:nowrap;padding:6px 9px}
  main{padding:0 5px 70px;margin-top:6px}.card{padding:8px;border-radius:8px}.row{gap:6px}
  .seg{width:100%}.seg button{flex:1;padding:8px 6px}
  .schedwrap{display:block}.loadpanel{width:100%;position:static;max-height:none;order:0;margin-top:12px;padding:9px}.loadpanel:not([open]){display:block}
  .bulkbar{overflow-x:auto;flex-wrap:nowrap;padding:7px}.bulkbar>*{flex:0 0 auto}.bulkbar .muted{display:none}
  .day-toolbar{top:45px;flex-wrap:nowrap;overflow-x:auto;padding:7px 2px;white-space:nowrap}.day-toolbar input{width:136px}
  .day-manpower{top:96px;padding:7px 8px;margin-bottom:7px}.day-manpower-list{margin-top:5px}
  .person-day{min-width:118px;flex:0 0 118px;padding:5px 7px}
  .sync-health{display:block}.sync-health+.muted{display:none}.day-canvas{min-width:880px}
  .counter-lane{grid-template-columns:128px 1fr}.counter-lane>strong{position:sticky;left:0;z-index:5}
  .slotbox{min-width:92px}.mgrid{gap:2px}.mday{padding:3px}.chip{font-size:10.5px}
}
dialog{border:none;border-radius:14px;padding:0;max-width:560px;width:94vw;box-shadow:0 20px 60px rgba(0,0,0,.3)}
dialog::backdrop{background:rgba(15,23,42,.45)}
.dlg-h{background:#0f172a;color:#fff;padding:12px 18px;font-size:15px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.dlg-h button{background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer}
.dlg-b{padding:16px 18px;display:flex;flex-direction:column;gap:12px;max-height:70vh;overflow-y:auto}
.dlg-f{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:13px;color:var(--muted)}
.slot{display:flex;gap:6px;align-items:center;background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:6px}
.warn{color:var(--warn);font-size:12.5px}
.timebtns{display:flex;gap:5px;flex-wrap:wrap}
.timebtns button{border:1px solid var(--line);background:#fff;border-radius:7px;padding:4px 9px;font-size:13px;cursor:pointer}
.timebtns button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.punch-btns{display:flex;gap:14px;margin:10px 0}
.punch-btns button{flex:1;padding:20px;font-size:19px;border-radius:14px}
.big-status{font-size:15px;padding:10px 12px;border-radius:10px;background:#f1f5f9}
.cancelled{opacity:.58;text-decoration:line-through;filter:grayscale(.7)}
.pill{padding:2px 10px;border-radius:20px;font-size:12.5px;font-weight:600}
.pill.in{background:#d1fae5;color:#065f46}
.pill.out{background:#e2e8f0;color:#334155}
.skmat{overflow-x:auto}
.skmat th,.skmat td{white-space:nowrap;text-align:center}
.skmat td:first-child,.skmat th:first-child{position:sticky;left:0;background:#fff;text-align:left;z-index:2}
.skmat th:first-child{background:#f1f5f9}
.cklab{display:inline-flex;align-items:center;gap:3px;margin:0 5px;font-size:13px;cursor:pointer}
.num{text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:860px){.week{grid-template-columns:1fr 1fr}.day{min-height:auto}.mday{min-height:64px}}
@media(max-width:520px){.week{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>🗓️ 排班打卡系統 <span style="font-size:11px;background:#059669;padding:2px 8px;border-radius:10px">雲端</span></h1>
  <nav id="nav"></nav>
</header>
<main id="view"></main>

<dialog id="dlgShift">
  <div class="dlg-h"><span id="dlgShiftTitle">新增班次</span><button onclick="dlgShift.close()">✕</button></div>
  <div class="dlg-b">
    <div class="row">
      <div class="field grow"><label>日期</label><input type="date" id="sfDate" onchange="refreshSlotOptions();renderQuick();renderCoverageHint()"></div>
      <div class="field grow"><label>店別</label><select id="sfStore" onchange="onShiftStoreKind()"></select></div>
      <div class="field grow"><label>類型</label>
        <select id="sfKind" onchange="onShiftStoreKind()">
          <option value="theme">主題場次</option>
          <option value="counter">櫃台班</option>
          <option value="floor">駐店場控班</option>
          <option value="cleaning">每周大清潔</option>
          <option value="practice">訓練場（依實際打卡時數）</option>
        </select>
      </div>
    </div>
    <div id="sfCoverageHint" style="display:none;background:#fff1f2;border:1px solid #fb7185;color:#9f1239;border-radius:9px;padding:9px 11px;font-weight:700"></div>
    <div class="field" id="sfThemeWrap"><label>主題</label><select id="sfTheme" onchange="onThemeChange()"></select>
      <div class="timebtns" id="sfSlotTimes" style="margin-top:5px"></div>
    </div>
    <div class="row">
      <div class="field grow"><label>開始</label><input type="time" id="sfStart" onchange="onStartChange()"></div>
      <div class="field grow"><label>結束</label><input type="time" id="sfEnd" onchange="refreshSlotOptions()"></div>
    </div>
    <div class="timebtns" id="sfQuick"></div>
    <div class="field">
      <label>人員安排(所有人都可選;⚠ 會註明原因;選了未勾技能的人,儲存時自動更新技能表)</label>
      <div id="sfSlots" style="display:flex;flex-direction:column;gap:6px"></div>
      <div><button class="btn gray sm" onclick="addSlot()">＋ 新增人員欄位</button></div>
    </div>
    <div class="field" id="sfLinkedThemes" style="display:none;background:#fffbeb;border:1px solid #fcd34d;border-radius:10px;padding:10px 12px">
      <label>對應主題場控場次</label>
      <p class="muted" style="margin-bottom:8px">櫃台／駐店人員同時帶主題時，請勾選實際場次並指定場控人員；謎先生與大忠店場次都可選，薪資會計入場控場次。</p>
      <div id="sfLinkedThemeList"></div>
    </div>
    <div class="field"><label>備註</label><input id="sfNote" placeholder="選填"></div>
    <div id="sfCustomer" style="display:none;background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13.5px;line-height:1.7"></div>
    <div class="field" style="border-top:1px dashed var(--line);padding-top:10px">
      <label>場次狀態</label>
      <select id="sfStatus" onchange="onStatusChange()">
        <option value="active">正常</option>
        <option value="cancelled_typhoon">🌀 颱風天取消(給客人一個月內改期/退費)</option>
        <option value="cancelled_customer">客人取消</option>
        <option value="cancelled_other">其他原因取消</option>
      </select>
    </div>
    <div class="field" id="sfCancelBox" style="display:none">
      <div class="row">
        <div class="field grow"><label>改期期限(颱風天預設一個月)</label><input type="date" id="sfRebookDue"></div>
        <div class="field grow"><label>處理狀態</label>
          <select id="sfRebookState" onchange="onRebookStateChange()">
            <option value="pending">待客人改期</option>
            <option value="rebooked">已改期</option>
            <option value="refunded">已退費</option>
          </select>
        </div>
      </div>
      <div class="field" id="sfRebookLinkBox" style="display:none;background:#eff6ff;border:1px solid #93c5fd;border-radius:9px;padding:9px 10px">
        <label>連結新的 SimplyBook 預約編號</label>
        <select id="sfRebookShift"></select>
        <p class="muted" style="margin-top:5px">只列出同主題、尚未取消的未來 SimplyBook 場次；請依預約編號人工確認，不以姓名或電話自動配對。</p>
      </div>
      <label>取消/處理備註</label><input id="sfCancelNote" placeholder="例:已致電通知,客人考慮中">
    </div>
  </div>
  <div class="dlg-f">
    <button class="btn red" id="sfDelete" onclick="deleteShift()">刪除</button>
    <button class="btn gray" id="sfWriteback" onclick="writebackShift()" title="把此場次的負責人回寫到 SimplyBook(可能觸發客人通知信)">⇪ 回寫 SimplyBook</button>
    <span class="grow"></span>
    <button class="btn gray" onclick="dlgShift.close()">取消</button>
    <button class="btn" onclick="saveShift()">儲存</button>
  </div>
</dialog>

<dialog id="dlgEmp">
  <div class="dlg-h"><span id="dlgEmpTitle">新增員工</span><button onclick="dlgEmp.close()">✕</button></div>
  <div class="dlg-b">
    <div class="field"><label>姓名</label><input id="efName"></div>
    <div class="row">
      <div class="field grow"><label>身分</label>
        <select id="efType"><option value="part">兼職(時薪)</option><option value="full">正職(月薪)</option></select>
      </div>
      <div class="field grow"><label>個人時薪(元・優先)</label><input type="number" id="efRate" min="0" placeholder="有填就優先於訓練場／場控預設時薪"></div>
      <div class="field grow"><label>月薪(元)</label><input type="number" id="efSalary" min="0" placeholder="正職用"></div>
    </div>
    <div class="field"><label>打卡 PIN(4–6 位數字;店員手機 QR 打卡用,留空=不開放)</label><input id="efPin" maxlength="6" inputmode="numeric" placeholder="例:1234"></div>
    <div class="row">
      <div class="field"><label>SimplyBook 員工顏色</label><input type="color" id="efColorPicker" value="#64748b" oninput="document.getElementById('efColor').value=this.value"></div>
      <div class="field grow"><label>員工色號</label><input id="efColor" maxlength="7" placeholder="#34bbf1" oninput="if(/^#[0-9a-fA-F]{6}$/.test(this.value))document.getElementById('efColorPicker').value=this.value"></div>
    </div>
    <div class="row" id="efOtRow" style="display:none">
      <div class="field grow"><label>月標準時數(正職;超過才算加班)</label><input type="number" id="efStdHours" min="0" step="0.5" placeholder="例:176(月休8天×8h)"></div>
      <div class="field grow"><label>加班時薪(元/時)</label><input type="number" id="efOtRate" min="0" placeholder="留空=用左邊時薪"></div>
      <div class="field grow"><label>超過40場每場加給</label><input type="number" id="efExtraSessionRate" min="0" placeholder="依員工設定"></div>
    </div>
    <div class="row">
      <div class="field grow"><label>到職日</label><input type="date" id="efStartDate"></div>
      <div class="field grow"><label>離職日(最後工作日)</label><input type="date" id="efEndDate"></div>
    </div>
    <label class="cklab" style="margin:0"><input type="checkbox" id="efActive" checked> 在職中(停用後不出現在排班與打卡)</label>
    <label class="cklab" style="margin-top:10px"><input type="checkbox" id="efPracticeScheduler"> 授權安排新人訓練場（限需要負責人資安排的正職）</label>
  </div>
  <div class="dlg-f">
    <button class="btn red" id="efDelete" onclick="deleteEmp()">刪除</button>
    <span class="grow"></span>
    <button class="btn gray" onclick="dlgEmp.close()">取消</button>
    <button class="btn" onclick="saveEmp()">儲存</button>
  </div>
</dialog>

<dialog id="dlgTheme">
  <div class="dlg-h"><span id="dlgThemeTitle">新增主題</span><button onclick="dlgTheme.close()">✕</button></div>
  <div class="dlg-b">
    <div class="field"><label>主題名稱</label><input id="tfName"></div>
    <div class="row">
      <div class="field grow"><label>店別</label><select id="tfStore"></select></div>
      <div class="field grow"><label>場次長度(分鐘)</label><input type="number" id="tfDur" min="10" step="5" value="90"></div>
    </div>
    <div class="field"><label>場次時刻表(用逗號或頓號分隔,例:10:00、11:40)</label><input id="tfSlots" placeholder="10:00、11:40、13:20"></div>
    <div class="row">

<script>
/* ============ 資料 ============ */
const ROLES=['場控','NPC','櫃台','訓練場','陪練'];
const THEME_ROLE_RULES={
  '詭廁':['NPC'],
  '詭獄':['場控','NPC'],'詭獄加場':['場控','NPC'],
  '詭店':['NPC'],
  '孤兒怨':['場控'],'屎力全開':['場控'],'越獄者':['場控'],'外婆':['場控']
};
/* 必須排滿才算完整的角色(未列出的主題=與可排角色相同)。
   詭獄／詭獄加場:場控「可排但不強制」——櫃台接場控時可掛,但沒掛不算缺人,才不會整片黃底。
   ※ 這是老闆確認的規則,調整前請先確認。 */
const THEME_REQUIRED_ROLES={'詭獄':['NPC'],'詭獄加場':['NPC']};
function allowedThemeRoles(t){return t?(THEME_ROLE_RULES[t.name]||[]):[]}
function requiredThemeRoles(t){return t?(THEME_REQUIRED_ROLES[t.name]||allowedThemeRoles(t)):[]}
function themeAllows(t,role){return allowedThemeRoles(t).includes(role)}
const ADMIN_WORK_ITEMS={grandma:'外婆',haunted_shop:'詭店',haunted_prison:'詭獄',shit_power:'屎力全開',haunted_toilet:'詭廁',escapee:'越獄者',orphan:'孤兒怨',mr_mystery_counter:'謎先生櫃台',burgundy_counter:'桌遊大忠店櫃台',weekly_cleaning:'每週大清潔',practice:'訓練場',floor_support:'場控／現場支援'};
function adminWorkOptions(){return '<option value="">— 選擇本次工作 —</option>'+Object.entries(ADMIN_WORK_ITEMS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
function adminWorkItem(code){const label=ADMIN_WORK_ITEMS[code];return label?{source:'admin_correction',code,label,labels:[label]}:null}
const WD=['日','一','二','三','四','五','六'];
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function defaultAvail(){const a={};for(let i=0;i<7;i++)a[i]={on:true,start:'09:00',end:'22:30'};return a}
function seedThemes(){
  return [
    {id:'gc', storeId:'dz',name:'詭廁',    dur:90, needGM:0,needNPC:1,payGM:300,payNPC:450,active:true,slots:['10:00','11:40','13:20','15:00','16:40','18:20','20:00']},
    {id:'gy', storeId:'ms',name:'詭獄',    dur:110,needGM:1,needNPC:1,payGM:300,payNPC:450,active:true,slots:['10:00','12:00','14:00','16:00','18:00','20:00']},
    {id:'gyx',storeId:'ms',name:'詭獄加場',dur:110,needGM:1,needNPC:1,payGM:300,payNPC:450,active:true,slots:['11:00','13:00','15:00','17:00','19:00']},
    {id:'gd', storeId:'ms',name:'詭店',    dur:100,needGM:0,needNPC:1,payGM:300,payNPC:550,active:true,slots:['09:30','11:20','13:10','15:00','16:50','18:40','20:30']},
    {id:'gea',storeId:'dz',name:'孤兒怨',  dur:90, needGM:1,needNPC:0,payGM:300,payNPC:0,active:true,slots:['10:30','12:10','13:50','15:30','17:10','18:50','20:30']},
    {id:'slqk',storeId:'dz',name:'屎力全開',dur:100,needGM:1,needNPC:0,payGM:300,payNPC:0,active:true,slots:['09:50','11:40','13:30','15:20','17:20','19:10','21:00']},
    {id:'yyz',storeId:'dz',name:'越獄者',  dur:80, needGM:1,needNPC:0,payGM:300,payNPC:0,active:true,slots:['09:30','11:00','12:30','14:00','15:30','17:00','18:30','20:00']},
    {id:'wp', storeId:'ms',name:'外婆',    dur:60, needGM:1,needNPC:0,payGM:300,payNPC:0,active:true,slots:['09:40','11:10','12:40','14:10','15:40','17:10','18:40','20:10']}
  ];
}
/* ============ 雲端儲存層(Supabase)============ */
let S=null,sbc=null,currentAdminUser=null,ADMIN_USERS=[],adminUsersLoaded=false,adminUsersLoading=false;
let LINE={accounts:[],worksites:[],requests:[],responses:[],guestReports:[],attendance:[],overtime:[],usage:[],outbox:[],syncRuns:[]};
function isDemo(){return (window.CFG&&CFG.DEMO)||/[?&]demo=1/.test(location.search)}
function seedConfig(){
  return {
    stores:[{id:'dz',name:'勃根地大忠店',color:'#111827'},{id:'ms',name:'謎先生',color:'#e5e7eb'}],
    themes:seedThemes(),
    settings:{prepMin:10,travelMin:12,npcMaxChain:2,npcRestMin:30,rollingGapMin:30},
    closedDates:[],
    employees:[]
  };
}
async function boot(){
  document.getElementById('view').innerHTML='<p class="muted" style="padding:20px">連線中…</p>';
  if(isDemo()&&!window.DEMO_DATA){ // 試玩模式:載入示範資料(6/1–7/5 真實場次,客人姓名已移除)
    await new Promise(function(res){
      const s=document.createElement('script');
      s.src='demo-data.js';s.onload=res;s.onerror=res;
      document.head.appendChild(s);
    });
  }
  sbc=isDemo()?makeMockSb():supabase.createClient(CFG.SUPABASE_URL,CFG.SUPABASE_ANON_KEY);
  const r=await sbc.auth.getSession();
  if(!(r.data&&r.data.session)&&!isDemo()){
    document.getElementById('loginOv').style.display='flex';
    document.getElementById('view').innerHTML='';
    return;
  }
  await afterLogin();
}
async function doLogin(){
  const em=document.getElementById('liEmail').value.trim();
  const pw=document.getElementById('liPw').value;
  const r=await sbc.auth.signInWithPassword({email:em,password:pw});
  if(r.error){document.getElementById('liMsg').textContent='登入失敗:'+r.error.message;return}
  document.getElementById('loginOv').style.display='none';
  await afterLogin();
}
async function afterLogin(){
  const authUser=await sbc.auth.getUser();
  currentAdminUser=authUser.data?.user||null;
  let cfgRes=await sbc.from('config').select('data').eq('id',1).maybeSingle();
  let cfg=cfgRes.data;
  if(!cfg||!cfg.data){const d=seedConfig();await sbc.from('config').upsert({id:1,data:d});cfg={data:d}}
  const shRes=await sbc.from('shifts').select('id,data');
  const puRes=await sbc.from('punches').select('*');
  const ciRes=await sbc.from('session_checkins').select('*');
  const cfRes=await sbc.from('shift_confirmations').select('*');
  S=Object.assign({},cfg.data,{
    shifts:(shRes.data||[]).map(function(r){return r.data}),
    punches:(puRes.data||[]).map(function(p){return{id:p.id,empId:p.emp_id,type:p.type,ts:p.ts,source:p.source,worksiteId:p.worksite_id,verification:p.verification,reviewState:p.review_state,voidedAt:p.voided_at,voidReason:p.void_reason,shiftIds:p.shift_ids||[],raw:p.raw||{},workItem:p.raw?.work_item||null}}),
    sessionCheckins:(ciRes.data||[]).map(function(x){return{id:x.id,empId:x.emp_id,shiftId:x.shift_id,checkedInAt:x.checked_in_at,worksiteId:x.worksite_id,verification:x.verification,source:x.source,note:x.note||''}}),
    shiftConfirmations:(cfRes.data||[]).map(function(x){return{shiftId:x.shift_id,empId:x.emp_id,status:x.status,confirmedAt:x.confirmed_at}})
  });
  // 舊資料仍可能使用「練習場」角色名稱；載入時改為「訓練場」並回存，
  // 保留原本 kind=practice 識別碼，避免影響既有打卡與薪資關聯。
  const legacyTraining=S.shifts.filter(function(sh){
    let changed=false;(sh.assignments||[]).forEach(function(a){if(a.role==='練習場'){a.role='訓練場';changed=true}});return changed;
  });
  if(legacyTraining.length)setTimeout(function(){
    sbc.from('shifts').upsert(legacyTraining.map(function(sh){return{id:sh.id,date:sh.date,source:String(sh.id).startsWith('sb_')?'simplybook':'manual',data:sh}}));
  },0);
  if(!S.settings)S.settings={prepMin:10,travelMin:12};
  if(S.settings.npcMaxChain==null)S.settings.npcMaxChain=2;
  if(S.settings.npcRestMin==null)S.settings.npcRestMin=30;
  if(S.settings.reminderHour==null)S.settings.reminderHour=20;
  if(!Array.isArray(S.settings.shiftPresets)){S.settings.shiftPresets=[
    {id:'dz_full_mon_wed',label:'大忠正職週一至週三',storeId:'dz',kind:'counter',start:'13:30',end:'22:00',days:[1,2,3]},
    {id:'dz_full_fri',label:'大忠正職週五',storeId:'dz',kind:'counter',start:'13:30',end:'22:00',days:[5]},
    {id:'dz_full_weekend',label:'大忠正職週六日',storeId:'dz',kind:'counter',start:'12:30',end:'22:00',days:[6,0]}
  ];setTimeout(save,0)}
  if(!S.settings.shiftPresets.some(p=>p.id==='dz_full_fri')){
    S.settings.shiftPresets.push({id:'dz_full_fri',label:'大忠正職週五',storeId:'dz',kind:'counter',start:'13:30',end:'22:00',days:[5]});setTimeout(save,0);
  }
  if(!Array.isArray(S.closedDates))S.closedDates=[];
  let payrollDefaultsChanged=false;
  S.themes.forEach(function(t){
    if(!Array.isArray(t.slots))t.slots=[];if(t.payGM==null)t.payGM=300;if(t.payNPC==null)t.payNPC=0;
    const required=requiredThemeRoles(t),needGM=required.includes('場控')?1:0,needNPC=required.includes('NPC')?1:0;
    if(t.needGM!==needGM){t.needGM=needGM;payrollDefaultsChanged=true}
    if(t.needNPC!==needNPC){t.needNPC=needNPC;payrollDefaultsChanged=true}
    if((t.id==='gc'||t.name==='詭廁')&&t.slots.includes('20:20')){
      t.slots=[...new Set(t.slots.map(function(x){return x==='20:20'?'20:00':x}))].sort();
      payrollDefaultsChanged=true;
    }
    if(t.payGMHoliday==null){t.payGMHoliday=t.payGM;payrollDefaultsChanged=true}
    if(t.payNPCHoliday==null){t.payNPCHoliday=t.payNPC;payrollDefaultsChanged=true}
    const rates={
      '詭獄':{npc:450,npcHoliday:650,gm:300,gmHoliday:500},'詭獄加場':{npc:450,npcHoliday:650,gm:300,gmHoliday:500},
      '詭店':{npc:550,npcHoliday:750},'詭廁':{npc:450,npcHoliday:650}
    }[t.name];
    if(rates){for(const [k,v] of Object.entries({payNPC:rates.npc,payNPCHoliday:rates.npcHoliday,payGM:rates.gm,payGMHoliday:rates.gmHoliday})){if(v!=null&&t[k]!==v){t[k]=v;payrollDefaultsChanged=true}}}
  });
  // 技能資格只保留各主題實際存在的角色；不改歷史派班與打卡紀錄。
  S.employees.forEach(function(e){
    e.skills=e.skills||{};
    for(const tid of Object.keys(e.skills)){
      const t=S.themes.find(x=>x.id===tid);
      if(!t){delete e.skills[tid];payrollDefaultsChanged=true;continue}
      const valid=[...new Set((e.skills[tid]||[]).filter(role=>themeAllows(t,role)))];
      if(JSON.stringify(valid)!==JSON.stringify(e.skills[tid]||[])){e.skills[tid]=valid;payrollDefaultsChanged=true}
    }
  });
  if(S.settings.practiceHourlyRate==null){S.settings.practiceHourlyRate=196;payrollDefaultsChanged=true}
  if(S.settings.controllerHourlyRate==null){S.settings.controllerHourlyRate=196;payrollDefaultsChanged=true}
  if(S.settings.floorHourlyRate==null){S.settings.floorHourlyRate=200;payrollDefaultsChanged=true}
  if(S.settings.rollingGapMin==null){S.settings.rollingGapMin=30;payrollDefaultsChanged=true}
  if(payrollDefaultsChanged)setTimeout(save,0);
  // 只修正排班系統手動建立的舊詭廁場次；SimplyBook 場次仍以來源資料為準。
  const legacyToiletShifts=S.shifts.filter(function(sh){
    const theme=S.themes.find(function(t){return t.id===sh.themeId});
    return !String(sh.id).startsWith('sb_')&&theme&&(theme.id==='gc'||theme.name==='詭廁')&&sh.start==='20:20';
  });
  legacyToiletShifts.forEach(function(sh){sh.start='20:00';sh.end='21:30'});
  if(legacyToiletShifts.length)setTimeout(function(){
    sbc.from('shifts').upsert(legacyToiletShifts.map(function(sh){return{id:sh.id,date:sh.date,source:'manual',data:sh}}));
  },0);
  S.employees.forEach(function(e){if(!e.availX)e.availX={};if(e.startDate==null)e.startDate='';if(e.endDate==null)e.endDate=''});
  // 店別黑白對比色(舊藍/紫自動換成黑/白;若使用者自訂過非舊色則保留)
  {let changed=false;S.stores.forEach(function(s){
    if(s.id==='dz'&&(s.color==='#2563eb'||!s.color)){s.color='#111827';changed=true;}
    if(s.id==='ms'&&(s.color==='#7c3aed'||!s.color)){s.color='#e5e7eb';changed=true;}
  });if(changed)save();}
  // 自動櫃台班若出錯,記錄但不中斷後台載入(避免整個後台開不起來)
  try{await ensureYijiaCounterSchedule()}catch(err){console.error('翊嘉固定櫃台班自動建立失敗',err)}
  try{await ensureMsCounterFromThemeControl()}catch(err){console.error('謎先生櫃台自動連結失敗',err)}
  await loadLineAdmin();
  renderNav();render();
  startSyncHealthTicker();
}
/* 同步狀態每 60 秒自動更新(修正:頁面久開顯示舊快照,誤以為同步停了) */
let syncTicker=null;
function startSyncHealthTicker(){
  if(syncTicker||isDemo())return;
  syncTicker=setInterval(async function(){
    try{
      const r=await sbc.from('integration_sync_runs').select('*').order('started_at',{ascending:false}).limit(20);
      if(r.data){LINE.syncRuns=r.data;document.querySelectorAll('.sync-health').forEach(el=>{el.outerHTML=syncHealthHtml()});}
    }catch(e){}
  },60000);
}
async function loadLineAdmin(){
  if(isDemo()){LINE={accounts:[],worksites:S.stores.map(s=>({id:s.id,name:s.name,radius_m:200,enabled:true})),requests:[],responses:[],guestReports:[],attendance:[],daily:[],overtime:[],usage:[],outbox:[],syncRuns:[]};return}
  const names=['line_accounts','worksites','shift_requests','shift_request_responses','attendance_requests','attendance_daily','overtime_reviews','message_usage','notification_outbox','integration_sync_runs'];
  const [rs,guests]=await Promise.all([Promise.all(names.map(n=>sbc.from(n).select('*'))),guestAdminApi({action:'list'})]);
  LINE={accounts:rs[0].data||[],worksites:rs[1].data||[],requests:rs[2].data||[],responses:rs[3].data||[],guestReports:guests.reports||[],attendance:rs[4].data||[],daily:rs[5].data||[],overtime:rs[6].data||[],usage:rs[7].data||[],outbox:rs[8].data||[],syncRuns:(rs[9].data||[]).sort((a,b)=>String(b.started_at).localeCompare(String(a.started_at))).slice(0,20)};
}
async function guestAdminApi(body){
  const session=await sbc.auth.getSession(),token=session.data?.session?.access_token;if(!token)throw new Error('管理員登入已過期，請重新登入');
  const r=await fetch(CFG.SUPABASE_URL+'/functions/v1/guest-reports-admin',{method:'POST',headers:{'content-type':'application/json','apikey':CFG.SUPABASE_ANON_KEY,'authorization':'Bearer '+token},body:JSON.stringify(body)}),x=await r.json();
  if(!r.ok)throw new Error(x.error||'客人回報服務連線失敗');return x;
}
let saveTimer=null;
function save(){
  if(!S)return;
  const cfg=Object.assign({},S);delete cfg.shifts;delete cfg.punches;delete cfg.sessionCheckins;delete cfg.shiftConfirmations;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    sbc.from('config').upsert({id:1,data:cfg,updated_at:new Date().toISOString()})
      .then(function(r){if(r.error)alert('雲端儲存失敗:'+r.error.message)});
  },400);
}
function dbUpsertShift(obj){
  const src=String(obj.id).indexOf('sb_')===0?'simplybook':'manual';
  sbc.from('shifts').upsert({id:obj.id,date:obj.date,source:src,data:obj})
    .then(function(r){if(r.error)alert('班次儲存失敗:'+r.error.message)});
}
function dbDeleteShift(id){
  sbc.from('shifts').delete().eq('id',id)
    .then(function(r){if(r.error)alert('刪除失敗:'+r.error.message)});
}
function dbInsertPunch(p,srcName){
  sbc.from('punches').insert({id:p.id,emp_id:p.empId,ts:p.ts,type:p.type,source:srcName||'admin'})
    .then(function(r){if(r.error)alert('打卡儲存失敗:'+r.error.message)});
}
function dbDeletePunch(id){
  sbc.from('punches').delete().eq('id',id)
    .then(function(r){if(r.error)alert('刪除失敗:'+r.error.message)});
}
function makeMockSb(){
  const db={config:null,shifts:new Map(),punches:new Map()};
  if(window.DEMO_DATA){
    const D=window.DEMO_DATA;
    db.config={data:JSON.parse(JSON.stringify(D.config))};
    (D.shifts||[]).forEach(function(s){db.shifts.set(s.id,{id:s.id,date:s.date,source:'demo',data:JSON.parse(JSON.stringify(s))})});
    (D.punches||[]).forEach(function(p){db.punches.set(p.id,{id:p.id,emp_id:p.empId,ts:p.ts,type:p.type,source:'demo'})});
  }
  function ok(d){return{data:d,error:null}}
  function table(t){
    return{
      select:function(){
        return{
          eq:function(){return{maybeSingle:function(){return Promise.resolve(ok(t==='config'?db.config:null))}}},
          then:function(res){
            const d=t==='shifts'?Array.from(db.shifts.values()):t==='punches'?Array.from(db.punches.values()):[];
            res(ok(d));
          }
        };
      },
      upsert:function(row){
        const rows=Array.isArray(row)?row:[row];
        if(t==='config')db.config={data:rows[0].data};
        else if(t==='shifts')rows.forEach(function(x){db.shifts.set(x.id,x)});
        else if(t==='punches')rows.forEach(function(x){db.punches.set(x.id,x)});
        return Promise.resolve(ok(null));
      },
      insert:function(row){
        if(t==='punches')db.punches.set(row.id,row);
        return Promise.resolve(ok(null));
      },
      delete:function(){
        return{
          eq:function(col,v){
            if(t==='shifts')db.shifts.delete(v);
            if(t==='punches'){
              if(col==='emp_id'){Array.from(db.punches.values()).forEach(function(p){if(p.emp_id===v)db.punches.delete(p.id)})}
              else db.punches.delete(v);
            }
            return Promise.resolve(ok(null));
          },
          neq:function(){
            if(t==='shifts')db.shifts.clear();
            if(t==='punches')db.punches.clear();
            return Promise.resolve(ok(null));
          }
        };
      }
    };
  }

async function ensureYijiaCounterSchedule(){
  const e=S.employees.find(x=>x.active&&x.name==='翊嘉');if(!e)return;
  // 從當月 1 日開始補齊，避免月中才開啟管理後台時，當月前半段的固定櫃台班漏失。
  // 未來仍預建 75 天；週四、公休、翊嘉請休及已有人工排班的日期都不會被覆蓋。
  const now=new Date(todayStr()+'T00:00:00'),start=new Date(now.getFullYear(),now.getMonth(),1),end=new Date(now);end.setDate(end.getDate()+75);
  const rows=[]; // 收集待寫入的自動櫃台班(先前漏宣告會讓整個自動排班中斷)
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    const ds=fmtDate(d),hours=dzCounterDefaultTime(ds),availability=effectiveAvail(e,ds);if(!hours||!employedOn(e,ds)||!availability?.on)continue;

      const sh=existing[0];sh.assignments=sh.assignments||[];sh.assignments.push({role:'櫃台',empId:e.id});sh.autoAssigned='yijia_fixed_counter';rows.push(sh);continue;
    }

    S.shifts.push(sh);rows.push(sh);
  }
  if(!rows.length)return;

async function ensureMsCounterFromThemeControl(){

  const groups=new Map();
  for(const sh of S.shifts){
    if(sh.date<firstDay||sh.storeId!=='ms'||sh.kind!=='theme'||isCx(sh))continue;
    const t=theme(sh.themeId),name=t?baseThemeName(t):'';

    // 只用主題場次直接排定的場控作為來源，避免自動櫃台班的連結反向重複推算。
    for(const a of sh.assignments||[]){
      if(!a.empId||a.role!=='場控')continue;
      const key=sh.date+'|'+a.empId,g=groups.get(key)||{date:sh.date,empId:a.empId,start:sh.start,end:sh.end,links:[]};
      if(sh.start<g.start)g.start=sh.start;if(sh.end>g.end)g.end=sh.end;
      g.links.push({shiftId:sh.id,empId:a.empId});groups.set(key,g);
    }
  }
  const rows=[],activeIds=new Set();
  for(const g of groups.values()){
    const id=prefix+g.date.replaceAll('-','')+'_'+g.empId,manual=activeCounterShifts(g.date,'ms').find(sh=>sh.id!==id&&!String(sh.autoAssigned||'').startsWith('theme_controller_')&&(sh.assignments||[]).some(a=>a.empId===g.empId));

    const i=S.shifts.findIndex(sh=>sh.id===id);if(i>=0)S.shifts[i]=obj;else S.shifts.push(obj);rows.push(obj);
  }

  }
  if(!rows.length)return;
  const result=await sbc.from('shifts').upsert(rows.map(sh=>({id:sh.id,date:sh.date,source:'manual',data:sh})));

}

/* 區間內每位在職員工的場控/NPC場數統計 */
function staffLoad(from,to){
  const map={};
  for(const e of S.employees.filter(x=>x.active))map[e.id]={e,gm:0,npc:0,other:0,counted:new Set()};
  const add=(empId,sh,role)=>{
    const row=map[empId];if(!row)return;const key=sh.id+'|'+role;if(row.counted.has(key))return;row.counted.add(key);
    if(sh.kind==='theme'){
      const t=theme(sh.themeId);if(!t||!themeAllows(t,role))return;
      if(role==='NPC')row.npc++;else if(role==='場控')row.gm++;
    }else row.other++;
  };
  for(const sh of S.shifts){
    if(isCx(sh)||sh.date<from||sh.date>to)continue;
    for(const a of sh.assignments){
      if(a.empId)add(a.empId,sh,a.role);
    }
  }
  for(const source of S.shifts){
    if(isCx(source)||source.date<from||source.date>to)continue;
    for(const link of source.linkedThemeAssignments||[]){const target=byId(S.shifts,link.shiftId);if(link.empId&&target&&!isCx(target))add(link.empId,target,'場控')}
  }
  // 累積場數:兼職與正職一律計「場控＋NPC」
  const arr=Object.values(map).map(x=>({...x,total:x.gm+x.npc+x.other,displayTotal:x.gm+x.npc}));
  arr.sort((a,b)=>b.displayTotal-a.displayTotal);
  const active=arr.filter(x=>x.displayTotal>0);
  const avg=active.length?active.reduce((s,x)=>s+x.displayTotal,0)/active.length:0;
  const maxT=arr.length?arr[0].displayTotal:0;
  return {arr,avg,maxT};
}

/* 是否已取消(涵蓋 cancelled / cancelled_typhoon / cancelled_customer / cancelled_other)*/
function isCx(sh){return sh.status&&String(sh.status).indexOf('cancelled')===0}
function cxLabel(sh){
  if(sh.status==='cancelled_typhoon'){
    if(sh.rebook?.state==='rebooked'&&sh.rebook?.newShiftId){const next=byId(S.shifts,sh.rebook.newShiftId);return next?`🌀已改期→${next.date} ${next.start}`:'🌀已改期'}
    if(sh.rebook?.state==='refunded')return '🌀已退費';
    return '🌀待改期';
  }
  if(sh.status==='cancelled_customer')return '已取消(客人)';
  if(isCx(sh))return '已取消';
  return '';
}
function syncHealthHtml(){
  const latest=(LINE.syncRuns||[])[0];
  if(!latest)return `<span class="sync-health muted">SimplyBook：等待第一次背景同步</span>`;
  const when=new Date(latest.finished_at||latest.started_at).toLocaleString('zh-TW',{hour12:false});
  if(latest.status==='error')return `<span class="sync-health" style="color:#b91c1c">⚠ SimplyBook 同步失敗・${esc(when)}・${esc(latest.error_message||'請查看同步紀錄')}</span>`;
  if(latest.status==='running')return `<span class="sync-health" style="color:#0369a1">↻ SimplyBook 同步中・${esc(when)}</span>`;
  return `<span class="sync-health" style="color:#047857">● SimplyBook 已同步・${esc(when)}・讀取 ${latest.fetched_count||0} 筆／更新 ${latest.changed_count||0} 筆</span>`;
}
async function syncSimplyBookNow(){
  if(isDemo())return alert('試玩模式不會連接 SimplyBook。');
  const btn=document.getElementById('syncNowBtn');
  if(btn){btn.disabled=true;btn.textContent='同步中…'}
  try{
    const session=(await sbc.auth.getSession()).data.session;
    const response=await fetch(`${CFG.SUPABASE_URL}/functions/v1/sb-sync?apply=1&source=admin`,{
      method:'POST',headers:{Authorization:`Bearer ${session.access_token}`,'Content-Type':'application/json'},body:'{}'
    });
    const result=await response.json();
    if(!response.ok)throw new Error(result.error||`HTTP ${response.status}`);
    await afterLogin();
    alert(result.skipped?'剛剛已同步過，資料已是最新。':`同步完成：讀取 ${(result.fetched?.active||0)+(result.fetched?.cancelled||0)} 筆，更新 ${(result.changes?.upsert||0)+(result.changes?.markCancelled||0)} 筆。`);
  }catch(error){alert('SimplyBook 同步失敗：'+error.message)}
  finally{if(btn){btn.disabled=false;btn.textContent='立即同步'}}
}

async function applyBulkEmployee(){
  const e=emp(bulkEmp),selected=[...bulkSelected].map(id=>byId(S.shifts,id)).filter(Boolean);
  if(!e)return alert('請先選擇要安排的員工。');
  if(!selected.length)return alert('請先勾選至少一個班次。');
  if(!confirm(`將 ${e.name} 以「${bulkRole}」安排到已選的 ${selected.length} 個班次？\n系統會略過撞班、超出可上班時間及跨店移動不足的班次。`))return;
  let added=0;const skipped=[];
  for(const sh of selected.sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start))){
    if((sh.assignments||[]).some(a=>a.empId===e.id&&a.role===bulkRole))continue;
    const oldEdit=editShiftId;editShiftId=sh.id;const warnings=empWarnings(e,sh.date,sh.start,sh.end,sh.storeId,bulkRole);editShiftId=oldEdit;
    if(warnings.length){skipped.push(`${sh.date} ${sh.start} ${shiftLabel(sh)}：${warnings.join('、')}`);continue;}
    const prev=JSON.parse(JSON.stringify(sh));sh.assignments=sh.assignments||[];
    const empty=sh.assignments.find(a=>!a.empId&&a.role===bulkRole);
    if(empty)empty.empId=e.id;else sh.assignments.push({role:bulkRole,empId:e.id});
    if(sh.kind==='theme'&&(bulkRole==='場控'||bulkRole==='NPC')){e.skills=e.skills||{};const roles=e.skills[sh.themeId]||[];if(!roles.includes(bulkRole))e.skills[sh.themeId]=[...roles,bulkRole]}
    if(bulkRole==='櫃台'){e.counters=e.counters||[];if(!e.counters.includes(sh.storeId))e.counters.push(sh.storeId)}
    if(String(sh.id).startsWith('sb_'))sh.manualEdit=true;
    await dbUpsertShift(sh);notifyShiftAssignments(sh,prev);added++;
  }
  save();bulkSelected.clear();render();
  alert(`批次安排完成：新增 ${added} 筆。${skipped.length?`\n略過 ${skipped.length} 筆：\n`+skipped.slice(0,8).join('\n'):''}`);
}

  return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return fmtDate(x)});
}

async function copyManualWeekToNext(){
  const days=weekDates(weekAnchor),nextDays=days.map(ds=>{const d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+7);return fmtDate(d)});
  const source=S.shifts.filter(sh=>days.includes(sh.date)&&!isCx(sh)&&!String(sh.id).startsWith('sb_'));
  if(!source.length)return alert('本週沒有可複製的人工班次。SimplyBook 場次不會由這裡複製。');
  if(!confirm(`將本週 ${source.length} 筆人工班次複製到下週？\n\n包含櫃台、清潔、訓練場、駐店及人工建立的班次；不包含 SimplyBook 同步場次。`))return;
  let added=0;
  for(const sh of source){
    const date=nextDays[days.indexOf(sh.date)],exists=S.shifts.some(x=>x.date===date&&x.storeId===sh.storeId&&x.kind===sh.kind&&x.themeId===sh.themeId&&x.start===sh.start&&x.end===sh.end);
    if(exists)continue;
    const copy={...JSON.parse(JSON.stringify(sh)),id:uid(),date,status:'active',recurringFrom:sh.id};
    S.shifts.push(copy);dbUpsertShift(copy);added++;
  }
  const d=new Date(weekAnchor+'T00:00:00');d.setDate(d.getDate()+7);weekAnchor=fmtDate(d);render();alert(`已新增 ${added} 筆下週班次；重複時段已略過。`);
}

/* NPC 連場檢查:連續 npcMaxChain 場後必須休息(間隔 < npcRestMin 分視為連場);場控不受限 */
function npcChainWarning(e,date,start,end){
  const max=S.settings.npcMaxChain??2, rest=S.settings.npcRestMin??30;
  if(!max)return null;
  const list=S.shifts
    .filter(sh=>sh.id!==editShiftId&&sh.date===date&&sh.assignments.some(a=>a.empId===e.id&&a.role==='NPC'))
    .map(sh=>({s:toMin(sh.start),e:toMin(sh.end)}));
  list.push({s:toMin(start),e:toMin(end),cand:true});
  list.sort((a,b)=>a.s-b.s);
  let chain=[list[0]];
  const chains=[chain];
  for(let i=1;i<list.length;i++){
    if(list[i].s-list[i-1].e<rest)chain.push(list[i]);
    else{chain=[list[i]];chains.push(chain)}
  }
  const c=chains.find(ch=>ch.some(x=>x.cand));
  if(c&&c.length>max)return `NPC 連${max}場需休息(此場將是連續第${c.length}場)`;
  return null;
}
/* 核心衝突檢查:開場前 prepMin 分鐘就要到位;跨店需留 travelMin 分鐘路程 */
function empWarnings(e,date,start,end,storeId,role){
  const w=[];
  if(!employedOn(e,date)){
    if(e.startDate&&date<e.startDate)w.push(`尚未到職(${e.startDate})`);
    else if(e.endDate&&date>e.endDate)w.push(`已離職(${e.endDate})`);
    else w.push('已停用');
  }
  const prep=S.settings.prepMin||0, travel=S.settings.travelMin||0;
  const s=toMin(start)!=null?toMin(start)-prep:null, en=toMin(end);
  const av=effectiveAvail(e,date);
  if(!av||!av.on)w.push(e.availX&&e.availX[date]?'當日排休/回報不可':'當日未回報可上班');
  else if(s!=null&&en!=null&&(toMin(av.start)>s||toMin(av.end)<en))w.push(`超出可上班時段${av.start}–${av.end}(開場前${prep}分要到)`);
  if(s==null||en==null)return w;
  for(const sh of S.shifts){
    if(sh.id===editShiftId||sh.date!==date||isCx(sh))continue;
    const mine=sh.assignments.find(a=>a.empId===e.id);
    if(!mine)continue;
    const mw=asgWindow(sh,mine); // 櫃台/駐店個別時段:只算此人自己的時段
    const s2=toMin(mw.start)-prep, e2=toMin(mw.end);
    const sameStore=sh.storeId===storeId;
    const gap=sameStore?0:travel;
    if(s<e2+gap&&en+gap>s2){
      w.push(sameStore
        ?`衝堂:${mw.start}–${mw.end} ${shiftLabel(sh)}`
        :`跨店路程不足${travel}分:${store(sh.storeId)?.name||''} ${mw.start}–${mw.end} ${shiftLabel(sh)}`);
    }
  }
  if(role==='NPC'){
    const nw=npcChainWarning(e,date,start,end);
    if(nw)w.push(nw);
  }
  return w;
}
function eligibleFor(){

}
function renderSlots(){
  const storeId=document.getElementById('sfStore').value;
  const themeId=document.getElementById('sfTheme').value;
  const date=document.getElementById('sfDate').value;
  const start=document.getElementById('sfStart').value,end=document.getElementById('sfEnd').value;

  document.getElementById('sfSlots').innerHTML=dlgSlotsArr.map((sl,i)=>{
    const cands=eligibleFor();
    const cur=sl.empId&&!cands.some(c=>c.id===sl.empId)?emp(sl.empId):null;
    const list=cur?[cur,...cands]:cands;
    const good=[],bad=[];
    const slotStart=sl.start||start,slotEnd=sl.end||end; // 每人可有個別時段
    for(const e of list){
      const w=empWarnings(e,date,slotStart,slotEnd,storeId,sl.role);

      (w.length?bad:good).push({e,w});
    }
    const opt=({e,w})=>`<option value="${e.id}" ${e.id===sl.empId?'selected':''}>${w.length?'⚠ ':''}${esc(e.name)}${w.length?' — '+w.join(';'):''}</option>`;
    const opts=`<option value="">(未指定)</option>`
      +(good.length?`<optgroup label="✓ 可排(無碰撞)">${good.map(opt).join('')}</optgroup>`:'')
      +(bad.length?`<optgroup label="⚠ 有狀況(仍可強制選)">${bad.map(opt).join('')}</optgroup>`:'');
    const timeInputs=(kind==='counter'||kind==='floor')
      ?`<input type="time" value="${slotStart||''}" onchange="slotTime(${i},'start',this.value)" title="此人開始時間" style="width:auto"><span class="muted">–</span><input type="time" value="${slotEnd||''}" onchange="slotTime(${i},'end',this.value)" title="此人結束時間" style="width:auto">`
      :'';
    return `<div class="slot">

function notifyShiftAssignments(obj,prev){
  if(isDemo()||isCx(obj))return;
  const oldSig=prev?`${prev.date}|${prev.storeId}|${prev.kind}|${prev.themeId||''}`:'',newSig=`${obj.date}|${obj.storeId}|${obj.kind}|${obj.themeId||''}`;
  for(const a of obj.assignments||[]){
    if(!a.empId)continue;
    const w=asgWindow(obj,a); // 通知用「這個人自己的時段」(櫃台兩人分段時各收各的時間)
    const prevA=(prev?.assignments||[]).find(x=>x.empId===a.empId&&x.role===a.role);
    const prevW=prevA?asgWindow(prev,prevA):null;
    const existed=!!prevA&&oldSig===newSig&&prevW&&prevW.start===w.start&&prevW.end===w.end;if(existed)continue;
    sbc.from('notification_outbox').upsert({recipient_emp_id:a.empId,category:'shift_assigned',critical:true,payload:{title:'新的工作安排',text:`${obj.date}(週${WD[dateWD(obj.date)]}) ${w.start}–${w.end} ${store(obj.storeId)?.name||''}・${shiftLabel(obj)}（${a.role}），請至 LINE 班表確認。`},idempotency_key:`manual-shift:${obj.id}:${a.empId}:${obj.date}:${w.start}:${w.end}`},{onConflict:'idempotency_key',ignoreDuplicates:true});
  }
}
function saveShift(){
  const date=document.getElementById('sfDate').value;
  const start=document.getElementById('sfStart').value,end=document.getElementById('sfEnd').value;
  if(!date||!start||!end)return alert('請填日期與起訖時間');
  if(toMin(end)<=toMin(start))return alert('結束時間需晚於開始時間');
  if(S.closedDates.includes(date)&&!confirm('該日為店休日,仍要建立班次?'))return;
  const kind=document.getElementById('sfKind').value;
  if(kind==='theme'){
    const t=theme(document.getElementById('sfTheme').value),invalid=dlgSlotsArr.find(s=>!allowedThemeRoles(t).includes(s.role));
    if(invalid)return alert(`${t?.name||'此主題'}沒有「${invalid.role}」角色，請刪除或改成技能表允許的角色。`);
  }
  const prev=editShiftId?byId(S.shifts,editShiftId):null;
  const statusVal=document.getElementById('sfStatus').value;
  const isCancel=statusVal.indexOf('cancelled')===0;
  const rebookState=document.getElementById('sfRebookState').value,selectedNewShiftId=document.getElementById('sfRebookShift').value,newShiftId=statusVal==='cancelled_typhoon'&&rebookState==='rebooked'?selectedNewShiftId:'';
  if(statusVal==='cancelled_typhoon'&&rebookState==='rebooked'&&!newShiftId)return alert('請選擇要連結的新 SimplyBook 場次。');
  const linkedThemeAssignments=(kind==='counter'||kind==='floor')?dlgLinkedThemeArr.filter(x=>x.shiftId&&x.empId).map(x=>({shiftId:x.shiftId,empId:x.empId})):[];
  const incompleteLinked=(kind==='counter'||kind==='floor')&&dlgLinkedThemeArr.some(x=>!x.empId);
  if(incompleteLinked)return alert('請替每個勾選的主題場次指定實際場控人員。');
  const assignedPeople=new Set(dlgSlotsArr.map(x=>x.empId).filter(Boolean));
  if(linkedThemeAssignments.some(x=>!assignedPeople.has(x.empId)))return alert('主題場控必須是這個櫃台／駐店班已安排的人員。');
  const obj={
    id:editShiftId||uid(),date,storeId:document.getElementById('sfStore').value,kind,
    themeId:kind==='theme'?document.getElementById('sfTheme').value:null,
    start,end,note:document.getElementById('sfNote').value.trim(),
    assignments:dlgSlotsArr.map(s=>({role:s.role,empId:s.empId,...(s.start?{start:s.start}:{}),...(s.end?{end:s.end}:{})})),linkedThemeAssignments,
    status:isCancel?statusVal:'active'
  };
  // 櫃台/駐店:班別時間自動涵蓋所有人的個別時段,不會遺漏任何人的班
  if(kind==='counter'||kind==='floor'){
    // 防呆1:個別時段顛倒
    for(const a of obj.assignments){
      if(a.empId&&a.start&&a.end&&toMin(a.end)<=toMin(a.start))
        return alert(`${emp(a.empId)?.name||'人員'} 的個別時段「${a.start}–${a.end}」結束需晚於開始,請修正`);
    }
    // 防呆2:同一人被排兩列
    const ids=obj.assignments.filter(a=>a.empId).map(a=>a.empId);
    const dup=ids.find((x,i)=>ids.indexOf(x)!==i);
    if(dup)return alert(`${emp(dup)?.name||'同一人'} 在此班被排了兩列;請刪掉一列,直接調整另一列的個別時段即可`);
    const ws=obj.assignments.filter(a=>a.empId).map(a=>asgWindow(obj,a));
    if(ws.length){
      const s0=ws.map(x=>x.start).sort()[0],e0=ws.map(x=>x.end).sort().pop();
      if(s0&&s0<obj.start)obj.start=s0;
      if(e0&&e0>obj.end)obj.end=e0;
      // 防呆3:交接空檔提醒(不硬擋)——例如梨梨到15:00、庭瑋16:30才來,中間櫃台沒人
      const mins=ws.map(w=>[toMin(w.start),toMin(w.end)]).sort((a,b)=>a[0]-b[0]);
      let cur=mins[0][1];const gaps=[];
      for(let i=1;i<mins.length;i++){if(mins[i][0]>cur)gaps.push(fromMin(cur)+'–'+fromMin(mins[i][0]));cur=Math.max(cur,mins[i][1]);}
      if(gaps.length&&!confirm(`注意:${shiftLabel(obj)}在 ${gaps.join('、')} 沒有人顧,確定要儲存?`))return;
    }
  }
  // 正常場次保留客資；颱風待改期期間暫留聯絡資料。一般取消、已改期或已退費立即移除舊場次客資。
  const keepPersonal=!isCancel||(statusVal==='cancelled_typhoon'&&rebookState==='pending');
  if(prev){if(keepPersonal&&prev.customer)obj.customer=prev.customer;if(keepPersonal&&prev.payment)obj.payment=prev.payment;if(prev.sourceUpdatedAt)obj.sourceUpdatedAt=prev.sourceUpdatedAt;}
  // 取消/改期資訊
  if(isCancel){
    obj.rebook={
      reason:statusVal,
      due:document.getElementById('sfRebookDue').value||'',
      state:rebookState,
      note:document.getElementById('sfCancelNote').value.trim(),
      originalBookingId:prev?.rebook?.originalBookingId||(String(obj.id).startsWith('sb_')?String(obj.id).slice(3):''),
      originalDate:prev?.rebook?.originalDate||prev?.date||date,
      originalStart:prev?.rebook?.originalStart||prev?.start||start,
      ...(statusVal==='cancelled_typhoon'&&rebookState==='rebooked'?{newShiftId}:{})
    };
  }
  // 自由選人:被指派者若尚未勾技能/櫃台,自動同步到技能表
  for(const s of obj.assignments){
    if(!s.empId)continue;
    const e=emp(s.empId);if(!e)continue;
    if(s.role==='櫃台'){
      e.counters=e.counters||[];
      if(!e.counters.includes(obj.storeId))e.counters.push(obj.storeId);
    }else if(obj.kind==='theme'&&obj.themeId&&(s.role==='場控'||s.role==='NPC')){
      e.skills=e.skills||{};
      const arr=e.skills[obj.themeId]||[];
      if(!arr.includes(s.role))e.skills[obj.themeId]=[...arr,s.role];
    }
  }
  // 櫃台／駐店人員兼任主題場控時，同步補上該主題的場控技能。
  for(const link of linkedThemeAssignments){
    const target=byId(S.shifts,link.shiftId),e=emp(link.empId);if(!target||!e||target.kind!=='theme')continue;
    e.skills=e.skills||{};const arr=e.skills[target.themeId]||[];if(!arr.includes('場控'))e.skills[target.themeId]=[...arr,'場控'];
  }
  if(String(obj.id).indexOf('sb_')===0)obj.manualEdit=true; // SimplyBook 班次手動改過,同步時不覆蓋
  const oldLinkedId=prev?.rebook?.newShiftId||'';
  if(oldLinkedId&&oldLinkedId!==newShiftId){const oldTarget=byId(S.shifts,oldLinkedId);if(oldTarget?.rebookFrom?.shiftId===obj.id){delete oldTarget.rebookFrom;dbUpsertShift(oldTarget)}}
  if(statusVal==='cancelled_typhoon'&&rebookState==='rebooked'&&newShiftId){const target=byId(S.shifts,newShiftId);if(target){target.rebookFrom={shiftId:obj.id,bookingId:obj.rebook.originalBookingId,date:obj.rebook.originalDate,start:obj.rebook.originalStart};dbUpsertShift(target)}}
  if(editShiftId){const i=S.shifts.findIndex(x=>x.id===editShiftId);S.shifts[i]=obj}
  else S.shifts.push(obj);
  save();dbUpsertShift(obj);notifyShiftAssignments(obj,prev);dlgShift.close();render();
  // 外婆／詭獄場控有異動時，立即重新計算謎先生櫃台起訖時間。
  ensureMsCounterFromThemeControl().then(render).catch(e=>console.error('櫃台班重新計算失敗',e));
}

  if(!confirm('把此場次的 '+primaryRole+'「'+(e?e.name:'?')+'」回寫到 SimplyBook 的服務供應者?\n\n注意:SimplyBook 可能會依其通知設定寄信給客人。'))return;

}

async function voidPunch(id){

function pairPunches(empId,month){

  const rows=[];let open=null;
  for(const p of ps){
    if(p.type==='in'){if(open)rows.push({date:open.ts.slice(0,10),in:open.ts.slice(11,16),out:null,min:0,inPunch:open,outPunch:null});open=p}
    else{
      if(open&&open.ts.slice(0,10)!==p.ts.slice(0,10)){
        rows.push({date:open.ts.slice(0,10),in:open.ts.slice(11,16),out:null,min:0,inPunch:open,outPunch:null});
        rows.push({date:p.ts.slice(0,10),in:null,out:p.ts.slice(11,16),min:0,inPunch:null,outPunch:p});open=null;
      }
      else if(open){rows.push({date:open.ts.slice(0,10),in:open.ts.slice(11,16),out:p.ts.slice(11,16),
        min:Math.max(0,(new Date(p.ts)-new Date(open.ts))/60000),inPunch:open,outPunch:p});open=null}
      else rows.push({date:p.ts.slice(0,10),in:null,out:p.ts.slice(11,16),min:0,inPunch:null,outPunch:p});
    }
  }
  if(open)rows.push({date:open.ts.slice(0,10),in:open.ts.slice(11,16),out:null,min:0,inPunch:open,outPunch:null});
  return rows;
}

  return pairPunches(empId,date.slice(0,7)).filter(x=>x.date===date&&x.in&&x.out).map(x=>({start:toMin(x.in),end:toMin(x.out)})).filter(x=>x.end>x.start);
}
function shiftPunchRanges(sh,punches){
  const start=toMin(sh.start),end=toMin(sh.end);
  return punches.map(p=>({start:Math.max(start,p.start),end:Math.min(end,p.end)})).filter(x=>x.end>x.start);
}
function approvedHourlyBreakdown(e,month){
  let minutes=0,pay=0,collisionMinutes=0,controllerMinutes=0;const rates=new Set(),componentMap=new Map();
  const addComponent=(date,rate,componentMinutes)=>{if(!rate||componentMinutes<=0)return;const holiday=isHolidayRate(date),key=`${holiday?'holiday':'regular'}|${rate}`,old=componentMap.get(key)||{holiday,rate,minutes:0,pay:0};old.minutes+=componentMinutes;old.pay+=componentMinutes/60*rate;componentMap.set(key,old)};
  for(const d of (LINE.daily||[]).filter(x=>x.emp_id===e.id&&String(x.work_date).slice(0,7)===month&&x.status==='approved')){
    const payable=Math.max(0,Number(d.payable_minutes)||0);if(!payable)continue;
    if(e.type!=='part')continue;
    const allAssignments=employeeDayAssignments(e.id,d.work_date);
    // 純 NPC 當天仍保留上下班紀錄供稽核，但薪資只算 NPC 場次費，不再重複算時薪。
    if(allAssignments.length&&allAssignments.every(x=>String(x.role).toUpperCase()==='NPC'))continue;
    const assignments=allAssignments.filter(x=>String(x.role).toUpperCase()!=='NPC');
    const controllers=assignments.filter(x=>x.sh.kind==='theme'&&x.role==='場控');
    const others=assignments.filter(x=>!(x.sh.kind==='theme'&&x.role==='場控'));
    const punches=punchRangesForDay(e.id,d.work_date),allControllerRanges=[];
    let dayControllerMinutes=0,dayControllerPay=0;
    for(const x of controllers){
      const ranges=shiftPunchRanges(x.sh,punches);allControllerRanges.push(...ranges);
      const credited=Math.min(120,ranges.reduce((n,r)=>n+r.end-r.start,0));
      const rate=hourlyRateForShift(e,x.sh,x.role);if(rate)rates.add(rate);
      dayControllerMinutes+=credited;dayControllerPay+=credited/60*rate;addComponent(d.work_date,rate,credited);
    }
    const controllerUnion=mergedRangeMinutes(allControllerRanges);
    const dayCollision=Math.max(0,dayControllerMinutes-controllerUnion);
    const otherMinutes=others.length?Math.max(0,payable-Math.min(payable,controllerUnion)):0;
    const weighted=others.map(x=>{const a=(x.sh.assignments||[]).find(y=>y.empId===e.id);const w=asgWindow(x.sh,a);return{m:Math.max(0,toMin(w.end)-toMin(w.start)),rate:hourlyRateForShift(e,x.sh,x.role)}});
    weighted.forEach(x=>{if(x.rate)rates.add(x.rate)});
    const scheduled=weighted.reduce((n,x)=>n+x.m,0);
    let otherPay=0;
    if(scheduled)otherPay=weighted.reduce((n,x)=>{const allocated=otherMinutes*x.m/scheduled;addComponent(d.work_date,x.rate,allocated);return n+allocated/60*x.rate},0);
    else if(!controllers.length){const rate=Number(e.hourlyRate)||196;rates.add(rate);otherPay=payable/60*rate;addComponent(d.work_date,rate,payable)}
    const dayMinutes=controllers.length?otherMinutes+dayControllerMinutes:payable;
    minutes+=dayMinutes;controllerMinutes+=dayControllerMinutes;collisionMinutes+=dayCollision;pay+=otherPay+dayControllerPay;
  }
  return{minutes,pay:Math.round(pay),rates:[...rates].sort((a,b)=>a-b),controllerMinutes,collisionMinutes,components:[...componentMap.values()].sort((a,b)=>Number(a.holiday)-Number(b.holiday)||a.rate-b.rate)};
}
function approvedOvertimeMinutes(empId,month){
  return (LINE.overtime||[]).filter(x=>x.emp_id===empId&&String(x.work_date).slice(0,7)===month&&x.status==='approved')

/* 訓練場時數(單獨統計,不自動計薪)*/
function practiceMinutes(empId,month){
  let m=0;
  for(const sh of S.shifts){
    if(isCx(sh)||sh.date.slice(0,7)!==month||sh.kind!=='practice')continue;
    if(!sh.assignments.some(a=>a.empId===empId))continue;
    m+=Math.max(0,toMin(sh.end)-toMin(sh.start));
  }
  return m;
}
/* 某員工當月所有場次明細(供逐筆檢視)*/
function empSessions(empId,month){
  const rows=[],e=emp(empId),themeKeys=new Set();
  for(const sh of S.shifts){
    if(sh.date.slice(0,7)!==month)continue;
    const a=sh.assignments.find(x=>x.empId===empId);
    if(!a)continue;
    const t=sh.kind==='theme'?theme(sh.themeId):null;
    let fee=0;
    if(!isCx(sh)&&t&&e?.type==='part'&&a.role==='NPC'){fee=themeSessionRate(t,a.role,sh.date);}
    rows.push({date:sh.date,start:sh.start,end:sh.end,
      kind:sh.kind,label:shiftLabel(sh),role:a.role,
      store:store(sh.storeId)?.name||'',fee,cancelled:isCx(sh),cx:cxLabel(sh)});
    if(sh.kind==='theme')themeKeys.add(sh.id+'|'+a.role);
  }
  for(const source of S.shifts){
    if(source.date.slice(0,7)!==month)continue;
    for(const link of source.linkedThemeAssignments||[]){
      if(link.empId!==empId)continue;const target=byId(S.shifts,link.shiftId),key=link.shiftId+'|場控';if(!target||themeKeys.has(key))continue;
      rows.push({date:target.date,start:target.start,end:target.end,kind:'theme',label:shiftLabel(target),role:'場控',store:store(target.storeId)?.name||'',fee:0,cancelled:isCx(target),cx:cxLabel(target)});themeKeys.add(key);
    }
  }
  return rows.sort((x,y)=>(x.date+x.start).localeCompare(y.date+y.start));
}
/* 薪資核對用：同日主題場次重疊為撞場；前場結束後指定分鐘內接下一場為滾場。 */
function payrollSequenceRelations(empId,month){
  const limit=Math.max(0,Number(S.settings.rollingGapMin??30)),dates=[...new Set(
    S.shifts.filter(sh=>!isCx(sh)&&sh.kind==='theme'&&sh.date.slice(0,7)===month).map(sh=>sh.date)
  )].sort(),rows=[];
  for(const date of dates){
    const perShift=new Map();
    for(const x of employeeDayAssignments(empId,date).filter(x=>x.sh.kind==='theme')){
      const old=perShift.get(x.sh.id);
      if(!old||x.role==='場控')perShift.set(x.sh.id,x);
    }
    const shifts=[...perShift.values()].sort((a,b)=>toMin(a.sh.start)-toMin(b.sh.start)||toMin(a.sh.end)-toMin(b.sh.end));
    for(let i=0;i<shifts.length;i++)for(let j=i+1;j<shifts.length;j++){
      const a=shifts[i],b=shifts[j],aStart=toMin(a.sh.start),aEnd=toMin(a.sh.end),bStart=toMin(b.sh.start),bEnd=toMin(b.sh.end);
      const overlap=Math.max(0,Math.min(aEnd,bEnd)-Math.max(aStart,bStart));
      if(overlap>0){
        rows.push({date,type:'collision',minutes:overlap,a,b});
      }else{
        const gap=bStart-aEnd;
        if(gap>=0&&gap<=limit)rows.push({date,type:'rolling',minutes:gap,a,b});
      }
    }
  }
  return rows;
}

function dl(content,name,type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name;a.click();URL.revokeObjectURL(a.href);
}

function openEmp(id){
  editEmpId=id;const e=id?emp(id):null;

  document.getElementById('efDelete').style.display=e?'':'none';

  document.getElementById('efType').value=e?e.type:'part';
  document.getElementById('efRate').value=e?(e.hourlyRate||''):'';
  document.getElementById('efSalary').value=e?(e.monthlySalary||''):'';
  document.getElementById('efPin').value=e?(e.pin||''):'';
  const color=employeeColor(e)||'#64748b';
  document.getElementById('efColor').value=color;
  document.getElementById('efColorPicker').value=color;
  document.getElementById('efStartDate').value=e?(e.startDate||''):'';
  document.getElementById('efEndDate').value=e?(e.endDate||''):'';
  document.getElementById('efStdHours').value=e?(e.stdHours||''):'';
  document.getElementById('efOtRate').value=e?(e.otRate||''):'';
  document.getElementById('efExtraSessionRate').value=e?(e.extraSessionRate||''):'';
  document.getElementById('efActive').checked=e?e.active:true;
  document.getElementById('efPracticeScheduler').checked=!!e?.canSchedulePractice;
  const tsel=document.getElementById('efType');
  tsel.onchange=()=>{document.getElementById('efOtRow').style.display=tsel.value==='full'?'':'none'};
  document.getElementById('efOtRow').style.display=(e?e.type:'part')==='full'?'':'none';
  dlgEmp.showModal();
}
function saveEmp(){
  const name=document.getElementById('efName').value.trim();
  if(!name)return alert('請填姓名');
  const simplybookColor=document.getElementById('efColor').value.trim().toLowerCase();
  if(simplybookColor&&!/^#[0-9a-f]{6}$/.test(simplybookColor))return alert('員工色號需為 # 加 6 碼英數，例如 #34bbf1');
  const data={
    name,type:document.getElementById('efType').value,
    hourlyRate:Number(document.getElementById('efRate').value)||0,
    monthlySalary:Number(document.getElementById('efSalary').value)||0,
    pin:document.getElementById('efPin').value.trim(),
    startDate:document.getElementById('efStartDate').value,
    endDate:document.getElementById('efEndDate').value,
    stdHours:Number(document.getElementById('efStdHours').value)||0,
    otRate:Number(document.getElementById('efOtRate').value)||0,
    extraSessionRate:Number(document.getElementById('efExtraSessionRate').value)||0,
    active:document.getElementById('efActive').checked,
    canSchedulePractice:document.getElementById('efPracticeScheduler').checked,
    simplybookColor
  };
  if(data.canSchedulePractice&&data.type!=='full')return alert('安排新人訓練場的權限只能授予正職員工');
  if(data.startDate&&data.endDate&&data.endDate<data.startDate)return alert('離職日不可早於到職日');
  if(editEmpId){Object.assign(emp(editEmpId),data)}
  else S.employees.push({id:uid(),skills:{},counters:[],avail:defaultAvail(),...data});
  save();dlgEmp.close();render();
}
function deleteEmp(){
  if(!confirm('確定停用此員工？歷史班表、打卡與薪資紀錄會完整保留；未來已排班次仍會顯示，請管理員逐一調整。'))return;
  const e=emp(editEmpId);if(!e)return;e.active=false;if(!e.endDate)e.endDate=todayStr();
  sbc.from('line_accounts').update({active:false,updated_at:new Date().toISOString()}).eq('emp_id',editEmpId);
  save();dlgEmp.close();render();
}

function parseSlots(str){
  return [...new Set(String(str).split(/[、,，;\s]+/)
    .map(s=>s.trim()).filter(s=>/^\d{1,2}:\d{2}$/.test(s))
    .map(s=>{const[h,m]=s.split(':');return String(h).padStart(2,'0')+':'+m}))].sort();
}
function saveTheme(){
  const name=document.getElementById('tfName').value.trim();
  if(!name)return alert('請填主題名稱');
  const fixedRoles=THEME_ROLE_RULES[name]||null;
  const data={
    name,storeId:document.getElementById('tfStore').value,
    dur:Number(document.getElementById('tfDur').value)||90,
    slots:parseSlots(document.getElementById('tfSlots').value),
    needGM:fixedRoles?(fixedRoles.includes('場控')?1:0):(Number(document.getElementById('tfGM').value)||0),
    needNPC:fixedRoles?(fixedRoles.includes('NPC')?1:0):(Number(document.getElementById('tfNPC').value)||0),
    payGM:Number(document.getElementById('tfPayGM').value)||0,
    payGMHoliday:Number(document.getElementById('tfPayGMHoliday').value)||0,
    payNPC:Number(document.getElementById('tfPayNPC').value)||0,
    payNPCHoliday:Number(document.getElementById('tfPayNPCHoliday').value)||0,
    active:document.getElementById('tfActive').checked
  };
  if(editThemeId)Object.assign(theme(editThemeId),data);
  else S.themes.push({id:uid(),...data});
  save();dlgTheme.close();render();
}
function deleteTheme(){

  S.themes=S.themes.filter(t=>t.id!==editThemeId);

function tglSkill(empId,themeId,role,on){
  const e=emp(empId),t=theme(themeId);if(!e||!t||!themeAllows(t,role))return;
  e.skills=e.skills||{};
  const arr=e.skills[themeId]||[];
  e.skills[themeId]=on?[...new Set([...arr,role])]:arr.filter(r=>r!==role);
  save();
}
function tglCounter(empId,storeId,on){
  const e=emp(empId);e.counters=e.counters||[];
  e.counters=on?[...new Set([...e.counters,storeId])]:e.counters.filter(s=>s!==storeId);
  save();
}

function approvedOvertimePay(e,month){
  const baseRate=Number(e.otRate||((e.monthlySalary||0)/240)||e.hourlyRate||0);let minutes=0,firstMinutes=0,afterMinutes=0,pay=0;
  for(const row of (LINE.overtime||[]).filter(x=>x.emp_id===e.id&&String(x.work_date).slice(0,7)===month&&x.status==='approved')){
    const m=Math.max(0,Number(row.approved_minutes)||0),first=Math.min(120,m),after=Math.max(0,m-120);
    minutes+=m;firstMinutes+=first;afterMinutes+=after;pay+=first/60*baseRate*4/3+after/60*baseRate*5/3;
  }
  return{minutes,firstMinutes,afterMinutes,pay:Math.round(pay),baseRate};
}
function payrollDayGrid(e,month,opened){
  const[y,m]=month.split('-').map(Number),days=new Date(y,m,0).getDate();

/* 解析 Google 日曆自由格式回報 → {on,start,end} 或 null */
function parseGCalAvail(raw){
  const s=String(raw).replace(/[🍐👌🏻😻👍✅️\s]/g,'');
  const norm=(h,m=0)=>{h=+h;m=+m;if(h>=1&&h<=8)h+=12;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')};
  const norm4=t=>{t=String(t).padStart(4,'0');return t.slice(0,2)+':'+t.slice(2)};
  if(/其餘皆可/.test(s))return {on:true,start:'09:00',end:'22:30'};
  const rng=s.match(/(\d{1,2})\s*[-~～至]\s*(\d{1,2})\s*可以/);
  if(rng)return {on:true,start:norm(rng[1]),end:norm(rng[2])};
  let dir=null;
  if(/前/.test(s))dir='before';else if(/後/.test(s))dir='after';else if(/離/.test(s))dir='before';
  if(dir){let t=null,m;
    if(m=s.match(/(\d{1,2})[:：](\d{2})/))t=m[1].padStart(2,'0')+':'+m[2];
    else if(m=s.match(/(\d{3,4})/))t=norm4(m[1]);
    else if(m=s.match(/(\d{1,2})點/))t=norm(m[1]);
    if(t)return dir==='before'?{on:true,start:'09:00',end:t}:{on:true,start:t,end:'22:30'};
  }
  if(/(❌|❎|不行|休|特休)/.test(s))return {on:false,start:'09:00',end:'22:30'};
  if(/(allday|全天|整天|全台可以|可以|全部)/i.test(s))return {on:true,start:'09:00',end:'22:30'};
  return null;
}
/* 從事件文字找出開頭的員工姓名(比對現有員工) */
function matchEmpByText(text){
  const t=String(text).replace(/\s/g,'');
  for(const e of S.employees){
    if(t.startsWith(e.name)||t.includes(e.name)||(e.aliases||[]).some(a=>t.includes(a)))return e;
  }
  return null;
}
async function loadIcal(doImport){
  const url=document.getElementById('icalUrl').value.trim();
  const m=document.getElementById('icalMonth').value;
  const box=document.getElementById('icalResult');
  if(!url){box.innerHTML='<p class="warn">請先貼上 iCal 網址</p>';return}
  if(isDemo()){box.innerHTML='<p class="muted">試玩模式不連雲端,無法抓取。</p>';return}
  S.icalUrl=url;save();
  box.innerHTML='<p class="muted">抓取中…</p>';
  const from=m+'-01', to=fmtDate(new Date(Number(m.slice(0,4)),Number(m.slice(5,7)),0));
  try{
    const r=await sbc.functions.invoke('ical-fetch',{body:{url,from,to}});
    if(r.error)throw new Error(r.error.message||JSON.stringify(r.error));
    if(r.data&&r.data.error)throw new Error(r.data.error);
    const evs=(r.data&&r.data.events)||[];
    if(!evs.length){box.innerHTML='<p class="muted">該月沒有事件。</p>';return}
    if(doImport){
      if(!confirm('將把 '+m+' 的 Google 日曆回報解析後,寫入各員工的「特定日期回報」(會覆蓋該月同日的既有回報),確定?'))return;
      let applied=0;const unmatched=new Set(),unparsed=[];
      for(const ev of evs){
        const e=matchEmpByText(ev.summary);
        if(!e){continue}
        const av=parseGCalAvail(ev.summary);
        if(!av){unparsed.push(ev.summary);continue}
        e.availX=e.availX||{};e.availX[ev.date]=av;applied++;
      }
      save();
      box.innerHTML=`<p class="ok" style="color:#059669">✅ 已匯入 ${applied} 筆到 ${m} 可上班時間。`
        +(unparsed.length?` 有 ${unparsed.length} 筆無法辨識(維持原樣):${unparsed.slice(0,8).map(esc).join('、')}`:'')
        +`</p><p class="muted">切到「排班表」即可看到更新後的每日人力。無法辨識的可在上方「特定日期回報」手動補。</p>`;
      return;
    }
    const byDate={};for(const ev of evs){(byDate[ev.date]=byDate[ev.date]||[]).push(ev.summary)}
    box.innerHTML=`<table><tr><th>日期</th><th>Google 行事曆(員工回報/休假)</th></tr>`+
      Object.keys(byDate).sort().map(d=>`<tr><td>${d}(週${WD[dateWD(d)]})</td><td>${byDate[d].map(s=>`<span class="tag">${esc(s)}</span>`).join(' ')}</td></tr>`).join('')+
      `</table><p class="muted" style="margin-top:6px">共 ${evs.length} 筆。按「解析並匯入為可上班時間」可自動轉入排班判斷。</p>`;
  }catch(e){box.innerHTML='<p class="warn">抓取失敗:'+esc(e.message)+'</p>'}
}

function unionShiftMinutes(shifts){
  const ranges=shifts.map(s=>[toMin(s.start),toMin(s.end)]).filter(x=>Number.isFinite(x[0])&&Number.isFinite(x[1])&&x[1]>x[0]).sort((a,b)=>a[0]-b[0]);
  let total=0,open=null;for(const range of ranges){if(!open)open=[...range];else if(range[0]<=open[1])open[1]=Math.max(open[1],range[1]);else{total+=open[1]-open[0];open=[...range]}}return total+(open?open[1]-open[0]:0);
}
async function calculateOvertime(){
  const month=monthStr(),rows=[];
  for(const e of S.employees.filter(x=>x.type==='full'&&employedInMonth(x,month))){
    const paired=pairPunches(e.id,month),days=[...new Set(paired.map(p=>p.date))];
    for(const d of days){const segments=paired.filter(p=>p.date===d),actual=segments.reduce((n,p)=>n+p.min,0),anomaly=segments.some(p=>!p.in||!p.out),scheduled=unionShiftMinutes(S.shifts.filter(s=>s.date===d&&!isCx(s)&&s.assignments.some(a=>a.empId===e.id))),candidate=Math.max(0,actual-9*60);if(candidate||anomaly)rows.push({emp_id:e.id,work_date:d,scheduled_minutes:scheduled,actual_minutes:actual,candidate_minutes:candidate,status:anomaly?'anomaly':'pending'})}
  }
  if(rows.length){const r=await sbc.from('overtime_reviews').upsert(rows,{onConflict:'emp_id,work_date'});if(r.error)return alert(r.error.message)}await refreshLineAdmin();
}

async function changeOwnPassword(){
  const password=document.getElementById('ownAdminPw').value,confirmPassword=document.getElementById('ownAdminPw2').value;
  if(password.length<8)return alert('密碼至少需要 8 碼');if(password!==confirmPassword)return alert('兩次輸入的密碼不同');
  const r=await sbc.auth.updateUser({password});if(r.error)return alert('修改失敗：'+r.error.message);document.getElementById('ownAdminPw').value='';document.getElementById('ownAdminPw2').value='';alert('密碼已修改完成');
}
async function resetAdminPassword(id){
  const email=ADMIN_USERS.find(function(u){return u.id===id})?.email||'這位管理者';
  const password=prompt('請輸入 '+email+' 的新密碼（至少 8 碼）');if(password==null)return;if(password.length<8)return alert('密碼至少需要 8 碼');
  if(!confirm('確定要重設 '+email+' 的登入密碼？'))return;
  try{await adminUsersApi({action:'reset-password',userId:id,password});alert('密碼已重設完成')}catch(e){alert('重設失敗：'+e.message)}
}
async function logoutAdmin(){await sbc.auth.signOut();location.reload()}

  </div>

      <button class="btn sm" id="syncNowBtn" onclick="syncSimplyBookNow()">立即同步</button></div>

      ${(LINE.syncRuns||[]).slice(0,12).map(r=>{
        const t=new Date(r.finished_at||r.started_at).toLocaleString('zh-TW',{hour12:false});

        return `<tr><td>${esc(t)}</td><td>${src}</td><td>${st}</td><td class="num">${r.fetched_count??'—'}</td><td class="num">${r.changed_count??'—'}</td><td class="muted" style="font-size:12px">${esc((r.error_message||'').slice(0,60))}</td></tr>`;
      }).join('')}</table>`
    :'<p class="muted">尚無同步紀錄(等待第一次背景同步)。</p>'}
    <p class="muted" style="margin-top:6px">排班表最上方也有即時同步狀態列;失敗時這裡會顯示原因。</p>
  </div>`;
}
function exportJSON(){dl(JSON.stringify(S,null,2),`排班系統備份_${todayStr()}.json`,'application/json')}
function importJSON(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async()=>{try{
    const d=JSON.parse(r.result);
    if(!d.stores||!d.employees)throw new Error('格式不正確');
    if(!confirm('匯入將覆蓋「雲端」目前資料(單機版備份檔可直接整包搬上來),確定?'))return;
    const shifts=d.shifts||[],punches=d.punches||[];
    const cfg=Object.assign({},d);delete cfg.shifts;delete cfg.punches;
    for(const k of Object.keys(cfg))if(/^(migr|sim)/i.test(k))delete cfg[k];
    await sbc.from('shifts').delete().neq('id','');
    await sbc.from('punches').delete().neq('id','');
    await sbc.from('config').upsert({id:1,data:cfg});
    for(let i=0;i<shifts.length;i+=100){
      const r2=await sbc.from('shifts').upsert(shifts.slice(i,i+100).map(s=>({id:s.id,date:s.date,source:String(s.id).indexOf('sb_')===0?'simplybook':'manual',data:s})));
      if(r2.error)throw new Error(r2.error.message);
    }
    for(let i=0;i<punches.length;i+=200){
      const r3=await sbc.from('punches').upsert(punches.slice(i,i+200).map(p=>({id:p.id,emp_id:p.empId,ts:p.ts,type:p.type,source:'import'})));
      if(r3.error)throw new Error(r3.error.message);
    }
    await afterLogin();alert('匯入完成:班次 '+shifts.length+' 筆、打卡 '+punches.length+' 筆已上雲');
  }catch(e){alert('匯入失敗:'+e.message)}};
  r.readAsText(f);input.value='';
}
async function resetAll(){
  if(!confirm('確定清除「雲端」全部資料?此動作無法復原(建議先匯出備份)。'))return;
  if(!confirm('再次確認:真的要清除?'))return;
  await sbc.from('shifts').delete().neq('id','');
  await sbc.from('punches').delete().neq('id','');
  const d=seedConfig();
  await sbc.from('config').upsert({id:1,data:d});
  await afterLogin();
}

boot();
