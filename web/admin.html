<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排班打卡系統(雲端版)|大忠店・謎先生</title>
<meta name="build-version" content="2026-07-13-payroll-rates">
<style>
:root{
  --accent:#2563eb; --accent2:#7c3aed; --bg:#f4f6fa; --card:#fff;
  --line:#e2e8f0; --txt:#1e293b; --muted:#64748b; --warn:#d97706; --danger:#dc2626; --ok:#059669;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--txt);font-size:15px}
header{background:#0f172a;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:50}
header h1{font-size:17px;font-weight:700}
nav{display:flex;gap:4px;flex-wrap:wrap}
nav button{background:transparent;border:none;color:#cbd5e1;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:14px}
nav button:hover{background:#1e293b;color:#fff}
nav button.on{background:var(--accent);color:#fff;font-weight:600}
main{max-width:1280px;margin:18px auto;padding:0 14px 60px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
.card h2{font-size:16px;margin-bottom:12px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.grow{flex:1}
button.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:14px}
button.btn.gray{background:#e2e8f0;color:var(--txt)}
button.btn.red{background:var(--danger)}
button.btn.green{background:var(--ok)}
button.btn.sm{padding:4px 9px;font-size:13px}
input,select{border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:14px;background:#fff;color:var(--txt);font-family:inherit}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{border:1px solid var(--line);padding:7px 9px;text-align:left;vertical-align:middle}
th{background:#f1f5f9;font-weight:600;white-space:nowrap}
.muted{color:var(--muted);font-size:13px}
.badge{display:inline-block;padding:1px 8px;border-radius:20px;font-size:12px;color:#fff}
.tag{display:inline-block;padding:1px 7px;border-radius:6px;font-size:12px;background:#eef2ff;color:#3730a3;margin:1px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{background:#fff;border:none;padding:7px 14px;cursor:pointer;font-size:14px;border-right:1px solid var(--line)}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--accent);color:#fff;font-weight:600}
/* 月曆 */
.mhead{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.mhead div{text-align:center;font-size:13px;color:var(--muted);padding:4px}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.mday{background:#fff;border:1px solid var(--line);border-radius:8px;min-height:96px;padding:4px;cursor:pointer;display:flex;flex-direction:column;gap:2px;overflow:hidden}
.mday:hover{border-color:var(--accent)}
.mday.dim{background:#f8fafc;opacity:.55}
.mday.today{border-color:var(--accent);box-shadow:0 0 0 2px #bfdbfe}
.mday.hasunstaffed{background:#fef3c7;border-color:#f59e0b}
.mday.avon{background:#ecfdf5;border-color:#6ee7b7}
.mday.avoff{background:#f1f5f9}
.schedwrap{display:flex;gap:14px;align-items:flex-start}
.schedmain{flex:1;min-width:0}
.loadpanel{width:210px;flex-shrink:0;position:sticky;top:64px;max-height:calc(100vh - 80px);overflow-y:auto;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px}
.loadrow{padding:5px 6px;border-radius:7px;cursor:pointer;margin-bottom:3px}
.loadrow:hover{background:#f1f5f9}
.loadrow.heavy{background:#fff7ed}
.loadname{font-size:13px;font-weight:600}
.loadbar{height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin:3px 0}
.loadbar>div{height:100%;background:var(--accent)}
.loadrow.heavy .loadbar>div{background:#f59e0b}
.leavered{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}
@media(max-width:1024px){.schedwrap{flex-direction:column}.loadpanel{width:100%;position:static;max-height:none;order:-1}}
.mnum{font-size:12.5px;color:var(--muted);font-weight:600}
.chip{border-radius:5px;padding:1px 5px;font-size:11px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.chip.unstaffed{outline:2px dashed #fca5a5;outline-offset:-2px}
.chip:hover{filter:brightness(1.12)}
/* 週曆 */
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.day{background:#fff;border:1px solid var(--line);border-radius:10px;min-height:130px;padding:8px;display:flex;flex-direction:column;gap:6px}
.day.today{border-color:var(--accent);box-shadow:0 0 0 2px #bfdbfe}
.day h4{font-size:13px;color:var(--muted);display:flex;justify-content:space-between}
.shift{border-radius:8px;padding:6px 8px;font-size:12.5px;cursor:pointer;color:#fff;line-height:1.45}
.shift:hover{filter:brightness(1.08)}
.shift .who{opacity:.92}
/* 日場次 */
.slotrow{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.slotbox{border-radius:8px;padding:5px 9px;font-size:12.5px;cursor:pointer;border:1.5px solid var(--line);background:#f8fafc;color:var(--muted);line-height:1.4}
.slotbox:hover{border-color:var(--accent);color:var(--accent)}
.slotbox.staffed{background:#d1fae5;border-color:#6ee7b7;color:#065f46}
.slotbox.unstaffed{background:#fef3c7;border-color:#fcd34d;color:#92400e}
.slotbox b{font-size:12.5px}
dialog{border:none;border-radius:14px;padding:0;max-width:560px;width:94vw;box-shadow:0 20px 60px rgba(0,0,0,.3)}
dialog::backdrop{background:rgba(15,23,42,.45)}
.dlg-h{background:#0f172a;color:#fff;padding:12px 18px;font-size:15px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.dlg-h button{background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer}
.dlg-b{padding:16px 18px;display:flex;flex-direction:column;gap:12px;max-height:70vh;overflow-y:auto}
.dlg-f{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:13px;color:var(--muted)}
.slot{display:flex;gap:6px;align-items:center;background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:6px}
.warn{color:var(--warn);font-size:12.5px}
.timebtns{display:flex;gap:5px;flex-wrap:wrap}
.timebtns button{border:1px solid var(--line);background:#fff;border-radius:7px;padding:4px 9px;font-size:13px;cursor:pointer}
.timebtns button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.punch-btns{display:flex;gap:14px;margin:10px 0}
.punch-btns button{flex:1;padding:20px;font-size:19px;border-radius:14px}
.big-status{font-size:15px;padding:10px 12px;border-radius:10px;background:#f1f5f9}
.cancelled{opacity:.58;text-decoration:line-through;filter:grayscale(.7)}
.pill{padding:2px 10px;border-radius:20px;font-size:12.5px;font-weight:600}
.pill.in{background:#d1fae5;color:#065f46}
.pill.out{background:#e2e8f0;color:#334155}
.skmat{overflow-x:auto}
.skmat th,.skmat td{white-space:nowrap;text-align:center}
.skmat td:first-child,.skmat th:first-child{position:sticky;left:0;background:#fff;text-align:left;z-index:2}
.skmat th:first-child{background:#f1f5f9}
.cklab{display:inline-flex;align-items:center;gap:3px;margin:0 5px;font-size:13px;cursor:pointer}
.num{text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:860px){.week{grid-template-columns:1fr 1fr}.day{min-height:auto}.mday{min-height:64px}}
@media(max-width:520px){.week{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>🗓️ 排班打卡系統 <span style="font-size:11px;background:#059669;padding:2px 8px;border-radius:10px">雲端</span></h1>
  <nav id="nav"></nav>
</header>
<main id="view"></main>

<dialog id="dlgShift">
  <div class="dlg-h"><span id="dlgShiftTitle">新增班次</span><button onclick="dlgShift.close()">✕</button></div>
  <div class="dlg-b">
    <div class="row">
      <div class="field grow"><label>日期</label><input type="date" id="sfDate" onchange="refreshSlotOptions();renderQuick()"></div>
      <div class="field grow"><label>店別</label><select id="sfStore" onchange="onShiftStoreKind()"></select></div>
      <div class="field grow"><label>類型</label>
        <select id="sfKind" onchange="onShiftStoreKind()">
          <option value="theme">主題場次</option>
          <option value="counter">櫃台班</option>
          <option value="floor">駐店場控班</option>
          <option value="cleaning">每周大清潔</option>
          <option value="practice">練習場(時數依打卡之星)</option>
        </select>
      </div>
    </div>
    <div class="field" id="sfThemeWrap"><label>主題</label><select id="sfTheme" onchange="onThemeChange()"></select>
      <div class="timebtns" id="sfSlotTimes" style="margin-top:5px"></div>
    </div>
    <div class="row">
      <div class="field grow"><label>開始</label><input type="time" id="sfStart" onchange="onStartChange()"></div>
      <div class="field grow"><label>結束</label><input type="time" id="sfEnd" onchange="refreshSlotOptions()"></div>
    </div>
    <div class="timebtns" id="sfQuick"></div>
    <div class="field">
      <label>人員安排(所有人都可選;⚠ 會註明原因;選了未勾技能的人,儲存時自動更新技能表)</label>
      <div id="sfSlots" style="display:flex;flex-direction:column;gap:6px"></div>
      <div><button class="btn gray sm" onclick="addSlot()">＋ 新增人員欄位</button></div>
    </div>
    <div class="field"><label>備註</label><input id="sfNote" placeholder="選填"></div>
    <div id="sfCustomer" style="display:none;background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13.5px;line-height:1.7"></div>
    <div class="field" style="border-top:1px dashed var(--line);padding-top:10px">
      <label>場次狀態</label>
      <select id="sfStatus" onchange="onStatusChange()">
        <option value="active">正常</option>
        <option value="cancelled_typhoon">🌀 颱風天取消(給客人一個月內改期/退費)</option>
        <option value="cancelled_customer">客人取消</option>
        <option value="cancelled_other">其他原因取消</option>
      </select>
    </div>
    <div class="field" id="sfCancelBox" style="display:none">
      <div class="row">
        <div class="field grow"><label>改期期限(颱風天預設一個月)</label><input type="date" id="sfRebookDue"></div>
        <div class="field grow"><label>處理狀態</label>
          <select id="sfRebookState">
            <option value="pending">待客人改期</option>
            <option value="rebooked">已改期</option>
            <option value="refunded">已退費</option>
          </select>
        </div>
      </div>
      <label>取消/處理備註</label><input id="sfCancelNote" placeholder="例:已致電通知,客人考慮中">
    </div>
  </div>
  <div class="dlg-f">
    <button class="btn red" id="sfDelete" onclick="deleteShift()">刪除</button>
    <button class="btn gray" id="sfWriteback" onclick="writebackShift()" title="把此場次的負責人回寫到 SimplyBook(可能觸發客人通知信)">⇪ 回寫 SimplyBook</button>
    <span class="grow"></span>
    <button class="btn gray" onclick="dlgShift.close()">取消</button>
    <button class="btn" onclick="saveShift()">儲存</button>
  </div>
</dialog>

<dialog id="dlgEmp">
  <div class="dlg-h"><span id="dlgEmpTitle">新增員工</span><button onclick="dlgEmp.close()">✕</button></div>
  <div class="dlg-b">
    <div class="field"><label>姓名</label><input id="efName"></div>
    <div class="row">
      <div class="field grow"><label>身分</label>
        <select id="efType"><option value="part">兼職(時薪)</option><option value="full">正職(月薪)</option></select>
      </div>
      <div class="field grow"><label>時薪(元)</label><input type="number" id="efRate" min="0" placeholder="兼職用/正職加班用"></div>
      <div class="field grow"><label>月薪(元)</label><input type="number" id="efSalary" min="0" placeholder="正職用"></div>
    </div>
    <div class="field"><label>打卡 PIN(4–6 位數字;店員手機 QR 打卡用,留空=不開放)</label><input id="efPin" maxlength="6" inputmode="numeric" placeholder="例:1234"></div>
    <div class="row">
      <div class="field"><label>SimplyBook 員工顏色</label><input type="color" id="efColorPicker" value="#64748b" oninput="document.getElementById('efColor').value=this.value"></div>
      <div class="field grow"><label>員工色號</label><input id="efColor" maxlength="7" placeholder="#34bbf1" oninput="if(/^#[0-9a-fA-F]{6}$/.test(this.value))document.getElementById('efColorPicker').value=this.value"></div>
    </div>
    <div class="row" id="efOtRow" style="display:none">
      <div class="field grow"><label>月標準時數(正職;超過才算加班)</label><input type="number" id="efStdHours" min="0" step="0.5" placeholder="例:176(月休8天×8h)"></div>
      <div class="field grow"><label>加班時薪(元/時)</label><input type="number" id="efOtRate" min="0" placeholder="留空=用左邊時薪"></div>
    </div>
    <div class="row">
      <div class="field grow"><label>到職日</label><input type="date" id="efStartDate"></div>
      <div class="field grow"><label>離職日(最後工作日)</label><input type="date" id="efEndDate"></div>
    </div>
    <label class="cklab" style="margin:0"><input type="checkbox" id="efActive" checked> 在職中(停用後不出現在排班與打卡)</label>
    <label class="cklab" style="margin-top:10px"><input type="checkbox" id="efPracticeScheduler"> 授權安排新人練習場（限需要負責人資安排的正職）</label>
  </div>
  <div class="dlg-f">
    <button class="btn red" id="efDelete" onclick="deleteEmp()">刪除</button>
    <span class="grow"></span>
    <button class="btn gray" onclick="dlgEmp.close()">取消</button>
    <button class="btn" onclick="saveEmp()">儲存</button>
  </div>
</dialog>

<dialog id="dlgTheme">
  <div class="dlg-h"><span id="dlgThemeTitle">新增主題</span><button onclick="dlgTheme.close()">✕</button></div>
  <div class="dlg-b">
    <div class="field"><label>主題名稱</label><input id="tfName"></div>
    <div class="row">
      <div class="field grow"><label>店別</label><select id="tfStore"></select></div>
      <div class="field grow"><label>場次長度(分鐘)</label><input type="number" id="tfDur" min="10" step="5" value="90"></div>
    </div>
    <div class="field"><label>場次時刻表(用逗號或頓號分隔,例:10:00、11:40)</label><input id="tfSlots" placeholder="10:00、11:40、13:20"></div>
    <div class="row">
      <div class="field grow"><label>需場控人數</label><input type="number" id="tfGM" min="0" value="1"></div>
      <div class="field grow"><label>需 NPC 人數</label><input type="number" id="tfNPC" min="0" value="0"></div>
    </div>
    <div class="row">
      <div class="field grow"><label>場控平日／場</label><input type="number" id="tfPayGM" min="0" value="300"></div>
      <div class="field grow"><label>場控假日／場</label><input type="number" id="tfPayGMHoliday" min="0" value="300"></div>
    </div>
    <div class="row">
      <div class="field grow"><label>NPC 平日／場</label><input type="number" id="tfPayNPC" min="0" value="0"></div>
      <div class="field grow"><label>NPC 假日／場</label><input type="number" id="tfPayNPCHoliday" min="0" value="0"></div>
    </div>
    <label class="cklab" style="margin:0"><input type="checkbox" id="tfActive" checked> 開放中(關閉後不出現在排班)</label>
  </div>
  <div class="dlg-f">
    <button class="btn red" id="tfDelete" onclick="deleteTheme()">刪除</button>
    <span class="grow"></span>
    <button class="btn gray" onclick="dlgTheme.close()">取消</button>
    <button class="btn" onclick="saveTheme()">儲存</button>
  </div>
</dialog>

<dialog id="dlgDetail">
  <div class="dlg-h"><span id="dlgDetailTitle">場次明細</span><button onclick="dlgDetail.close()">✕</button></div>
  <div class="dlg-b" id="dlgDetailBody"></div>
  <div class="dlg-f">
    <button class="btn gray sm" onclick="exportEmpDetailCSV()">匯出 CSV</button>
    <span class="grow"></span>
    <button class="btn gray" onclick="dlgDetail.close()">關閉</button>
  </div>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<div id="loginOv" style="position:fixed;inset:0;background:#0f172a;z-index:999;display:none;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:14px;padding:28px;width:320px">
    <h2 style="margin-bottom:4px">🗓️ 排班打卡系統</h2>
    <p class="muted" style="margin-bottom:14px">雲端版・管理者登入</p>
    <input id="liEmail" placeholder="Email" style="width:100%;margin-bottom:8px" autocomplete="username">
    <input id="liPw" type="password" placeholder="密碼" style="width:100%;margin-bottom:12px" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" style="width:100%" onclick="doLogin()">登入</button>
    <p id="liMsg" class="warn" style="margin-top:8px"></p>
  </div>
</div>
<script>
/* ============ 資料 ============ */
const ROLES=['場控','NPC','櫃台','練習場','陪練'];
const WD=['日','一','二','三','四','五','六'];
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function defaultAvail(){const a={};for(let i=0;i<7;i++)a[i]={on:true,start:'09:00',end:'22:30'};return a}
function seedThemes(){
  return [
    {id:'gc', storeId:'dz',name:'詭廁',    dur:90, needGM:0,needNPC:1,payGM:300,payNPC:450,active:true,slots:['10:00','11:40','13:20','15:00','16:40','18:20','20:20']},
    {id:'gy', storeId:'ms',name:'詭獄',    dur:110,needGM:0,needNPC:1,payGM:300,payNPC:450,active:true,slots:['10:00','12:00','14:00','16:00','18:00','20:00']},
    {id:'gyx',storeId:'ms',name:'詭獄加場',dur:110,needGM:0,needNPC:1,payGM:300,payNPC:450,active:true,slots:['11:00','13:00','15:00','17:00','19:00']},
    {id:'gd', storeId:'ms',name:'詭店',    dur:100,needGM:0,needNPC:1,payGM:300,payNPC:550,active:true,slots:['09:30','11:20','13:10','15:00','16:50','18:40','20:30']},
    {id:'gea',storeId:'dz',name:'孤兒怨',  dur:90, needGM:1,needNPC:0,payGM:300,payNPC:0,active:true,slots:['10:30','12:10','13:50','15:30','17:10','18:50','20:30']},
    {id:'slqk',storeId:'dz',name:'屎力全開',dur:100,needGM:1,needNPC:0,payGM:300,payNPC:0,active:true,slots:['09:50','11:40','13:30','15:20','17:20','19:10','21:00']},
    {id:'yyz',storeId:'dz',name:'越獄者',  dur:80, needGM:1,needNPC:0,payGM:300,payNPC:0,active:true,slots:['09:30','11:00','12:30','14:00','15:30','17:00','18:30','20:00']},
    {id:'wp', storeId:'ms',name:'外婆',    dur:60, needGM:1,needNPC:0,payGM:300,payNPC:0,active:true,slots:['09:40','11:10','12:40','14:10','15:40','17:10','18:40','20:10']}
  ];
}
/* ============ 雲端儲存層(Supabase)============ */
let S=null,sbc=null;
let LINE={accounts:[],worksites:[],requests:[],responses:[],guestReports:[],attendance:[],overtime:[],usage:[],outbox:[]};
function isDemo(){return (window.CFG&&CFG.DEMO)||/[?&]demo=1/.test(location.search)}
function seedConfig(){
  return {
    stores:[{id:'dz',name:'勃根地大忠店',color:'#111827'},{id:'ms',name:'謎先生',color:'#e5e7eb'}],
    themes:seedThemes(),
    settings:{prepMin:10,travelMin:12,npcMaxChain:2,npcRestMin:30},
    closedDates:[],
    employees:[]
  };
}
async function boot(){
  document.getElementById('view').innerHTML='<p class="muted" style="padding:20px">連線中…</p>';
  if(isDemo()&&!window.DEMO_DATA){ // 試玩模式:載入示範資料(6/1–7/5 真實場次,客人姓名已移除)
    await new Promise(function(res){
      const s=document.createElement('script');
      s.src='demo-data.js';s.onload=res;s.onerror=res;
      document.head.appendChild(s);
    });
  }

function makeMockSb(){
  const db={config:null,shifts:new Map(),punches:new Map()};

  }
  function ok(d){return{data:d,error:null}}
  function table(t){
    return{
      select:function(){
        return{
          eq:function(){return{maybeSingle:function(){return Promise.resolve(ok(t==='config'?db.config:null))}}},
          then:function(res){
            const d=t==='shifts'?Array.from(db.shifts.values()):t==='punches'?Array.from(db.punches.values()):[];
            res(ok(d));
          }
        };
      },
      upsert:function(row){

        if(t==='config')db.config={data:rows[0].data};
        else if(t==='shifts')rows.forEach(function(x){db.shifts.set(x.id,x)});
        else if(t==='punches')rows.forEach(function(x){db.punches.set(x.id,x)});
        return Promise.resolve(ok(null));

      insert:function(row){
        if(t==='punches')db.punches.set(row.id,row);
        return Promise.resolve(ok(null));
      },
      delete:function(){
        return{
          eq:function(col,v){
            if(t==='shifts')db.shifts.delete(v);
            if(t==='punches'){
              if(col==='emp_id'){Array.from(db.punches.values()).forEach(function(p){if(p.emp_id===v)db.punches.delete(p.id)})}
              else db.punches.delete(v);

          neq:function(){
            if(t==='shifts')db.shifts.clear();

/* 顏色亮度 → 決定文字黑/白,做大忠(深)/謎先生(淺)黑白對比 */
function lum(hex){hex=String(hex||'#64748b').replace('#','');if(hex.length<6)return .5;const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);return (0.299*r+0.587*g+0.114*b)/255;}
function textOn(bg){return lum(bg)>0.6?'#111827':'#ffffff';}
function employeeColor(e){
  const value=String(e?.simplybookColor||e?.simplyBookColor||e?.sbColor||e?.color||'').trim();

function baseThemeName(t){return t.name.replace(/\s*加場\s*$/,'').trim();}

function themeGroups(storeId){
  const ts=S.themes.filter(t=>t.storeId===storeId&&(t.active||filterTheme===t.id));
  const groups=[];const byBase={};
  for(const t of ts){if(isSurge(t))continue;const g={base:t,surge:null};byBase[baseThemeName(t)]=g;groups.push(g);}
  for(const t of ts){if(!isSurge(t))continue;const g=byBase[baseThemeName(t)];if(g)g.surge=t;else groups.push({base:t,surge:null});}
  return groups;
}

/* 區間內每位在職員工的場控/NPC場數統計 */
function staffLoad(from,to){
  const map={};
  for(const e of S.employees.filter(x=>x.active))map[e.id]={e,gm:0,npc:0,other:0};
  for(const sh of S.shifts){
    if(isCx(sh)||sh.date<from||sh.date>to)continue;
    for(const a of sh.assignments){
      if(!a.empId||!map[a.empId])continue;
      if(sh.kind==='theme'){if(a.role==='NPC')map[a.empId].npc++;else map[a.empId].gm++;}
      else map[a.empId].other++;
    }
  }
  const arr=Object.values(map).map(x=>({...x,total:x.gm+x.npc+x.other}));
  arr.sort((a,b)=>b.total-a.total);
  const active=arr.filter(x=>x.total>0);
  const avg=active.length?active.reduce((s,x)=>s+x.total,0)/active.length:0;
  const maxT=arr.length?arr[0].total:0;
  return {arr,avg,maxT};
}

    <select onchange="setFilterEmp(this.value)">${empOpts}</select>
    ${(filterTheme||filterEmp)?`<button class="btn gray sm" onclick="filterTheme='';filterEmp='';render()">清除篩選</button>`:''}
    <span class="grow"></span>
    ${S.stores.map(s=>`<span class="badge" style="background:${s.color};color:${textOn(s.color)};border:1px solid ${lum(s.color)>0.82?'#cbd5e1':'transparent'}">${esc(s.name)}</span>`).join(' ')}
  </div>`;
  let body='';
  if(viewMode==='month')body=vMonth();
  else if(viewMode==='day')body=vDaySessions();
  else body=vWeek();
  return `<div class="card">${segBar}<div class="schedwrap"><div class="schedmain">${body}</div>${staffLoadPanel()}</div></div>`;

/* ---- 月曆 ---- */
function moveMonth(n){
  const[y,m]=monthAnchor.split('-').map(Number);
  const d=new Date(y,m-1+n,1);
  monthAnchor=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  render();
}
function vMonth(){
  const[y,m]=monthAnchor.split('-').map(Number);
  const first=new Date(y,m-1,1);
  const startOffset=(first.getDay()+6)%7;
  const start=new Date(y,m-1,1-startOffset);
  const days=Array.from({length:42},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return fmtDate(d)});
  const td=todayStr();
  return `<div class="row" style="margin-bottom:10px">
    <button class="btn gray sm" onclick="moveMonth(-1)">←</button>
    <b style="font-size:16px">${y} 年 ${m} 月</b>
    <button class="btn gray sm" onclick="moveMonth(1)">→</button>
    <button class="btn gray sm" onclick="monthAnchor=monthStr();render()">回本月</button>
    <span class="muted">點日期進入該日場次表;<span style="background:#fde68a;padding:0 4px;border-radius:3px">黃底=有未排人場次</span>${filterEmp?';綠/灰=該員工當天可上班/休':''}</span>
  </div>
  <div class="mhead">${['一','二','三','四','五','六','日'].map(d=>`<div>週${d}</div>`).join('')}</div>
  <div class="mgrid">${days.map(ds=>{
    const inMonth=ds.slice(0,7)===monthAnchor;
    const shifts=S.shifts.filter(x=>x.date===ds&&shiftMatch(x)).sort((a,b)=>(a.start||'').localeCompare(b.start||''));
    const hasUnstaffed=shifts.some(sh=>!isCx(sh)&&!sh.assignments.some(a=>a.empId));
    // 選了人員時,格子底色顯示他當天可上班/休
    let av='';
    if(filterEmp){const e=emp(filterEmp);const a=e&&effectiveAvail(e,ds);av=a&&a.on?'avon':'avoff';}
    const cls=`mday ${inMonth?'':'dim'} ${ds===td?'today':''} ${hasUnstaffed&&!filterEmp?'hasunstaffed':''} ${av}`;
    return `<div class="${cls}" onclick="dayAnchor='${ds}';viewMode='day';render()">
      <div class="mnum">${Number(ds.slice(8))}${filterEmp&&av==='avon'?' <span style="color:#059669;font-size:11px">可</span>':filterEmp&&av==='avoff'?' <span style="color:#94a3b8;font-size:11px">休</span>':''}</div>
      ${S.closedDates.includes(ds)?'<div class="chip" style="background:#dc2626;color:#fff">店休</div>':''}
      ${shifts.map(sh=>{
        const staffed=sh.assignments.some(a=>a.empId);
        const who=filterEmp?'':(staffed?'':' ⚠未排');
        return `<div class="chip ${isCx(sh)?'cancelled':staffed?'':'unstaffed'}" style="${chipStyle(sh)}"
          onclick="event.stopPropagation();openShift('${sh.id}')">${sh.start} ${esc(shiftLabel(sh))}${isCx(sh)?' '+cxLabel(sh):who}</div>`;
      }).join('')||(filterTheme||filterEmp?'<span class="muted" style="font-size:11px">—</span>':'')}
    </div>`;
  }).join('')}</div>`;
}

/* 當日人力標籤:可上班=綠、兼職休=灰、正職休=紅 */
function manpowerTags(ds,compact){
  const list=S.employees.filter(e=>employedOn(e,ds));
  if(!list.length)return '<span class="muted">尚無員工</span>';
  return list.map(e=>{
    const a=effectiveAvail(e,ds);
    if(a&&a.on)return `<span class="tag" style="background:#d1fae5;color:#065f46">${esc(e.name)}${compact?'':' '+a.start+'–'+a.end}</span>`;
    if(e.type==='full')return `<span class="tag leavered">${esc(e.name)} 休🔴</span>`;
    return `<span class="tag" style="background:#f1f5f9;color:#94a3b8">${esc(e.name)} 休</span>`;
  }).join(' ');
}
function dayManpower(ds){
  const full=S.employees.filter(e=>e.type==='full'&&employedOn(e,ds));
  const fullLeave=full.filter(e=>{const a=effectiveAvail(e,ds);return !(a&&a.on)});
  return `<div style="background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:12px">
    <b style="font-size:13.5px">當日人力(依回報)</b>
    ${fullLeave.length?`<span class="tag leavered" style="margin-left:6px">正職休假:${fullLeave.map(e=>esc(e.name)).join('、')}</span>`:''}
    <br>${manpowerTags(ds,false)}
  </div>`;
}
/* ---- 日場次 ---- */
function moveDay(n){

  dayAnchor=fmtDate(d);render();
}
function findSlotShift(ds,themeId,slot){

}

  </div>
  ${S.closedDates.includes(ds)?'<div style="background:#fee2e2;color:#b91c1c;padding:8px 12px;border-radius:8px;margin-bottom:12px;font-weight:600">🔴 本日店休</div>':''}

    }).join('');
    return `<h3 style="margin:14px 0 8px"><span class="badge" style="background:${s.color};color:${textOn(s.color)};border:1px solid ${lum(s.color)>0.82?'#cbd5e1':'transparent'}">${esc(s.name)}</span></h3>
    <table>${groups.map(g=>`<tr><th style="width:110px">${esc(baseThemeName(g.base))}<br><span class="muted" style="font-weight:400">${g.base.dur}分</span></th>
      <td><div class="slotrow">${slotCells(g.base)}${g.surge?`<span style="align-self:center;color:#94a3b8;font-size:12px;margin:0 2px">｜加場</span>${slotCells(g.surge)}`:''}</div></td></tr>`).join('')}

  ${others.length?`<h3 style="margin:14px 0 8px">其他班次(櫃台/自訂時間)</h3>
    <table><tr><th>時間</th><th>店別</th><th>內容</th><th>人員</th></tr>
    ${others.map(sh=>`<tr class="${isCx(sh)?'cancelled':''}" onclick="openShift('${sh.id}')" style="cursor:pointer">

function createSlotShift(themeId,slot){

/* ---- 週表 ---- */
function weekDates(anchor){
  const d=new Date(anchor+'T00:00:00');
  const dow=(d.getDay()+6)%7;
  d.setDate(d.getDate()-dow);
  return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return fmtDate(x)});
}
function moveWeek(n){
  const d=new Date(weekAnchor+'T00:00:00');d.setDate(d.getDate()+n*7);
  weekAnchor=fmtDate(d);render();
}
async function copyManualWeekToNext(){
  const days=weekDates(weekAnchor),nextDays=days.map(ds=>{const d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+7);return fmtDate(d)});
  const source=S.shifts.filter(sh=>days.includes(sh.date)&&!isCx(sh)&&!String(sh.id).startsWith('sb_'));
  if(!source.length)return alert('本週沒有可複製的人工班次。SimplyBook 場次不會由這裡複製。');
  if(!confirm(`將本週 ${source.length} 筆人工班次複製到下週？\n\n包含櫃台、清潔、練習場、駐店及人工建立的班次；不包含 SimplyBook 同步場次。`))return;
  let added=0;
  for(const sh of source){
    const date=nextDays[days.indexOf(sh.date)],exists=S.shifts.some(x=>x.date===date&&x.storeId===sh.storeId&&x.kind===sh.kind&&x.themeId===sh.themeId&&x.start===sh.start&&x.end===sh.end);
    if(exists)continue;
    const copy={...JSON.parse(JSON.stringify(sh)),id:uid(),date,status:'active',recurringFrom:sh.id};
    S.shifts.push(copy);dbUpsertShift(copy);added++;
  }
  const d=new Date(weekAnchor+'T00:00:00');d.setDate(d.getDate()+7);weekAnchor=fmtDate(d);render();alert(`已新增 ${added} 筆下週班次；重複時段已略過。`);
}
function vWeek(){
  const days=weekDates(weekAnchor);
  const td=todayStr();
  return `<div class="row" style="margin-bottom:10px">
      <button class="btn gray sm" onclick="moveWeek(-1)">← 上週</button>
      <input type="date" value="${weekAnchor}" onchange="weekAnchor=this.value;render()">
      <button class="btn gray sm" onclick="moveWeek(1)">下週 →</button>
      <button class="btn gray sm" onclick="weekAnchor=todayStr();render()">本週</button>
      <button class="btn sm" onclick="copyManualWeekToNext()">複製人工班次到下週</button>
    </div>
    <p class="muted" style="margin-bottom:8px">每欄上方為當日人力(綠=可上班、灰=兼職休、<span class="leavered" style="padding:0 4px;border-radius:4px">紅=正職休</span>);黃底=有未排人場次。</p>
    <div class="week">${days.map(ds=>{
      const shifts=S.shifts.filter(x=>x.date===ds&&shiftMatch(x)).sort((a,b)=>(a.start||'').localeCompare(b.start||''));
      const hasUnstaffed=shifts.some(sh=>!isCx(sh)&&!sh.assignments.some(a=>a.empId));
      const avail=S.employees.filter(e=>employedOn(e,ds)&&(()=>{const a=effectiveAvail(e,ds);return a&&a.on})());
      return `<div class="day ${ds===td?'today':''}" style="${hasUnstaffed?'background:#fef3c7;border-color:#f59e0b':''}">
        <h4><span>${ds.slice(5)}(${WD[dateWD(ds)]})${S.closedDates.includes(ds)?' <span class="leavered" style="padding:0 4px;border-radius:4px">店休</span>':''}</span><a href="#" onclick="openShift(null,'${ds}');return false" style="text-decoration:none;color:var(--accent)">＋</a></h4>
        <div style="font-size:11px;line-height:1.5;margin-bottom:4px;border-bottom:1px dashed var(--line);padding-bottom:4px">
          <span class="muted">可上班 ${avail.length} 人</span><br>${manpowerTags(ds,true)}
        </div>
        ${shifts.map(sh=>{
          const who=sh.assignments.filter(a=>a.empId).map(a=>{const e=emp(a.empId);return e?`${esc(e.name)}(${a.role})`:''}).filter(Boolean).join('、')||'<i>未排人</i>';
          return `<div class="shift ${isCx(sh)?'cancelled':''}" style="${chipStyle(sh)}" onclick="openShift('${sh.id}')">
            <b>${sh.start||''}–${sh.end||''}</b> ${esc(shiftLabel(sh))}${isCx(sh)?' ('+cxLabel(sh)+')':''}<br><span class="who">${who}</span></div>`;
        }).join('')||'<span class="muted" style="font-size:12px">—</span>'}
      </div>`;
    }).join('')}</div>`;
}

/* ---- 班次編輯 ---- */
let editShiftId=null, dlgSlotsArr=[];
const dlgShift=document.getElementById('dlgShift');
function fillStoreSelect(sel,val){sel.innerHTML=S.stores.map(s=>`<option value="${s.id}" ${s.id===val?'selected':''}>${esc(s.name)}</option>`).join('')}
function openShift(id,presetDate,preset){
  editShiftId=id;
  const sh=id?byId(S.shifts,id):null;
  document.getElementById('dlgShiftTitle').textContent=sh?'編輯班次':'新增班次';
  document.getElementById('sfDelete').style.display=sh?'':'none';
  document.getElementById('sfWriteback').style.display=(sh&&String(sh.id).indexOf('sb_')===0&&!isDemo())?'':'none';
  fillStoreSelect(document.getElementById('sfStore'),sh?sh.storeId:(preset?preset.storeId:S.stores[0].id));
  document.getElementById('sfDate').value=sh?sh.date:(presetDate||todayStr());
  document.getElementById('sfKind').value=sh?sh.kind:'theme';
  document.getElementById('sfNote').value=sh?(sh.note||''):'';
  rebuildThemeSelect(sh?sh.themeId:(preset?preset.themeId:null));
  if(sh){
    document.getElementById('sfStart').value=sh.start;
    document.getElementById('sfEnd').value=sh.end;
    dlgSlotsArr=sh.assignments.map(a=>({role:a.role,empId:a.empId}));
  }else if(preset){
    document.getElementById('sfStart').value=preset.start;
    autoEnd();
    defaultSlots();
  }else{
    const t=theme(document.getElementById('sfTheme').value);
    document.getElementById('sfStart').value=(t&&t.slots&&t.slots[0])||'14:00';
    autoEnd();
    defaultSlots();
  }
  renderSlotTimeBtns();
  renderSlots();
  // 客人與付款資訊(SimplyBook 同步來的才有)
  const cbox=document.getElementById('sfCustomer');
  if(sh&&sh.customer&&(sh.customer.name||sh.customer.phone)){
    const c=sh.customer,p=sh.payment||{};
    cbox.style.display='';
    cbox.innerHTML=`<b>👤 客人資訊</b>　${esc(c.name||'')}`
      +(c.phone?`　📞 <a href="tel:${esc(c.phone)}">${esc(c.phone)}</a>`:'')
      +(c.email?`　✉ ${esc(c.email)}`:'')
      +(c.comment?`<br>💬 ${esc(c.comment)}`:'')
      +(p.depositAmount?`<br>💰 訂金 ${p.depositCurrency||p.currency||''} ${p.depositAmount}（${p.depositStatus==='paid'?'已付':esc(p.depositStatus||'')}${p.system?'・'+esc(p.system):''}）`:'');
  }else cbox.style.display='none';
  // 場次狀態(取消/颱風天/改期)
  const st=sh?(sh.status||'active'):'active';
  document.getElementById('sfStatus').value=st.indexOf('cancelled')===0?st:'active';
  const rb=sh&&sh.rebook||{};
  document.getElementById('sfRebookDue').value=rb.due||'';
  document.getElementById('sfRebookState').value=rb.state||'pending';
  document.getElementById('sfCancelNote').value=rb.note||'';
  onStatusChange(true);
  dlgShift.showModal();
}
function onStatusChange(keep){
  const v=document.getElementById('sfStatus').value;
  const box=document.getElementById('sfCancelBox');
  box.style.display=v.indexOf('cancelled')===0?'':'none';
  if(v==='cancelled_typhoon'&&!keep&&!document.getElementById('sfRebookDue').value){
    const d=new Date(document.getElementById('sfDate').value+'T00:00:00');
    d.setMonth(d.getMonth()+1);
    document.getElementById('sfRebookDue').value=fmtDate(d);
  }
}
function rebuildThemeSelect(val){
  const storeId=document.getElementById('sfStore').value;
  const kind=document.getElementById('sfKind').value;
  document.getElementById('sfThemeWrap').style.display=kind==='theme'?'':'none';
  const opts=S.themes.filter(t=>t.storeId===storeId&&(t.active||t.id===val));

function renderSlotTimeBtns(){

function saveQuickPreset(){

function deleteQuickPreset(id){if(!confirm('刪除這組常用時段？已建立的班次不受影響。'))return;S.settings.shiftPresets=(S.settings.shiftPresets||[]).filter(p=>p.id!==id);save();renderQuick()}

function autoEnd(){

function onShiftStoreKind(){rebuildThemeSelect(null);autoEnd();defaultSlots();renderSlotTimeBtns();renderSlots()}
function onThemeChange(){

  autoEnd();defaultSlots();renderSlotTimeBtns();renderSlots();
}
function onStartChange(){autoEnd();renderSlotTimeBtns();renderSlots()}
function defaultSlots(){
  const kind=document.getElementById('sfKind').value;
  dlgSlotsArr=[];
  if(kind==='theme'){
    const t=theme(document.getElementById('sfTheme').value);
    for(let i=0;i<(t?t.needGM:1);i++)dlgSlotsArr.push({role:'場控',empId:''});
    for(let i=0;i<(t?t.needNPC:0);i++)dlgSlotsArr.push({role:'NPC',empId:''});
  }else if(kind==='practice')dlgSlotsArr.push({role:'練習場',empId:''},{role:'陪練',empId:''});

function addSlot(){

  renderSlots();
}
function rmSlot(i){dlgSlotsArr.splice(i,1);renderSlots()}
function slotRole(i,v){dlgSlotsArr[i].role=v;renderSlots()}
function slotEmp(i,v){dlgSlotsArr[i].empId=v}
/* NPC 連場檢查:連續 npcMaxChain 場後必須休息(間隔 < npcRestMin 分視為連場);場控不受限 */
function npcChainWarning(e,date,start,end){
  const max=S.settings.npcMaxChain??2, rest=S.settings.npcRestMin??30;
  if(!max)return null;
  const list=S.shifts
    .filter(sh=>sh.id!==editShiftId&&sh.date===date&&sh.assignments.some(a=>a.empId===e.id&&a.role==='NPC'))
    .map(sh=>({s:toMin(sh.start),e:toMin(sh.end)}));
  list.push({s:toMin(start),e:toMin(end),cand:true});
  list.sort((a,b)=>a.s-b.s);
  let chain=[list[0]];
  const chains=[chain];
  for(let i=1;i<list.length;i++){
    if(list[i].s-list[i-1].e<rest)chain.push(list[i]);
    else{chain=[list[i]];chains.push(chain)}
  }
  const c=chains.find(ch=>ch.some(x=>x.cand));
  if(c&&c.length>max)return `NPC 連${max}場需休息(此場將是連續第${c.length}場)`;
  return null;
}
/* 核心衝突檢查:開場前 prepMin 分鐘就要到位;跨店需留 travelMin 分鐘路程 */
function empWarnings(e,date,start,end,storeId,role){
  const w=[];
  if(!employedOn(e,date)){
    if(e.startDate&&date<e.startDate)w.push(`尚未到職(${e.startDate})`);
    else if(e.endDate&&date>e.endDate)w.push(`已離職(${e.endDate})`);
    else w.push('已停用');
  }
  const prep=S.settings.prepMin||0, travel=S.settings.travelMin||0;
  const s=toMin(start)!=null?toMin(start)-prep:null, en=toMin(end);
  const av=effectiveAvail(e,date);
  if(!av||!av.on)w.push(e.availX&&e.availX[date]?'當日排休/回報不可':'當日未回報可上班');
  else if(s!=null&&en!=null&&(toMin(av.start)>s||toMin(av.end)<en))w.push(`超出可上班時段${av.start}–${av.end}(開場前${prep}分要到)`);
  if(s==null||en==null)return w;
  for(const sh of S.shifts){
    if(sh.id===editShiftId||sh.date!==date||isCx(sh))continue;
    if(!sh.assignments.some(a=>a.empId===e.id))continue;
    const s2=toMin(sh.start)-prep, e2=toMin(sh.end);
    const sameStore=sh.storeId===storeId;
    const gap=sameStore?0:travel;
    if(s<e2+gap&&en+gap>s2){
      w.push(sameStore
        ?`衝堂:${sh.start}–${sh.end} ${shiftLabel(sh)}`
        :`跨店路程不足${travel}分:${store(sh.storeId)?.name||''} ${sh.start}–${sh.end} ${shiftLabel(sh)}`);
    }
  }
  if(role==='NPC'){
    const nw=npcChainWarning(e,date,start,end);
    if(nw)w.push(nw);
  }
  return w;
}
function eligibleFor(){

function renderSlots(){
  const storeId=document.getElementById('sfStore').value;
  const themeId=document.getElementById('sfTheme').value;
  const date=document.getElementById('sfDate').value;
  const start=document.getElementById('sfStart').value,end=document.getElementById('sfEnd').value;
  const kind=document.getElementById('sfKind').value;
  document.getElementById('sfSlots').innerHTML=dlgSlotsArr.map((sl,i)=>{
    const cands=eligibleFor();
    const cur=sl.empId&&!cands.some(c=>c.id===sl.empId)?emp(sl.empId):null;
    const list=cur?[cur,...cands]:cands;
    const good=[],bad=[];
    for(const e of list){
      const w=empWarnings(e,date,start,end,storeId,sl.role);
      if(sl.role==='櫃台'&&!(e.counters||[]).includes(storeId))w.push('未設此店櫃台(儲存時自動加入)');
      else if(kind==='theme'&&(sl.role==='場控'||sl.role==='NPC')&&!(e.skills?.[themeId]||[]).includes(sl.role))w.push(`未勾此主題${sl.role}技能(儲存時自動勾選)`);
      (w.length?bad:good).push({e,w});
    }
    const opt=({e,w})=>`<option value="${e.id}" ${e.id===sl.empId?'selected':''}>${w.length?'⚠ ':''}${esc(e.name)}${w.length?' — '+w.join(';'):''}</option>`;
    const opts=`<option value="">(未指定)</option>`
      +(good.length?`<optgroup label="✓ 可排(無碰撞)">${good.map(opt).join('')}</optgroup>`:'')
      +(bad.length?`<optgroup label="⚠ 有狀況(仍可強制選)">${bad.map(opt).join('')}</optgroup>`:'');
    return `<div class="slot">
      <select onchange="slotRole(${i},this.value)">${ROLES.map(r=>`<option ${r===sl.role?'selected':''}>${r}</option>`).join('')}</select>
      <select class="grow" onchange="slotEmp(${i},this.value)">${opts}</select>

}

function notifyShiftAssignments(obj,prev){
  if(isDemo()||isCx(obj))return;
  const oldSig=prev?`${prev.date}|${prev.start}|${prev.end}|${prev.storeId}|${prev.kind}|${prev.themeId||''}`:'',newSig=`${obj.date}|${obj.start}|${obj.end}|${obj.storeId}|${obj.kind}|${obj.themeId||''}`;

  }

function saveShift(){
  const date=document.getElementById('sfDate').value;
  const start=document.getElementById('sfStart').value,end=document.getElementById('sfEnd').value;
  if(!date||!start||!end)return alert('請填日期與起訖時間');
  if(toMin(end)<=toMin(start))return alert('結束時間需晚於開始時間');
  if(S.closedDates.includes(date)&&!confirm('該日為店休日,仍要建立班次?'))return;
  const kind=document.getElementById('sfKind').value;
  const prev=editShiftId?byId(S.shifts,editShiftId):null;
  const statusVal=document.getElementById('sfStatus').value;
  const isCancel=statusVal.indexOf('cancelled')===0;
  const obj={
    id:editShiftId||uid(),date,storeId:document.getElementById('sfStore').value,kind,
    themeId:kind==='theme'?document.getElementById('sfTheme').value:null,
    start,end,note:document.getElementById('sfNote').value.trim(),
    assignments:dlgSlotsArr.map(s=>({role:s.role,empId:s.empId})),
    status:isCancel?statusVal:'active'
  };
  // 保留 SimplyBook 同步來的客人/付款資訊
  if(prev){if(prev.customer)obj.customer=prev.customer;if(prev.payment)obj.payment=prev.payment;if(prev.sourceUpdatedAt)obj.sourceUpdatedAt=prev.sourceUpdatedAt;}
  // 取消/改期資訊
  if(isCancel){
    obj.rebook={
      reason:statusVal,
      due:document.getElementById('sfRebookDue').value||'',
      state:document.getElementById('sfRebookState').value,
      note:document.getElementById('sfCancelNote').value.trim()
    };
  }
  // 自由選人:被指派者若尚未勾技能/櫃台,自動同步到技能表
  for(const s of obj.assignments){
    if(!s.empId)continue;
    const e=emp(s.empId);if(!e)continue;
    if(s.role==='櫃台'){
      e.counters=e.counters||[];
      if(!e.counters.includes(obj.storeId))e.counters.push(obj.storeId);
    }else if(obj.kind==='theme'&&obj.themeId&&(s.role==='場控'||s.role==='NPC')){
      e.skills=e.skills||{};
      const arr=e.skills[obj.themeId]||[];
      if(!arr.includes(s.role))e.skills[obj.themeId]=[...arr,s.role];
    }
  }
  if(String(obj.id).indexOf('sb_')===0)obj.manualEdit=true; // SimplyBook 班次手動改過,同步時不覆蓋
  if(editShiftId){const i=S.shifts.findIndex(x=>x.id===editShiftId);S.shifts[i]=obj}
  else S.shifts.push(obj);
  save();dbUpsertShift(obj);notifyShiftAssignments(obj,prev);dlgShift.close();render();
}
function deleteShift(){

  dbDeleteShift(editShiftId);
  S.shifts=S.shifts.filter(x=>x.id!==editShiftId);

async function writebackShift(){

  const btn=document.getElementById('sfWriteback');

  try{
    const r=await sbc.functions.invoke('sb-writeback',{body:{shiftId:editShiftId}});

    if(r.data&&r.data.error)throw new Error(r.data.error+(r.data.hint?'\n'+r.data.hint:''));
    alert('✅ 回寫完成:'+(r.data&&r.data.message?r.data.message:(e?e.name:'')+' 已更新到 SimplyBook'));

}

async function voidPunch(id){
  const reason=(prompt('原始打卡不能刪除。請填寫作廢原因（至少 3 個字）：')||'').trim();
  if(!reason)return;
  if(reason.length<3)return alert('作廢原因至少需要 3 個字，請寫清楚原因後再送出。');

function pairPunches(empId,month){
  const ps=S.punches.filter(p=>p.empId===empId&&!p.voidedAt&&p.ts.slice(0,7)===month).sort((a,b)=>a.ts.localeCompare(b.ts));
  const rows=[];let open=null;
  for(const p of ps){
    if(p.type==='in'){if(open)rows.push({date:open.ts.slice(0,10),in:open.ts.slice(11,16),out:null,min:0,inPunch:open,outPunch:null});open=p}
    else{
      if(open){rows.push({date:open.ts.slice(0,10),in:open.ts.slice(11,16),out:p.ts.slice(11,16),
        min:Math.max(0,(new Date(p.ts)-new Date(open.ts))/60000),inPunch:open,outPunch:p});open=null}
      else rows.push({date:p.ts.slice(0,10),in:null,out:p.ts.slice(11,16),min:0,inPunch:null,outPunch:p});
    }
  }
  if(open)rows.push({date:open.ts.slice(0,10),in:open.ts.slice(11,16),out:null,min:0,inPunch:open,outPunch:null});
  return rows;
}

/* ============ 薪資 ============ */
let payMonth=monthStr();
function isHolidayRate(date){const wd=dateWD(date);return wd===0||wd===6}
function themeSessionRate(t,role,date){
  const holiday=isHolidayRate(date);
  if(role==='NPC')return Number(holiday?(t.payNPCHoliday??t.payNPC):(t.payNPC??0))||0;
  if(role==='場控')return Number(holiday?(t.payGMHoliday??t.payGM):(t.payGM??0))||0;
  return 0;
}
function schedMinutes(empId,month){
  let m=0;
  for(const sh of S.shifts){
    if(isCx(sh)||sh.date.slice(0,7)!==month)continue;
    if(!sh.assignments.some(a=>a.empId===empId))continue;
    m+=Math.max(0,toMin(sh.end)-toMin(sh.start));
  }
  return m;
}
function actualMinutes(empId,month){
  return pairPunches(empId,month).reduce((s,r)=>s+r.min,0);
}
/* 場次費統計:每場依主題費率(場控 payGM / NPC payNPC)計酬 */
function sessionStats(empId,month){
  let pay=0,gm=0,npc=0;const detail={};
  for(const sh of S.shifts){
    if(isCx(sh)||sh.date.slice(0,7)!==month||sh.kind!=='theme')continue;
    const t=theme(sh.themeId);if(!t)continue;
    for(const a of sh.assignments){
      if(a.empId!==empId)continue;
      let r=0;
      if(a.role==='NPC'){npc++;r=themeSessionRate(t,a.role,sh.date)}
      else if(a.role==='場控'){gm++;r=themeSessionRate(t,a.role,sh.date)}
      pay+=r;
      const k=`${t.name}${a.role}`;detail[k]=(detail[k]||0)+1;
    }
  }
  return{pay,gm,npc,detail};
}
/* 櫃台/駐店班時數(時薪計;不含練習場)*/
function hourlyMinutes(empId,month){
  let m=0;
  for(const sh of S.shifts){
    if(isCx(sh)||sh.date.slice(0,7)!==month||sh.kind==='theme'||sh.kind==='practice')continue;
    if(!sh.assignments.some(a=>a.empId===empId))continue;
    m+=Math.max(0,toMin(sh.end)-toMin(sh.start));
  }
  return m;
}
/* 時薪薪資只採用管理員逐日核准的計薪分鐘；原始打卡與排班時數僅供核對。 */
function approvedHourlyMinutes(empId,month){
  return (LINE.daily||[]).filter(x=>x.emp_id===empId&&String(x.work_date).slice(0,7)===month&&x.status==='approved')
    .reduce((n,x)=>n+Math.max(0,Number(x.payable_minutes)||0),0);
}
function approvedHourlyBreakdown(e,month){
  let minutes=0,pay=0;
  for(const d of (LINE.daily||[]).filter(x=>x.emp_id===e.id&&String(x.work_date).slice(0,7)===month&&x.status==='approved')){
    const payable=Math.max(0,Number(d.payable_minutes)||0);if(!payable)continue;
    const shifts=S.shifts.filter(sh=>!isCx(sh)&&sh.date===d.work_date&&sh.kind!=='theme'&&(sh.assignments||[]).some(a=>a.empId===e.id));
    const weighted=shifts.map(sh=>({m:Math.max(0,toMin(sh.end)-toMin(sh.start)),rate:sh.kind==='practice'?(S.settings.practiceHourlyRate||196):sh.kind==='floor'?(S.settings.floorHourlyRate||200):(e.hourlyRate||0)}));
    const scheduled=weighted.reduce((n,x)=>n+x.m,0);minutes+=payable;
    if(scheduled)pay+=weighted.reduce((n,x)=>n+(payable*x.m/scheduled)/60*x.rate,0);else pay+=payable/60*(e.hourlyRate||0);
  }
  return{minutes,pay:Math.round(pay)};
}
function approvedOvertimeMinutes(empId,month){
  return (LINE.overtime||[]).filter(x=>x.emp_id===empId&&String(x.work_date).slice(0,7)===month&&x.status==='approved')
    .reduce((n,x)=>n+Math.max(0,Number(x.approved_minutes)||0),0);
}
/* 練習場時數(單獨統計,不自動計薪)*/
function practiceMinutes(empId,month){
  let m=0;
  for(const sh of S.shifts){
    if(isCx(sh)||sh.date.slice(0,7)!==month||sh.kind!=='practice')continue;
    if(!sh.assignments.some(a=>a.empId===empId))continue;
    m+=Math.max(0,toMin(sh.end)-toMin(sh.start));
  }
  return m;
}
/* 某員工當月所有場次明細(供逐筆檢視)*/
function empSessions(empId,month){
  const rows=[];
  for(const sh of S.shifts){
    if(sh.date.slice(0,7)!==month)continue;
    const a=sh.assignments.find(x=>x.empId===empId);
    if(!a)continue;
    const t=sh.kind==='theme'?theme(sh.themeId):null;
    let fee=0;
    if(!isCx(sh)&&t){fee=themeSessionRate(t,a.role,sh.date);}
    rows.push({date:sh.date,start:sh.start,end:sh.end,
      kind:sh.kind,label:shiftLabel(sh),role:a.role,
      store:store(sh.storeId)?.name||'',fee,cancelled:isCx(sh),cx:cxLabel(sh)});
  }
  return rows.sort((x,y)=>(x.date+x.start).localeCompare(y.date+y.start));
}

function vPay(){
  const actives=S.employees.filter(e=>employedInMonth(e,payMonth));
  const rows=actives.map(e=>{
    const ss=sessionStats(e.id,payMonth);
    const hourly=approvedHourlyBreakdown(e,payMonth),hm=hourly.minutes,hp=hourly.pay;
    const base=e.type==='full'?(e.monthlySalary||0):0;

    // 正職加班只採管理員核准分鐘，不讓缺卡或異常長工時自動進薪資。
    const otMin=e.type==='full'?approvedOvertimeMinutes(e.id,payMonth):0;
    let otHr=otMin/60,otPay=Math.round(otHr*(e.otRate||e.hourlyRate||0));
    return{e,ss,hm,hp,base,am,otHr,otPay,total:ss.pay+hp+base+otPay};

        <td class="num">${hm?fmtHr(hm):'—'}</td>
        <td class="num">${hp?hp.toLocaleString():'—'}</td>
        <td class="num">${base?base.toLocaleString():'—'}</td>
        <td class="num">${am?fmtHr(am):'—'}</td>

  </div>`;
}
function exportPayCSV(){
  const actives=S.employees.filter(e=>e.active);
  let csv='﻿員工,身分,場控場次,NPC場次,場次費,櫃台駐店時數,時薪費,月薪,打卡時數,合計,場次明細\n';
  for(const e of actives){
    const ss=sessionStats(e.id,payMonth);
    const hourly=approvedHourlyBreakdown(e,payMonth),hm=hourly.minutes,hp=hourly.pay;
    const base=e.type==='full'?(e.monthlySalary||0):0;
    const am=actualMinutes(e.id,payMonth);
    const detail=Object.entries(ss.detail).map(([k,n])=>k+'×'+n).join('、');
    csv+=`${e.name},${e.type==='part'?'兼職':'正職'},${ss.gm},${ss.npc},${ss.pay},${fmtHr(hm)},${hp},${base},${fmtHr(am)},${ss.pay+hp+base},"${detail}"\n`;
  }
  dl(csv,`薪資_${payMonth}.csv`,'text/csv');
}
function dl(content,name,type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name;a.click();URL.revokeObjectURL(a.href);
}

  const data={

/* 解析 Google 日曆自由格式回報 → {on,start,end} 或 null */
function parseGCalAvail(raw){
  const s=String(raw).replace(/[🍐👌🏻😻👍✅️\s]/g,'');
  const norm=(h,m=0)=>{h=+h;m=+m;if(h>=1&&h<=8)h+=12;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')};
  const norm4=t=>{t=String(t).padStart(4,'0');return t.slice(0,2)+':'+t.slice(2)};
  if(/其餘皆可/.test(s))return {on:true,start:'09:00',end:'22:30'};
  const rng=s.match(/(\d{1,2})\s*[-~～至]\s*(\d{1,2})\s*可以/);
  if(rng)return {on:true,start:norm(rng[1]),end:norm(rng[2])};
  let dir=null;
  if(/前/.test(s))dir='before';else if(/後/.test(s))dir='after';else if(/離/.test(s))dir='before';
  if(dir){let t=null,m;
    if(m=s.match(/(\d{1,2})[:：](\d{2})/))t=m[1].padStart(2,'0')+':'+m[2];
    else if(m=s.match(/(\d{3,4})/))t=norm4(m[1]);
    else if(m=s.match(/(\d{1,2})點/))t=norm(m[1]);
    if(t)return dir==='before'?{on:true,start:'09:00',end:t}:{on:true,start:t,end:'22:30'};
  }
  if(/(❌|❎|不行|休|特休)/.test(s))return {on:false,start:'09:00',end:'22:30'};
  if(/(allday|全天|整天|全台可以|可以|全部)/i.test(s))return {on:true,start:'09:00',end:'22:30'};
  return null;
}
/* 從事件文字找出開頭的員工姓名(比對現有員工) */
function matchEmpByText(text){
  const t=String(text).replace(/\s/g,'');
  for(const e of S.employees){
    if(t.startsWith(e.name)||t.includes(e.name)||(e.aliases||[]).some(a=>t.includes(a)))return e;
  }
  return null;
}
async function loadIcal(doImport){
  const url=document.getElementById('icalUrl').value.trim();
  const m=document.getElementById('icalMonth').value;
  const box=document.getElementById('icalResult');
  if(!url){box.innerHTML='<p class="warn">請先貼上 iCal 網址</p>';return}
  if(isDemo()){box.innerHTML='<p class="muted">試玩模式不連雲端,無法抓取。</p>';return}
  S.icalUrl=url;save();
  box.innerHTML='<p class="muted">抓取中…</p>';
  const from=m+'-01', to=fmtDate(new Date(Number(m.slice(0,4)),Number(m.slice(5,7)),0));
  try{
    const r=await sbc.functions.invoke('ical-fetch',{body:{url,from,to}});
    if(r.error)throw new Error(r.error.message||JSON.stringify(r.error));
    if(r.data&&r.data.error)throw new Error(r.data.error);
    const evs=(r.data&&r.data.events)||[];
    if(!evs.length){box.innerHTML='<p class="muted">該月沒有事件。</p>';return}
    if(doImport){
      if(!confirm('將把 '+m+' 的 Google 日曆回報解析後,寫入各員工的「特定日期回報」(會覆蓋該月同日的既有回報),確定?'))return;
      let applied=0;const unmatched=new Set(),unparsed=[];
      for(const ev of evs){
        const e=matchEmpByText(ev.summary);
        if(!e){continue}
        const av=parseGCalAvail(ev.summary);
        if(!av){unparsed.push(ev.summary);continue}
        e.availX=e.availX||{};e.availX[ev.date]=av;applied++;
      }
      save();
      box.innerHTML=`<p class="ok" style="color:#059669">✅ 已匯入 ${applied} 筆到 ${m} 可上班時間。`
        +(unparsed.length?` 有 ${unparsed.length} 筆無法辨識(維持原樣):${unparsed.slice(0,8).map(esc).join('、')}`:'')
        +`</p><p class="muted">切到「排班表」即可看到更新後的每日人力。無法辨識的可在上方「特定日期回報」手動補。</p>`;
      return;
    }
    const byDate={};for(const ev of evs){(byDate[ev.date]=byDate[ev.date]||[]).push(ev.summary)}
    box.innerHTML=`<table><tr><th>日期</th><th>Google 行事曆(員工回報/休假)</th></tr>`+
      Object.keys(byDate).sort().map(d=>`<tr><td>${d}(週${WD[dateWD(d)]})</td><td>${byDate[d].map(s=>`<span class="tag">${esc(s)}</span>`).join(' ')}</td></tr>`).join('')+
      `</table><p class="muted" style="margin-top:6px">共 ${evs.length} 筆。按「解析並匯入為可上班時間」可自動轉入排班判斷。</p>`;
  }catch(e){box.innerHTML='<p class="warn">抓取失敗:'+esc(e.message)+'</p>'}
}

  <div class="card"><h2>正職換班待確認（${pendingChanges.length}）</h2><p class="muted">正職可回報今日所有場次班別；不會自動邀請其他同事。請由管理員選定替補人員或拒絕。</p>${pendingChanges.map(r=>{const sh=byId(S.shifts,r.shift_id),cands=sh?managerChangeCandidates(r,sh):[],replaced=r.details?.replacedEmpId||r.requester_emp_id;return `<div style="padding:10px 0;border-bottom:1px solid #e5e7eb"><b>回報：${esc(emp(r.requester_emp_id)?.name||r.requester_emp_id)}・原排：${esc(emp(replaced)?.name||replaced)}（${esc(r.details?.replacedRole||'')}）</b><br><span class="muted">${sh?`${sh.date} ${sh.start}–${sh.end} ${esc(shiftLabel(sh))}`:esc(r.shift_id)}<br>原因：${esc(r.details?.reasonLabel||'其他')}${r.details?.note?`；${esc(r.details.note)}`:''}</span><div class="row" style="margin-top:8px"><select id="change_${r.id}" style="width:auto;min-width:150px"><option value="">選擇替補人員</option>${cands.map(e=>`<option value="${e.id}">${esc(e.name)}</option>`).join('')}</select><button class="btn sm" onclick="reviewShiftChange('${r.id}','approved')" ${cands.length?'':'disabled'}>核准換人</button><button class="btn red sm" onclick="reviewShiftChange('${r.id}','rejected')">拒絕</button></div></div>`}).join('')||'<p class="muted">目前沒有待確認換班</p>'}</div>
  <div class="card"><h2>客人回報待處理（${pendingGuests.length}）</h2><p class="muted">請先回到 SimplyBook 建立／確認預約與訂金，再確認帶場人員，最後在此回覆員工。</p>${pendingGuests.map(r=>{const sh=byId(S.shifts,r.shift_id);return `<div style="padding:10px 0;border-bottom:1px solid #e5e7eb"><b>${r.customer_type==='walk_in'?'現場客人':'預約客人'}・${esc(r.surname)}・${r.party_size}人</b><br><span class="muted">電話：${esc(r.phone)}<br>場次：${sh?`${sh.date} ${sh.start}–${sh.end} ${esc(shiftLabel(sh))}`:esc(r.shift_id)}<br>回報者：${esc(emp(r.emp_id)?.name||r.emp_id)}${r.note?`<br>補充：${esc(r.note)}`:''}</span><label>回覆內容</label><input id="guestReply_${r.id}" placeholder="例如：已建立 SimplyBook，訂金已確認，由庭瑋帶場"><div class="row" style="margin-top:8px"><button class="btn sm" onclick="reviewGuestReport('${r.id}','confirmed')">完成並回覆</button><button class="btn red sm" onclick="reviewGuestReport('${r.id}','rejected')">無法受理</button></div></div>`}).join('')||'<p class="muted">目前沒有待處理客人回報</p>'}</div>
  <div class="card"><h2>近期管理員換班紀錄</h2>${completedTrades.slice(0,20).map(r=>`<div class="row" style="padding:9px 0;border-bottom:1px solid #eee"><span class="grow"><b>換人・${esc(emp(r.requester_emp_id)?.name||r.requester_emp_id)} → ${esc(emp(r.selected_emp_id)?.name||r.selected_emp_id)}</b><br><span class="muted">${esc(byId(S.shifts,r.shift_id)?.date||'')} ${esc(byId(S.shifts,r.shift_id)?.start||'')}</span></span><button class="btn red sm" onclick="revertTrade('${r.id}')">撤銷並還原</button></div>`).join('')||'<p class="muted">尚無已完成換班</p>'}</div>
  <div class="card"><h2>補卡申請（${pendingAtt.length}）</h2>${pendingAtt.map(r=>{const label=r.request_type==='missing_in'?'補上班卡':r.request_type==='missing_out'?'補下班卡':r.request_type==='npc_checkin'?'NPC 補場次報到':'補／更正完整場次',times=r.request_type==='correction'?`${r.requested?.inTime||'?'}–${r.requested?.outTime||'?'}`:(r.requested?.time||'?'),work=(r.requested?.workItem?.labels||[]).join('、')||'未填工作項目';return `<div class="row" style="padding:9px 0;border-bottom:1px solid #eee"><span class="grow"><b>${esc(emp(r.emp_id)?.name||r.emp_id)}・${r.punch_date}・${label} ${times}</b><br><span class="muted">工作：${esc(work)}<br>原因：${esc(r.reason)}</span></span><button class="btn sm" onclick="reviewAttendance('${r.id}','approved')">核准並補登</button><button class="btn red sm" onclick="reviewAttendance('${r.id}','rejected')">拒絕</button></div>`}).join('')||'<p class="muted">目前沒有待審補卡</p>'}</div>
  <div class="card"><h2>每日工時與時薪計薪審核（${pendingDaily.length}）</h2><p class="muted">原始打卡只計算候選工時；管理員核准「計薪分鐘」後才會進入時薪薪資。</p>${pendingDaily.slice(0,80).map(r=>{const id=`pay_${r.emp_id}_${r.work_date}`;return `<div class="row" style="padding:9px 0;border-bottom:1px solid #eee"><span class="grow"><b>${esc(emp(r.emp_id)?.name||r.emp_id)}・${r.work_date}</b><br><span class="muted">排班 ${r.scheduled_minutes}分／打卡 ${r.actual_minutes}分${r.anomalies?.length?`／<span class="warn">${esc(r.anomalies.join('、'))}</span>`:''}</span></span><label style="margin:0">計薪 <input id="${id}" type="number" min="0" max="1440" value="${r.payable_minutes??r.actual_minutes}" style="width:82px"> 分</label><button class="btn sm" onclick="reviewDaily('${r.emp_id}','${r.work_date}','approved','${id}')">核准</button><button class="btn red sm" onclick="reviewDaily('${r.emp_id}','${r.work_date}','rejected','${id}')">不計薪</button></div>`}).join('')||'<p class="muted">目前沒有待審工時</p>'}</div>
  <div class="card"><div class="row"><h2 class="grow">加班候選（${pendingOt.length}）</h2><button class="btn gray sm" onclick="calculateOvertime()">重新計算本月</button></div>${pendingOt.map(r=>`<div class="row" style="padding:9px 0;border-bottom:1px solid #eee"><span class="grow"><b>${esc(emp(r.emp_id)?.name||r.emp_id)}・${r.work_date}</b><br><span class="muted">排班 ${r.scheduled_minutes}分／實際 ${r.actual_minutes}分／候選 ${r.candidate_minutes}分・${fmtStatus(r.status)}</span></span><input id="ot_${r.id}" type="number" min="0" value="${r.candidate_minutes}" style="width:80px"><button class="btn sm" onclick="reviewOvertime('${r.id}','approved')">核准</button><button class="btn red sm" onclick="reviewOvertime('${r.id}','rejected')">拒絕</button></div>`).join('')||'<p class="muted">目前沒有待審加班</p>'}</div>
  <div class="card"><h2>通知紀錄</h2><table><tr><th>時間</th><th>類型</th><th>員工</th><th>狀態</th></tr>${LINE.outbox.slice().sort((a,b)=>b.created_at.localeCompare(a.created_at)).slice(0,30).map(n=>`<tr><td>${n.created_at.slice(0,16).replace('T',' ')}</td><td>${esc(n.category)}</td><td>${esc(emp(n.recipient_emp_id)?.name||n.recipient_emp_id||'')}</td><td>${esc(n.status)}${n.error?`<br><span class="warn">${esc(n.error)}</span>`:''}</td></tr>`).join('')||'<tr><td colspan="4" class="muted">尚無紀錄</td></tr>'}</table></div>`;
}
async function refreshLineAdmin(){await loadLineAdmin();render()}
function saveReminderHour(){S.settings.reminderHour=Number(document.getElementById('reminderHour').value)||20;save();alert('提醒時間已儲存')}
async function makeBindCode(empId,role){
  const code=Math.random().toString(36).slice(2,10).toUpperCase();
  const expires=new Date(Date.now()+24*3600*1000).toISOString();
  const r=await sbc.from('line_bind_codes').insert({code,emp_id:empId,role,expires_at:expires});
  if(r.error)return alert('產生失敗：'+r.error.message);
  prompt(`${emp(empId)?.name||empId} 的一次性驗證碼（24小時有效）`,code);
}
async function unbindLine(empId){if(!confirm('解除後，該員工必須用新驗證碼重新綁定，確定?'))return;const r=await sbc.from('line_accounts').delete().eq('emp_id',empId);if(r.error)alert(r.error.message);else await refreshLineAdmin()}
async function saveWorksite(id){const latitude=Number(document.getElementById('lat_'+id).value),longitude=Number(document.getElementById('lng_'+id).value),radius_m=Number(document.getElementById('rad_'+id).value);if(!Number.isFinite(latitude)||!Number.isFinite(longitude))return alert('請填正確的緯度與經度');const r=await sbc.from('worksites').update({latitude,longitude,radius_m,updated_at:new Date().toISOString()}).eq('id',id);if(r.error)alert(r.error.message);else alert('定位已儲存')}
async function selectExtra(requestId,empId){
  const req=LINE.requests.find(r=>r.id===requestId),sh=byId(S.shifts,req?.shift_id);if(!req||!sh)return alert('找不到班次');
  const slotIndex=Number(req.details?.slotIndex),slot=Number.isInteger(slotIndex)&&sh.assignments?.[slotIndex]&&!sh.assignments[slotIndex].empId?sh.assignments[slotIndex]:(sh.assignments||[]).find(a=>!a.empId&&(!req.details?.role||a.role===req.details.role));if(!slot)return alert('此班次已沒有對應缺額');slot.empId=empId;sh.manualEdit=true;
  const [a,b,c]=await Promise.all([sbc.from('shifts').upsert({id:sh.id,date:sh.date,source:String(sh.id).startsWith('sb_')?'simplybook':'manual',data:sh}),sbc.from('shift_requests').update({status:'completed',selected_emp_id:empId,completed_at:new Date().toISOString(),updated_at:new Date().toISOString()}).eq('id',requestId),sbc.from('notification_outbox').upsert({recipient_emp_id:empId,category:'extra_selected',critical:true,payload:{title:'加場安排確認',text:`你已被安排 ${sh.date} ${sh.start} ${shiftLabel(sh)}`},idempotency_key:`extra-selected:${requestId}:${empId}`},{onConflict:'idempotency_key',ignoreDuplicates:true})]);
  if(a.error||b.error||c.error)return alert('安排失敗：'+(a.error||b.error||c.error).message);await refreshLineAdmin();
}
async function reviewShiftChange(requestId,status){
  const req=LINE.requests.find(r=>r.id===requestId),sh=byId(S.shifts,req?.shift_id);if(!req||!sh)return alert('找不到換班資料');
  const replaced=req.details?.replacedEmpId||req.requester_emp_id;
  const now=new Date().toISOString();
  if(status==='rejected'){
    const reason=prompt('請填寫拒絕原因','目前無合適替補人員')||'管理員未核准';
    const [a,b]=await Promise.all([sbc.from('shift_requests').update({status:'cancelled',details:{...(req.details||{}),managerReply:reason},updated_at:now}).eq('id',requestId),sbc.from('notification_outbox').upsert({recipient_emp_id:req.requester_emp_id,category:'shift_change_result',critical:true,payload:{title:'換班申請未核准',text:`${sh.date} ${sh.start}–${sh.end}：${reason}`},idempotency_key:`shift-change-rejected:${requestId}`},{onConflict:'idempotency_key',ignoreDuplicates:true})]);
    if(a.error||b.error)return alert('處理失敗：'+(a.error||b.error).message);await refreshLineAdmin();render();return;
  }
  const selected=document.getElementById('change_'+requestId)?.value;if(!selected)return alert('請先選擇替補人員');
  if(!managerChangeCandidates(req,sh).some(e=>e.id===selected))return alert('該員工目前已不符合時間、技能或撞班規則，請重新整理');
  const slot=(sh.assignments||[]).find(a=>a.empId===replaced);if(!slot)return alert('原排班人員已不在此班次，請重新整理');
  slot.empId=selected;sh.manualEdit=true;
  const src=String(sh.id).startsWith('sb_')?'simplybook':'manual',text=`${sh.date} ${sh.start}–${sh.end} ${shiftLabel(sh)}`;
  const notifications=[sbc.from('notification_outbox').upsert({recipient_emp_id:req.requester_emp_id,category:'shift_change_result',critical:true,payload:{title:'換班已核准',text:`${text} 已由 ${emp(selected)?.name||selected} 接替。`},idempotency_key:`shift-change-approved:${requestId}:requester`},{onConflict:'idempotency_key',ignoreDuplicates:true}),sbc.from('notification_outbox').upsert({recipient_emp_id:selected,category:'shift_assigned',critical:true,payload:{title:'管理員指派新班次',text:`你已接替 ${text}，請至 LINE 班表確認。`},idempotency_key:`shift-change-approved:${requestId}:replacement`},{onConflict:'idempotency_key',ignoreDuplicates:true})];
  if(replaced!==req.requester_emp_id)notifications.push(sbc.from('notification_outbox').upsert({recipient_emp_id:replaced,category:'shift_replaced',critical:true,payload:{title:'班表人力已調整',text:`你原本的 ${text} 已由 ${emp(selected)?.name||selected} 接替。`},idempotency_key:`shift-change-approved:${requestId}:original`},{onConflict:'idempotency_key',ignoreDuplicates:true}));
  const results=await Promise.all([sbc.from('shifts').upsert({id:sh.id,date:sh.date,source:src,data:sh}),sbc.from('shift_requests').update({status:'completed',selected_emp_id:selected,completed_at:now,updated_at:now}).eq('id',requestId),...notifications]);
  const failed=results.find(x=>x.error);if(failed)return alert('換班失敗：'+failed.error.message);await refreshLineAdmin();render();
}
async function reviewGuestReport(id,status){
  const report=(LINE.guestReports||[]).find(r=>r.id===id);if(!report)return alert('找不到客人回報');
  const reply=document.getElementById('guestReply_'+id)?.value.trim();if(!reply)return alert('請填寫要回覆員工的處理結果');
  try{await guestAdminApi({action:'review',id,status,reply});await refreshLineAdmin();render()}catch(e){alert('處理失敗：'+e.message)}
}
async function reviewAttendance(id,status){const r=await sbc.rpc('review_attendance_request',{p_request:id,p_status:status});if(r.error||!r.data?.ok)alert(r.error?.message||r.data?.msg||'審核失敗');else{await afterLogin();tab='line';renderNav();render()}}
async function reviewDaily(empId,date,status,inputId){const payable=status==='approved'?Math.max(0,Number(document.getElementById(inputId).value)||0):0,note=prompt(status==='approved'?'核准備註（可留空）':'不計薪原因（建議填寫）','')||'';const r=await sbc.rpc('review_attendance_day',{p_emp:empId,p_date:date,p_status:status,p_payable:payable,p_note:note});if(r.error||!r.data?.ok)alert(r.error?.message||r.data?.msg||'審核失敗');else{await refreshLineAdmin();render()}}
async function revertTrade(id){if(!confirm('確定撤銷這次換班並恢復原班表？兩位員工都會收到通知。'))return;const r=await sbc.rpc('revert_shift_request',{p_request:id});if(r.error||!r.data?.ok)alert(r.error?.message||r.data?.msg||'撤銷失敗');else{await afterLogin();tab='line';renderNav();render()}}
async function reviewOvertime(id,status){const approved=status==='approved'?Math.max(0,Number(document.getElementById('ot_'+id).value)||0):0,u=await sbc.auth.getUser(),reviewed_by=u.data?.user?.id||null;const r=await sbc.from('overtime_reviews').update({status,approved_minutes:approved,reviewed_by,reviewed_at:new Date().toISOString()}).eq('id',id);if(r.error)alert(r.error.message);else await refreshLineAdmin()}
async function calculateOvertime(){
  const month=monthStr(),rows=[];
  for(const e of S.employees.filter(x=>employedInMonth(x,month))){
    const days=[...new Set(S.punches.filter(p=>p.empId===e.id&&p.ts.slice(0,7)===month).map(p=>p.ts.slice(0,10)))];
    for(const d of days){const ps=S.punches.filter(p=>p.empId===e.id&&p.ts.slice(0,10)===d).sort((a,b)=>a.ts.localeCompare(b.ts));let actual=0,open=null,anomaly=false;for(const p of ps){if(p.type==='in'){if(open)anomaly=true;open=p}else if(open){actual+=Math.max(0,toMin(p.ts.slice(11,16))-toMin(open.ts.slice(11,16)));open=null}else anomaly=true}if(open)anomaly=true;const scheduled=S.shifts.filter(s=>s.date===d&&s.status!=='cancelled'&&s.assignments.some(a=>a.empId===e.id)).reduce((n,s)=>n+Math.max(0,toMin(s.end)-toMin(s.start)),0);const candidate=Math.max(0,actual-scheduled);if(candidate||anomaly)rows.push({emp_id:e.id,work_date:d,scheduled_minutes:scheduled,actual_minutes:actual,candidate_minutes:candidate,status:anomaly?'anomaly':'pending'})}
  }
  if(rows.length){const r=await sbc.from('overtime_reviews').upsert(rows,{onConflict:'emp_id,work_date'});if(r.error)return alert(r.error.message)}await refreshLineAdmin();
}

/* ============ 資料備份 ============ */
function vData(){
  return `<div class="card"><h2>資料備份與還原</h2>
    <p style="margin-bottom:10px">資料存在<b>雲端資料庫(Supabase)</b>,所有裝置即時共用。單機版的備份 JSON 可用「匯入備份」整包搬上雲;仍建議定期匯出備份。</p>
    <div class="row">
      <button class="btn" onclick="exportJSON()">⬇ 匯出備份(JSON)</button>
      <label class="btn gray" style="cursor:pointer">⬆ 匯入備份<input type="file" accept=".json" style="display:none" onchange="importJSON(this)"></label>
      <span class="grow"></span>
      <button class="btn red" onclick="resetAll()">清除全部資料</button>
    </div>
    <p class="muted" style="margin-top:12px">目前:員工 ${S.employees.length} 人、主題 ${S.themes.length} 個、班次 ${S.shifts.length} 筆、打卡 ${S.punches.length} 筆。<br>
    SimplyBook 預約由排程每 15 分鐘自動同步為班次;店員打卡請用手機開 punch.html(掃店內 QR),需先在「員工」頁設定 PIN。</p>
  </div>`;
}
function exportJSON(){dl(JSON.stringify(S,null,2),`排班系統備份_${todayStr()}.json`,'application/json')}
function importJSON(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async()=>{try{
    const d=JSON.parse(r.result);
    if(!d.stores||!d.employees)throw new Error('格式不正確');
    if(!confirm('匯入將覆蓋「雲端」目前資料(單機版備份檔可直接整包搬上來),確定?'))return;
    const shifts=d.shifts||[],punches=d.punches||[];
    const cfg=Object.assign({},d);delete cfg.shifts;delete cfg.punches;
    for(const k of Object.keys(cfg))if(/^(migr|sim)/i.test(k))delete cfg[k];
    await sbc.from('shifts').delete().neq('id','');
    await sbc.from('punches').delete().neq('id','');
    await sbc.from('config').upsert({id:1,data:cfg});
    for(let i=0;i<shifts.length;i+=100){
      const r2=await sbc.from('shifts').upsert(shifts.slice(i,i+100).map(s=>({id:s.id,date:s.date,source:String(s.id).indexOf('sb_')===0?'simplybook':'manual',data:s})));
      if(r2.error)throw new Error(r2.error.message);
    }
    for(let i=0;i<punches.length;i+=200){
      const r3=await sbc.from('punches').upsert(punches.slice(i,i+200).map(p=>({id:p.id,emp_id:p.empId,ts:p.ts,type:p.type,source:'import'})));
      if(r3.error)throw new Error(r3.error.message);
    }
    await afterLogin();alert('匯入完成:班次 '+shifts.length+' 筆、打卡 '+punches.length+' 筆已上雲');
  }catch(e){alert('匯入失敗:'+e.message)}};
  r.readAsText(f);input.value='';
}
async function resetAll(){
  if(!confirm('確定清除「雲端」全部資料?此動作無法復原(建議先匯出備份)。'))return;
  if(!confirm('再次確認:真的要清除?'))return;
  await sbc.from('shifts').delete().neq('id','');
  await sbc.from('punches').delete().neq('id','');
  const d=seedConfig();
  await sbc.from('config').upsert({id:1,data:d});
  await afterLogin();
}
